::-webkit-scrollbar-thumb{background:rgba(255,138,0,0.35);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,138,0,0.65);}
input,select,textarea{font-family:"Inter",sans-serif;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#FF8A00!important;box-shadow:0 0 0 3px rgba(255,138,0,0.12)!important;}
button{transition:all .15s ease;font-family:"Inter",sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
button:active{opacity:0.75;}
@keyframes kdpulse{0%,80%,100%{opacity:.2;transform:scale(.7);}40%{opacity:1;transform:scale(1);}}
@keyframes kdfadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media(max-width:768px){
  aside{display:none!important;position:fixed!important;z-index:300!important;top:0!important;left:0!important;height:100%!important;width:260px!important;box-shadow:4px 0 32px rgba(0,0,0,0.8)!important;}
  aside.mob-open{display:flex!important;}
  .kd-burger{display:flex!important;}
  input,select,textarea{font-size:16px!important;}
}
@media(display-mode:standalone){
  header{padding-top:max(12px,env(safe-area-inset-top))!important;}
}
</style>

const addDays  = (d,n)=>{ const r=new Date(d);r.setDate(r.getDate()+n);return r; };

const REPORT_COLORS = {

  };
  const s = map[status] || {bg:"#f9fafb", color:"#6b7280", border:"#e5e7eb"};
  return `background:${s.bg};color:${s.color};border:1px solid ${s.border};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;`;

function priorityStyle(p) {
  if (p==="High")   return "background:#fff5f5;color:#9b2335;border:1px solid #fed7d7;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;";

}

function buildReport({ title, subtitle, reportDate, sections, summaryCards, companyName }) {
  const co = companyName || "BuildCo Construction";
  const dt = reportDate || new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  const cardsHTML = summaryCards && summaryCards.length ? `
    <div style="display:grid;grid-template-columns:repeat(${Math.min(summaryCards.length,4)},1fr);gap:12px;margin-bottom:24px;">
      ${summaryCards.map(c=>`
        <div style="background:#ffffff;border:1px solid ${REPORT_COLORS.border};border-radius:6px;padding:14px 16px;border-top:3px solid ${REPORT_COLORS.accent};">
          <div style="font-size:10px;color:${REPORT_COLORS.textMuted};font-weight:700;letter-spacing:.8px;margin-bottom:6px;text-transform:uppercase;">${c.label}</div>
          <div style="font-size:22px;font-weight:700;color:${REPORT_COLORS.headerBg};font-family:'Courier New',monospace;">${c.value}</div>
          ${c.sub ? `<div style="font-size:11px;color:${REPORT_COLORS.textMuted};margin-top:3px;">${c.sub}</div>` : ""}
        </div>
      `).join("")}
    </div>` : "";

  const sectionsHTML = sections.map(sec => {
    if (!sec.rows || !sec.rows.length) return `
      <div style="margin-bottom:24px;">
        <div style="font-size:13px;font-weight:700;color:${REPORT_COLORS.headerBg};border-bottom:2px solid ${REPORT_COLORS.accent};padding-bottom:6px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">${sec.title}</div>
        <div style="padding:20px;text-align:center;color:${REPORT_COLORS.textMuted};font-size:12px;border:1px solid ${REPORT_COLORS.border};border-radius:4px;">No records found.</div>
      </div>`;

    const theadCells = sec.cols.map(c =>
      `<th style="padding:9px 12px;text-align:left;background:${REPORT_COLORS.colHead};color:${REPORT_COLORS.colText};font-size:10px;font-weight:700;letter-spacing:.6px;border-bottom:2px solid ${REPORT_COLORS.border};white-space:nowrap;text-transform:uppercase;">${c.label}</th>`
    ).join("");

    const tbodyRows = sec.rows.map((row, ri) => {
      const cells = sec.cols.map(col => {
        let val = row[col.key] ?? "";
        let cellStyle = `padding:8px 12px;font-size:12px;color:${REPORT_COLORS.colText};border-bottom:1px solid ${REPORT_COLORS.border};vertical-align:middle;`;
        let inner = String(val);

        if (col.type === "status") {
          inner = `<span style="${statusStyle(val)}">${val||"—"}</span>`;
        } else if (col.type === "priority") {
          inner = `<span style="${priorityStyle(val)}">${val||"—"}</span>`;
        } else if (col.type === "currency") {
          inner = `<span style="font-family:'Courier New',monospace;font-weight:600;">${val?"$"+Number(val).toLocaleString("en-US",{minimumFractionDigits:2}):"—"}</span>`;
        } else if (col.type === "variance") {
          const n = Number(val)||0;
          const color = n >= 0 ? REPORT_COLORS.green : REPORT_COLORS.red;
          inner = `<span style="font-family:'Courier New',monospace;font-weight:700;color:${color};">${n>=0?"+":""}${n>=0?"$":"−$"}${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2})}</span>`;
        } else if (col.type === "pct") {
          const n = Number(val)||0;
          inner = `<div style="display:flex;align-items:center;gap:8px;">
            <div style="width:60px;background:#e5e7eb;border-radius:3px;height:6px;overflow:hidden;">
              <div style="width:${Math.min(100,n)}%;height:100%;background:${n>=100?REPORT_COLORS.green:REPORT_COLORS.accent};border-radius:3px;"></div>
            </div>
            <span style="font-size:11px;font-weight:600;color:${REPORT_COLORS.colText};">${n}%</span>
          </div>`;
        } else if (col.type === "date") {
          inner = val ? `<span style="font-family:'Courier New',monospace;font-size:11px;color:${REPORT_COLORS.textMuted};">${val}</span>` : "—";
        } else if (col.type === "overdue") {
          const isOverdue = val && val < new Date().toISOString().split("T")[0] && row.status !== "Complete" && row.status !== "Closed" && row.status !== "Resolved";
          inner = val ? `<span style="font-family:'Courier New',monospace;font-size:11px;color:${isOverdue?"#9b2335":"#374151"};font-weight:${isOverdue?700:400};">${val}${isOverdue?" ⚠":""}</span>` : "—";
        } else if (col.type === "bold") {
          inner = `<strong style="color:${REPORT_COLORS.headerBg};">${val||"—"}</strong>`;
        } else if (col.type === "mono") {
          inner = `<span style="font-family:'Courier New',monospace;font-size:11px;">${val||"—"}</span>`;
        } else if (col.type === "notice") {
          const color = val==="Yes" ? REPORT_COLORS.green : (val==="Pending"?"#92400e":REPORT_COLORS.red);
          inner = val ? `<span style="font-weight:600;color:${color};">${val}</span>` : "—";
        }

        if (!inner || inner === "") inner = `<span style="color:${REPORT_COLORS.textMuted};">—</span>`;
        return `<td style="${cellStyle}">${inner}</td>`;
      }).join("");
      const bg = ri%2===0 ? REPORT_COLORS.rowNorm : REPORT_COLORS.rowAlt;
      return `<tr style="background:${bg};">${cells}</tr>`;
    }).join("");

    return `
      <div style="margin-bottom:28px;">
        <div style="font-size:12px;font-weight:700;color:${REPORT_COLORS.headerBg};border-bottom:2px solid ${REPORT_COLORS.accent};padding-bottom:7px;margin-bottom:0;text-transform:uppercase;letter-spacing:.6px;">${sec.title} <span style="font-weight:400;color:${REPORT_COLORS.textMuted};font-size:11px;">(${sec.rows.length} record${sec.rows.length!==1?"s":""})</span></div>
        <div style="overflow-x:auto;border:1px solid ${REPORT_COLORS.border};border-top:none;border-radius:0 0 5px 5px;">
          <table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;">
            <thead><tr>${theadCells}</tr></thead>
            <tbody>${tbodyRows}</tbody>
          </table>
        </div>
        ${sec.note ? `<div style="margin-top:6px;font-size:10px;color:${REPORT_COLORS.textMuted};font-style:italic;">* ${sec.note}</div>` : ""}
      </div>`;
  }).join("");

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

function openReport(html) {
  const blob = new Blob([html], {type:"text/html"});
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, "_blank");
  if (!win) alert("Please allow pop-ups to view the report.");
}

// ── SPECIFIC REPORT BUILDERS ─────────────────────────────────────────────────

function reportDailyLogs(logs, projects, selProj, companyName) {
  const proj = selProj ? projects.find(p=>p.id===selProj) : null;
  const rows = logs.sort((a,b)=>b.date.localeCompare(a.date));
  const pN = id => projects.find(p=>p.id===id)?.name||"—";

  // Build enriched rows
  const enriched = rows.map(r=>({...r, projectName:pN(r.projectId)}));

  const html = buildReport({
    title: "Daily Field Log Report",
    subtitle: proj ? proj.name : "All Projects",
    companyName,
    summaryCards: [
      {label:"Total Log Entries",  value:rows.length},
      {label:"Date Range",         value: rows.length ? `${rows[rows.length-1].date} – ${rows[0].date}` : "—"},
      {label:"Projects Covered",   value:[...new Set(rows.map(r=>r.projectId))].length},
      {label:"Total Man-Hours",    value:rows.reduce((s,r)=>s+(Number(r.totalHoursDay)||Number(r.crewCount)||0),0)+" hrs"},
    ],
    sections: [{
      title: "Daily Log Entries",
      rows: enriched,
      note: "All field conditions, work performed, and safety notes as recorded by superintendent.",
      cols: [
        {key:"date",              label:"Date",                type:"date"},
        {key:"projectName",       label:"Project",             type:"bold"},
        {key:"location",          label:"Location / Area",     type:"text"},
        {key:"weather",           label:"Weather",             type:"text"},
        {key:"tempLow",           label:"Low °F",              type:"text"},
        {key:"tempHigh",          label:"High °F",             type:"text"},
        {key:"superintendent",    label:"Superintendent",      type:"text"},
        {key:"foreman",           label:"Foreman",             type:"text"},
        {key:"companyName",       label:"Company",             type:"text"},
        {key:"manpower",          label:"Manpower",            type:"text"},
        {key:"hoursWorked",       label:"Hrs/Worker",          type:"text"},
        {key:"totalHoursDay",     label:"Total Man-Hrs",       type:"text"},
        {key:"workPerformed",     label:"Work Performed",      type:"text"},
        {key:"rentalEquipUsed",   label:"Rental Equip. Used",  type:"text"},
        {key:"rentalHoursUsed",   label:"Equip. Hours",        type:"text"},
        {key:"rentalInspectionTime",label:"Insp. Time",        type:"text"},
        {key:"rentalComments",    label:"Equip. Comments",     type:"text"},
        {key:"visitors",          label:"Visitors / Insp.",    type:"text"},
        {key:"delays",            label:"Delays / Issues",     type:"text"},
        {key:"safety",            label:"Safety Notes",        type:"text"},
        {key:"notes",             label:"Additional Notes",    type:"text"},
      ]
    }]
  });
  openReport(html);
}

function reportDelays(delays, projects, selProj, companyName) {
  const proj = selProj ? projects.find(p=>p.id===selProj) : null;
  const pN = id => projects.find(p=>p.id===id)?.name||"—";
  const rows = delays.sort((a,b)=>b.dateReported.localeCompare(a.dateReported));
  const enriched = rows.map(r=>({...r, projectName:pN(r.projectId)}));
  const totalDays = rows.reduce((s,r)=>s+(Number(r.daysLost)||0),0);
  const totalCost = rows.reduce((s,r)=>s+(Number(r.costImpact)||0),0);
  const active = rows.filter(r=>r.status==="Active").length;

  const html = buildReport({
    title: "Delay Log Report",
    subtitle: proj ? proj.name : "All Projects",
    companyName,
    summaryCards: [
      {label:"Total Delays Logged", value:rows.length},
      {label:"Active Delays",       value:active,               sub:"currently impacting schedule"},
      {label:"Total Days Lost",     value:totalDays+" days",    sub:"cumulative schedule impact"},
      {label:"Total Cost Impact",   value:totalCost?"$"+Number(totalCost).toLocaleString():"$0", sub:"documented cost claims"},
    ],
    sections: [
      {
        title: "Active & Pending Delays",
        rows: enriched.filter(r=>r.status==="Active"||r.status==="Pending"),
        note: "These delays are currently impacting the project schedule and may support time extension claims.",
        cols: [
          {key:"dateReported",      label:"Date Reported",    type:"date"},
          {key:"projectName",       label:"Project",          type:"bold"},
          {key:"delayType",         label:"Delay Type",       type:"text"},
          {key:"description",       label:"Description",      type:"text"},
          {key:"trade",             label:"Trade",            type:"text"},
          {key:"reportedBy",        label:"Reported By",      type:"text"},
          {key:"daysLost",          label:"Days Lost",        type:"text"},
          {key:"revisedCompletion", label:"Revised Completion",type:"overdue"},
          {key:"noticeGiven",       label:"Notice Given",     type:"notice"},
          {key:"costImpact",        label:"Cost Impact",      type:"currency"},
          {key:"status",            label:"Status",           type:"status"},
          {key:"notes",             label:"Notes",            type:"text"},
        ]
      },
      {
        title: "Resolved & Closed Delays",
        rows: enriched.filter(r=>r.status==="Resolved"||r.status==="Closed"),
        cols: [
          {key:"dateReported",  label:"Date Reported", type:"date"},
          {key:"projectName",   label:"Project",       type:"bold"},
          {key:"delayType",     label:"Delay Type",    type:"text"},
          {key:"description",   label:"Description",   type:"text"},
          {key:"trade",         label:"Trade",         type:"text"},
          {key:"daysLost",      label:"Days Lost",     type:"text"},
          {key:"noticeGiven",   label:"Notice Given",  type:"notice"},
          {key:"costImpact",    label:"Cost Impact",   type:"currency"},
          {key:"status",        label:"Status",        type:"status"},
          {key:"resolution",    label:"Resolution",    type:"text"},
        ]
      }
    ]
  });
  openReport(html);
}

function reportTracker(tasks, projects, selProj, companyName) {
  const proj = selProj ? projects.find(p=>p.id===selProj) : null;
  const pN = id => projects.find(p=>p.id===id)?.name||"—";
  const rows = tasks.filter(t=>t.startDate);
  const enriched = rows.map(r=>({...r, projectName:pN(r.projectId)}));
  const complete = rows.filter(t=>t.status==="Complete").length;
  const delayed  = rows.filter(t=>t.status==="Delayed").length;
  const avgPct   = rows.length ? Math.round(rows.reduce((s,t)=>s+(Number(t.pct)||0),0)/rows.length) : 0;

  // Group by trade for sections
  const trades = [...new Set(rows.map(r=>r.trade))].sort();
  const sections = trades.map(trade => ({
    title: trade + " Activities",
    rows: enriched.filter(r=>r.trade===trade).sort((a,b)=>a.startDate.localeCompare(b.startDate)),
    cols: [
      {key:"actId",       label:"ID",          type:"mono"},
      {key:"projectName", label:"Project",     type:"bold"},
      {key:"description", label:"Activity",    type:"text"},
      {key:"assignee",    label:"Assignee",    type:"text"},
      {key:"startDate",   label:"Start",       type:"date"},
      {key:"endDate",     label:"Finish",      type:"overdue"},
      {key:"duration",    label:"Dur (days)",  type:"text"},
      {key:"pct",         label:"% Complete",  type:"pct"},
      {key:"status",      label:"Status",      type:"status"},
      {key:"notes",       label:"Notes",       type:"text"},
    ]
  }));

  const html = buildReport({
    title: "Project Activity Tracker",
    subtitle: proj ? proj.name : "All Projects",
    companyName,
    summaryCards: [
      {label:"Total Activities",   value:rows.length},
      {label:"Complete",           value:complete,       sub:`${Math.round(complete/Math.max(1,rows.length)*100)}% of total`},
      {label:"Delayed",            value:delayed,        sub:"require attention"},
      {label:"Avg % Complete",     value:avgPct+"%",     sub:"across all activities"},
    ],
    sections
  });
  openReport(html);
}

function reportLookahead(tasks, projects, selProj, companyName) {
  const proj = selProj ? projects.find(p=>p.id===selProj) : null;
  const pN = id => projects.find(p=>p.id===id)?.name||"—";
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const fmtD = d => { const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; };
  const addD = (d,n)=>{ const r=new Date(d);r.setDate(r.getDate()+n);return r; };

  // Build 6 week data
  const allSections = [];
  for (let wi=0; wi<6; wi++) {
    const wStart = fmtD(addD(todayD, wi*7));
    const wEnd   = fmtD(addD(todayD, wi*7+6));
    const s = new Date(wStart), e = new Date(wEnd);
    const label = `${s.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    const wTasks = tasks.filter(t => {
      if (selProj && t.projectId !== selProj) return false;
      return t.startDate && t.endDate && t.startDate <= wEnd && t.endDate >= wStart;
    });
    const enriched = wTasks.map(r=>({...r, projectName:pN(r.projectId)}));
    allSections.push({
      title: `Week ${wi+1}${wi===0?" (Current Week)":""}: ${label}`,
      rows: enriched.sort((a,b)=>a.startDate.localeCompare(b.startDate)),
      cols: [
        {key:"projectName", label:"Project",     type:"bold"},
        {key:"trade",       label:"Trade",       type:"text"},
        {key:"actId",       label:"Activity ID", type:"mono"},
        {key:"description", label:"Activity",    type:"text"},

function parseCSVText(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}
    vals.push(cur);
    return Object.fromEntries(headers.map((h,i)=>[h,(vals[i]||"").replace(/^"|"$/g,"")]));
  }).filter(r=>Object.values(r).some(v=>v));
}
function parseXLSX(buf){
  try{const wb=XLSX.read(buf,{type:"array",cellDates:false});const ws=wb.Sheets[wb.SheetNames[0]];return XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});}catch(e){return[];}
}

// ── schedule parser ───────────────────────────────────────────────────────────
function parseScheduleRows(rawRows){
  if(!rawRows||!rawRows.length)return[];
  const headers=Object.keys(rawRows[0]);
  const find=(...cands)=>headers.find(h=>cands.some(c=>h.toLowerCase().replace(/[\s_\-.]/g,"").includes(c.toLowerCase().replace(/[\s_\-.]/g,""))));
  // ── Detect source format ──────────────────────────────────────
  const isP6    = headers.some(h=>/activity\s*id|early\s*start|early\s*finish|remaining\s*dur|budgeted\s*unit/i.test(h));
  const isMSP   = headers.some(h=>/unique\s*id|outline\s*number|predecessors|resource\s*names/i.test(h));
  const isProcore = headers.some(h=>/procore|wbs\s*code|spec\s*section|submittal/i.test(h));
  // ── P6 column mappings ────────────────────────────────────────
  const cId   = isP6 ? find("activityid","activity id") :
                isMSP? find("id","uniqueid","task id") :
                       find("activityid","id","wbsid","taskid","itemno","wbs code");
  const cName = isP6 ? find("activityname","activity name") :
                isMSP? find("name","task name","taskname") :
                       find("activityname","taskname","description","activity","name","task","workitem","scope","item description");
  const cStart= isP6 ? find("earlystart","early start","plannedstart","planned start","baselinestart") :
                isMSP? find("start","start date") :
                       find("start","startdate","plannedstart","earlystart","baselinestart","begin","scheduled start");
  const cEnd  = isP6 ? find("earlyfinish","early finish","plannedfinish","planned finish","baselinefinish") :
                isMSP? find("finish","finish date") :
                       find("finish","end","finishdate","enddate","plannedfinish","earlyfinish","due","scheduled finish");
  const cDur  = isP6 ? find("originalduration","original duration","remainingduration","budgetedlaborunits") :
                isMSP? find("duration") :
                       find("duration","dur","days","calendardays","workdays");
  const cPct  = find("percentcomplete","complete","progress","pct","%complete","percentdone","physicalpercent","percent complete");
  const cTrade= find("trade","subcontractor","sub","discipline","responsibility","resource names","primaryresource");
  const cAssign=find("assignee","assigned","resource","foreman","responsible","resource names");
  const cNotes= find("notes","comment","remarks","note","activitystatus");
  // ── P6 specific: budgeted labor units ─────────────────────────
  const cLaborHrs = isP6 ? find("budgetedlaborunits","budgeted labor units","remaininglaborunits") : null;
  const sourceLabel = isP6?"Primavera P6":isMSP?"MS Project":isProcore?"Procore":"Excel/CSV";
  return rawRows.map((row,i)=>{
    const name=cName?String(row[cName]||"").trim():"";
    if(!name||name.toLowerCase()==="activity name"||name.toLowerCase()==="description")return null;
    const rawS=cStart?row[cStart]:null,rawE=cEnd?row[cEnd]:null;
    const p=Number(String(cPct?row[cPct]||0:0).replace(/[^0-9.]/g,""))||0;
    const dur=Number(String(cDur?row[cDur]||0:0).replace(/[^0-9.]/g,""))||0;
    const tradeRaw=cTrade?String(row[cTrade]||"").trim():"";
    let sISO=excelDateToISO(rawS),eISO=excelDateToISO(rawE);
    if(sISO&&!eISO&&dur>0)eISO=fmt(addDays(new Date(sISO+"T00:00:00"),dur));
    if(!sISO&&eISO&&dur>0)sISO=fmt(addDays(new Date(eISO+"T00:00:00"),-dur));
    const trade=tradeRaw?(TRADES.includes(tradeRaw)?tradeRaw:guessTrade(tradeRaw+" "+name)):guessTrade(name);
    const p6LaborHrs = cLaborHrs?parseFloat(String(row[cLaborHrs]||0).replace(/[^0-9.]/g,""))||0:0;
    const durCalc = dur||(sISO&&eISO?diffDays(sISO,eISO):0);
    const isMechPlumb=/plumb|pipe|drain|sanit|domestic|fixture|water|sewer|hvac|duct|mech|air|heat|cool|chiller|boiler|pump|sprinkler|fire\s*protect/i.test(name);
    const mcaaEst = isMechPlumb&&!p6LaborHrs ? estimateMCAA(name,durCalc) : {hours:0,basis:""};
    const laborHrs = p6LaborHrs||mcaaEst.hours||0;
    const crewInfo = laborHrs&&durCalc ? calcCrew(laborHrs,durCalc,8) : {workers:0,workersExact:0};
    return{id:uid(),actId:cId?String(row[cId]||i+1):String(i+1),description:name,trade,assignee:cAssign?String(row[cAssign]||"").trim():"",startDate:sISO,endDate:eISO,duration:durCalc,pct:Math.min(100,Math.max(0,p)),status:autoStatus(sISO,eISO,p),notes:cNotes?String(row[cNotes]||"").trim():"",projectId:null,imported:true,sourceFormat:sourceLabel,totalLaborHours:Math.round(laborHrs*10)/10,laborBasis:p6LaborHrs?"P6 Budgeted Labor Units":mcaaEst.basis,workersPerDay:crewInfo.workers,workersExact:crewInfo.workersExact,mcaaCalculated:isMechPlumb&&!p6LaborHrs&&laborHrs>0};
  }).filter(Boolean);
}

// cost code parser
function parseCostCodeRows(rawRows){
  if(!rawRows||!rawRows.length)return[];
  const headers=Object.keys(rawRows[0]);
  const find=(...cands)=>headers.find(h=>cands.some(c=>h.toLowerCase().replace(/[\s_\-.]/g,"").includes(c.toLowerCase().replace(/[\s_\-.]/g,""))));
  const cCode=find("costcode","code","code#","wbs","id","number");
  const cDesc=find("description","name","title","activity","scope","item");
  const cBudget=find("budget","budgetedamount","value","amount","originalbudget","contractamount");
  const cCommit=find("committed","commitment","po","purchaseorder","subcontract","contracted");
  const cSpent=find("spent","actual","actualcost","paid","invoiced","expenditure");
  const cCat=find("category","type","division","phase","csi","trade");
  const cNotes=find("notes","note","comment","remarks");
  return rawRows.map((row,i)=>{
    const code=cCode?String(row[cCode]||"").trim():String(i+1);
    const desc=cDesc?String(row[cDesc]||"").trim():"";
    if(!code&&!desc)return null;
    const clean=v=>Number(String(v||"0").replace(/[$,\s]/g,""))||0;
    const budgeted=clean(cBudget?row[cBudget]:0);
    const committed=clean(cCommit?row[cCommit]:0);
    const spent=clean(cSpent?row[cSpent]:0);
    const catRaw=cCat?String(row[cCat]||"").trim():"";
    const category=COST_CATEGORIES.includes(catRaw)?catRaw:"Other";
    const variance=budgeted-spent;
    const status=budgeted===0?"On Budget":spent>budgeted?"Over Budget":spent/budgeted>0.9?"At Risk":"Under Budget";
    return{id:uid(),code,description:desc||code,category,budgeted,committed,spent,variance,status,notes:cNotes?String(row[cNotes]||"").trim():"",projectId:null,imported:true};
  }).filter(Boolean);
}

  useEffect(()=>{
    // Check if user is already logged in via stored token
    const stored=localStorage.getItem("kodox_auth_token");
    const storedUser=localStorage.getItem("kodox_auth_user");
    if(stored&&storedUser){
      // Verify token is still valid with Firebase
      fetch("https://identitytoolkit.googleapis.com/v1/accounts:lookup?key="+
        (window.KODOX_API_KEY||""),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({idToken:stored})
      }).then(r=>r.json()).then(d=>{
        if(d&&d.users&&d.users.length>0){
          setAuthUser(JSON.parse(storedUser));
          if(window.KoDoxFirebase){window.KoDoxFirebase._token=stored;}
        } else {
          // Token invalid — clear and show login
          localStorage.removeItem("kodox_auth_token");
          localStorage.removeItem("kodox_auth_user");
        }
        setAuthLoading(false);
      }).catch(()=>{
        // Network error — still allow if token exists
        setAuthUser(JSON.parse(storedUser));
        if(window.KoDoxFirebase){window.KoDoxFirebase._token=stored;}
        setAuthLoading(false);
      });
    } else {
      setAuthLoading(false);
    }
  },[]);

  function doLogin(){
    if(!loginEmail||!loginPass){setAuthError("Please enter email and password.");return;}
    setLoginLoading(true);setAuthError("");
    if(window.KoDoxFirebase&&window.KoDoxFirebase.signIn){
      window.KoDoxFirebase.signIn(loginEmail,loginPass).then(u=>{
        const user={email:u.email||loginEmail,uid:u.localId||u.uid};
        setAuthUser(user);
        localStorage.setItem("kodox_auth_token",u.idToken||"");
        localStorage.setItem("kodox_auth_user",JSON.stringify(user));
        setLoginLoading(false);
      }).catch(e=>{
        setAuthError("Invalid email or password. Please try again.");
        setLoginLoading(false);
      });
    } else {
      setAuthError("Authentication service unavailable.");
      setLoginLoading(false);
    }
  }

  // ── schedule import ─────────────────────────────────────────────────────────
  function handleSchedFile(e){
    const file=e.target.files[0];if(!file)return;
    setImportMsg("Reading…");
    const ext=file.name.split(".").pop().toLowerCase();
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        let rows=ext==="csv"||ext==="txt"?parseCSVText(ev.target.result):parseXLSX(new Uint8Array(ev.target.result));
        const parsed=parseScheduleRows(rows);
        if(!parsed.length){setImportMsg("❌ No valid rows found. Check headers.");return;}
        setImportRows(parsed);setImportStep(2);setImportMode("schedule");
        setImportMsg(`✅ Found ${parsed.length} activities.`);
      }catch(err){setImportMsg("❌ "+err.message);}
    };
    ext==="csv"||ext==="txt"?reader.readAsText(file):reader.readAsArrayBuffer(file);
    e.target.value="";
  }

  // ── cost code import ────────────────────────────────────────────────────────
  function handleCostFile(e){
    const file=e.target.files[0];if(!file)return;
    setImportMsg("Reading…");
    const ext=file.name.split(".").pop().toLowerCase();
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        let rows=ext==="csv"||ext==="txt"?parseCSVText(ev.target.result):parseXLSX(new Uint8Array(ev.target.result));
        const parsed=parseCostCodeRows(rows);
        if(!parsed.length){setImportMsg("❌ No valid cost codes found.");return;}
        setImportRows(parsed);setImportStep(2);setImportMode("costcode");
        setImportMsg(`✅ Found ${parsed.length} cost codes.`);
      }catch(err){setImportMsg("❌ "+err.message);}
    };
    ext==="csv"||ext==="txt"?reader.readAsText(file):reader.readAsArrayBuffer(file);
    e.target.value="";
  }

  function commitImport(){
    if(!importProjId){showToast("Select a project first","error");return;}
    const pid=Number(importProjId);
    if(importMode==="schedule"){
      // ── MCAA labor calculation for each task ─────────────────
      const enriched=importRows.map(r=>{
        const isMechPlumb=/plumb|pipe|drain|sanit|domestic|fixture|water|sewer|hvac|duct|mech|air|heat|cool|chiller|boiler|pump|sprinkler|fire\s*protect|mech/i.test(r.description||"");
        if(isMechPlumb){
          const dur=r.duration||diffDays(r.startDate,r.endDate)||1;
          const est=estimateMCAA(r.description,dur);
          const crew=calcCrew(est.hours,dur,8);
          return{...r,projectId:pid,id:uid(),imported:true,
            totalLaborHours:est.hours,
            laborBasis:est.basis,
            workersPerDay:crew.workers,
            workersExact:crew.workersExact,
            mcaaCalculated:est.hours>0,
          };
        }
        return{...r,projectId:pid,id:uid(),imported:true};
      });
      // ── Replace existing imported tasks for this project ──────
      const base=tasks.filter(t=>t.projectId!==pid||!t.imported);
      setTasks([...base,...enriched]);
      // ── Auto-navigate to tracker + filter by project ──────────
      setSelProj(pid);
      const mechCount=enriched.filter(t=>t.mcaaCalculated).length;
      const totalHrs=enriched.reduce((s,t)=>s+(t.totalLaborHours||0),0);
      showToast(`${enriched.length} activities imported → Project Tracker & 6-Week Look-Ahead updated${mechCount>0?` · ${mechCount} MCAA labor estimates (${Math.round(totalHrs)} total hrs)`:""}`);
      // Switch to tracker after short delay
      setTimeout(()=>setTab("tracker"),600);
    } else {
      const base=costCodes.filter(c=>c.projectId!==pid||!c.imported);
      setCostCodes([...base,...importRows.map(r=>({...r,projectId:pid,id:uid(),imported:true}))]);
      showToast(`${importRows.length} cost codes imported`);
    }
    setImportStep(4);
  }
  function resetImport(){setImportStep(1);setImportRows([]);setImportProjId("");setImportMsg("");}

        </tr></thead>

          {!rows.length&&<tr><td colSpan={cols.length+1} style={{padding:32,textAlign:"center",color:darkMode?"#3a4060":"#94a3b8",fontSize:13}}>No records yet. Click + to add.</td></tr>}

  const iS=S.iS,lS=S.lS;
  function FField({label,full,children}){return<div style={{gridColumn:full?"1/-1":"auto"}}><label style={lS}>{label}</label>{children}</div>;}
  function FIn({value,onChange,type="text",placeholder=""}){return<input type={type} value={value||""} onChange={onChange} placeholder={placeholder} style={iS}/>;}
  function FSel({value,onChange,options}){return<select value={value||""} onChange={onChange} style={iS}>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>;}
  function FTA({value,onChange,rows=2}){return<textarea value={value||""} onChange={onChange} rows={rows} style={{...iS,resize:"vertical"}}/>;}
  function PSel({value,onChange}){return<select value={value||""} onChange={onChange} style={iS}><option value="">— Select Project —</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>;}
  function CodeSel({value,onChange}){
    const opts=filt(costCodes);
    return<select value={value||""} onChange={onChange} style={iS}><option value="">— Select Cost Code —</option>{opts.map(c=><option key={c.id} value={c.id}>{c.code} – {c.description}</option>)}</select>;
  }
  const SvBtn=({onClick,label})=><button onClick={onClick} style={S.btnP}>Save {label}</button>;
  const CxBtn=({onClick})=><button onClick={onClick} style={{...S.btnS}}>Cancel</button>;

  const statCard=(label,val,sub,color)=>(
    <div style={{background:darkMode?"linear-gradient(135deg,#161b27,#1a2035)":"#ffffff",border:`1px solid ${darkMode?"#2a3150":"#e2e8f0"}`,borderRadius:13,padding:"14px 16px"}}>
      <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,marginBottom:4}}>{label.toUpperCase()}</div>
      <div style={{fontSize:22,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{val}</div>
      {sub&&<div style={{fontSize:11,...S.text3,marginTop:2}}>{sub}</div>}
    </div>
  );

  // ── RENDER ──────────────────────────────────────────────────────────────────

        <div style={{padding:"8px 10px 3px"}}>
          <div style={{position:"relative"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search everything..."
              style={{background:"#0f1117",border:"1px solid "+(search?"#FF8A00":"#2a3150"),color:"#e2e8f0",padding:"5px 9px 5px 28px",borderRadius:7,fontSize:11,width:"100%",fontFamily:"inherit",outline:"none"}}/>
            <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:11,opacity:.4}}>search</span>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}>x</button>}
            {search.length>1&&(()=>{
              const q=search.toLowerCase();
              const results=[];
              const add=(items,tab,icon,getLabel,getSub)=>{
                (items||[]).filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,3).forEach(x=>{
                  results.push({tab,icon,label:getLabel(x),sub:getSub(x),item:x});
                });
              };
              add(dailyLogs,"dailylogs","log","Daily Log","Daily Logs",x=>x.date+" - "+((x.workPerformed||"").slice(0,40)||"Daily Log"),x=>x.location||"");
              add(rfis,"rfis","rfis","RFIs",x=>"RFI "+x.number+": "+(x.subject||x.description||"").slice(0,35),x=>x.status||"");
              add(submittals,"submittals","submittals","Submittals",x=>(x.number||"")+" "+(x.title||"").slice(0,35),x=>x.status||"");
              add(punchList,"punchlist","punch","Punch List",x=>(x.description||"").slice(0,40),x=>x.status||"");
              add(tasks,"tasks","tasks","Tasks",x=>(x.name||x.title||"").slice(0,40),x=>x.status||"");
              add(bom,"bom","bom","BOM",x=>(x.description||"").slice(0,40),x=>x.status||"");
              add(jsas,"jsa","jsa","JSA",x=>("JSA "+x.jsaNumber+": "+(x.taskDescription||"")).slice(0,40),x=>x.status||"");
              add(drawings,"drawings","draw","Drawings",x=>((x.drawingNumber||"")+" "+(x.title||"")).slice(0,40),x=>x.status||"");
              add(projects,"projects","proj","Projects",x=>(x.name||"").slice(0,40),x=>x.status||"");
              if(!results.length)return null;
              return(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#0d1520",border:"1px solid rgba(255,138,0,0.3)",borderRadius:8,marginTop:4,zIndex:999,maxHeight:300,overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
                  {results.map((r,i)=>(
                    <div key={i} onClick={()=>{setTab(r.tab);setSearch("");}}
                      style={{padding:"8px 12px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",display:"flex",flexDirection:"column",gap:2}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,138,0,0.08)"}
                      onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0"}}>{r.label}</div>
                      <div style={{fontSize:9,color:"rgba(255,138,0,0.7)",textTransform:"uppercase",letterSpacing:1}}>{r.tab} {r.sub&&"- "+r.sub}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        </div>
        <nav style={{flex:1,padding:"4px 7px",display:"flex",flexDirection:"column",gap:1}}>
          {NAV.map((n,i)=>(
            n.divider
              ? <div key={i} style={{padding:"12px 12px 4px",fontSize:9,fontWeight:700,color:"rgba(255,138,0,0.6)",letterSpacing:1.4,textTransform:"uppercase"}}>
                  {n.divider}
                </div>
              : <button key={n.id} onClick={()=>{setTab(n.id);setMobMenu(false);}} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 10px",borderRadius:7,border:"none",cursor:"pointer",textAlign:"left",width:"100%",background:tab===n.id?"#1e2940":"transparent",color:tab===n.id?"#60a5fa":"#94a3b8",fontWeight:tab===n.id?600:400,fontSize:12,borderLeft:tab===n.id?"3px solid #3b82f6":"3px solid transparent"}}>
                  <span style={{fontSize:11}}>{n.icon}</span>{n.label}
                  {alertCounts[n.id]>0&&<span style={{marginLeft:"auto",background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:99,minWidth:16,textAlign:"center"}}>{alertCounts[n.id]}</span>}
                </button>
          ))}
        </nav>
        <div style={{padding:"10px 12px",borderTop:`1px solid ${darkMode?"#1a1f2e":"#334155"}`,fontSize:9,color:"#4a5580"}}>
          {projects.length} Projects · {tasks.length} Activities · {authUser&&authUser.email||"KoDox Systems LLC"}
          <div style={{marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#10b981",fontSize:8,fontWeight:700}}>● AUTO-SAVED</span>
            <button onClick={clearAll} style={{fontSize:11,fontWeight:700,color:"#fff",background:"#dc2626",border:"none",cursor:"pointer",padding:"6px 12px",borderRadius:6,marginTop:4,width:"100%"}}>🗑 Reset All Data</button>
          </div><button onClick={doLogout} style={{width:"100%",marginTop:8,padding:"6px",borderRadius:6,border:"1px solid rgba(239,68,68,0.3)",background:"transparent",color:"#ef4444",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1}}>SIGN OUT</button>
        </div>
      </aside>

            <select value={selProj||""} onChange={e=>setSelProj(e.target.value?Number(e.target.value):null)} style={{...S.iS,width:"auto",fontSize:12,padding:"6px 10px"}}>

              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>

          {tab==="instructions"&&(
            <div style={{maxWidth:860,margin:"0 auto"}}>

              {/* HEADER */}

                <div style={{fontSize:22,fontWeight:700,...S.text,marginBottom:6}}>📖 How To Guide</div>

              </div>

              {/* STEP 1 */}
              <div style={{...S.card,padding:24,marginBottom:16,borderLeft:"4px solid #FF8A00"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#FF8A00,#cc6a00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>1</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,...S.text}}>Create Your Project</div>
                    <div style={{fontSize:12,...S.text3,marginTop:2}}>Start here — everything links to a project</div>
                  </div>
                </div>
                <div style={{fontSize:13,...S.text2,lineHeight:1.8,marginLeft:50}}>
                  <div>→ Go to <strong style={{...S.text}}>ADMIN → Projects</strong></div>
                  <div>→ Click <strong style={{...S.text}}>Add Project</strong></div>
                  <div>→ Fill in project name, number, start/end dates, owner, GC, and superintendent</div>
                  <div style={{marginTop:10,padding:"10px 14px",background:darkMode?"rgba(255,138,0,0.08)":"#fff7ed",borderRadius:8,border:"1px solid rgba(255,138,0,0.2)",fontSize:12,color:"#FF8A00"}}>
                    💡 All data you import will be linked to this project. Create the project first before importing anything.
                  </div>
                </div>
              </div>

              {/* STEP 2 */}
              <div style={{...S.card,padding:24,marginBottom:16,borderLeft:"4px solid #3b82f6"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>2</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,...S.text}}>Import Your Schedule</div>
                    <div style={{fontSize:12,...S.text3,marginTop:2}}>Supports Primavera P6, MS Project, Procore, and Excel</div>
                  </div>
                </div>
                <div style={{fontSize:13,...S.text2,lineHeight:1.8,marginLeft:50}}>
                  <div>→ Go to <strong style={{...S.text}}>PROJECT MANAGEMENT → Schedule Import</strong></div>
                  <div>→ Select your project from the dropdown</div>
                  <div>→ Click <strong style={{...S.text}}>Choose File</strong> and select your schedule export</div>
                  <div>→ The app auto-detects the format (P6, MSP, Procore, or Excel)</div>
                  <div>→ Review the preview — labor hours and crew sizes are calculated automatically using MCAA rates</div>
                  <div>→ Click <strong style={{...S.text}}>Import Activities</strong></div>
                  <div style={{marginTop:10,padding:"10px 14px",background:darkMode?"rgba(59,130,246,0.08)":"#eff6ff",borderRadius:8,border:"1px solid rgba(59,130,246,0.2)",fontSize:12,color:"#3b82f6"}}>
                    💡 After import, the app automatically populates: <strong>Project Tracker</strong>, <strong>6-Week Look-Ahead</strong>, <strong>Manpower Report</strong>, and calculates <strong>total labor hours</strong> for every mechanical and plumbing activity using MCAA labor unit tables.
                  </div>
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:11,fontWeight:700,...S.text3,marginBottom:8,letterSpacing:.5,textTransform:"uppercase"}}>Supported File Formats</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {[
                        ["Primavera P6","Export as XER or CSV — include Early Start, Early Finish, Budgeted Labor Units"],
                        ["MS Project","Export as CSV or XLSX — include Start, Finish, Resource Names, Duration"],
                        ["Procore","Export Schedule as CSV from the Schedule tool"],
                        ["Excel / CSV","Any spreadsheet with columns for Activity, Start Date, End Date, Duration"],
                      ].map(([fmt,tip])=>(
                        <div key={fmt} style={{padding:"10px 12px",background:darkMode?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:7,border:darkMode?"1px solid rgba(255,255,255,0.06)":"1px solid #e2e8f0"}}>
                          <div style={{fontSize:11,fontWeight:700,...S.text,marginBottom:3}}>{fmt}</div>
                          <div style={{fontSize:10,...S.text3,lineHeight:1.5}}>{tip}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* STEP 3 */}
              <div style={{...S.card,padding:24,marginBottom:16,borderLeft:"4px solid #10b981"}}>

                  <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>3</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,...S.text}}>Import Your Budget & Cost Codes</div>
                    <div style={{fontSize:12,...S.text3,marginTop:2}}>Links budget to activities for real-time cost tracking</div>
                  </div>
                </div>
                <div style={{fontSize:13,...S.text2,lineHeight:1.8,marginLeft:50}}>
                  <div>→ Go to <strong style={{...S.text}}>PROJECT MANAGEMENT → Financials</strong> or <strong style={{...S.text}}>Cost Codes</strong></div>
                  <div>→ Click <strong style={{...S.text}}>Import CSV</strong></div>
                  <div>→ Your CSV should include: Cost Code, Description, Budgeted Amount, Category</div>
                  <div style={{marginTop:10,padding:"10px 14px",background:darkMode?"rgba(16,185,129,0.08)":"#ecfdf5",borderRadius:8,border:"1px solid rgba(16,185,129,0.2)",fontSize:12,color:"#10b981"}}>
                    💡 Once imported, the Financials dashboard shows budget vs spent, variance per cost code, and overall project burn rate.
                  </div>
                  <div style={{marginTop:12,padding:"10px 14px",background:darkMode?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:7,border:darkMode?"1px solid rgba(255,255,255,0.06)":"1px solid #e2e8f0",fontSize:12}}>
                    <div style={{fontWeight:700,...S.text,marginBottom:6}}>Required CSV columns:</div>
                    <div style={{fontFamily:"monospace",fontSize:11,...S.text3}}>Cost Code, Description, Category, Budgeted, Spent, Unit</div>
                  </div>
                </div>
              </div>

              <div style={{...S.card,padding:24,marginBottom:16,borderLeft:"4px solid #8b5cf6"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#8b5cf6,#6d28d9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>4</div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,...S.text}}>What Gets Auto-Populated</div>
                    <div style={{fontSize:12,...S.text3,marginTop:2}}>After importing your schedule, these update automatically</div>
                  </div>
                </div>
                <div style={{marginLeft:50}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[
                      ["📊 Project Tracker","All schedule activities imported as tasks, grouped by trade with status tracking"],
                      ["📅 6-Week Look-Ahead","Auto-filtered to show only activities in the next 6 weeks from today"],
                      ["👷 Manpower Report","Workers per day calculated for every mechanical and plumbing activity"],
                      ["⏱ Labor Hours","Total labor hours estimated using MCAA labor unit tables by pipe size, fixture type, and equipment"],

                      ["💰 Budget Tracking","Cost codes linked to activities for real-time burn rate and variance"],
                    ].map(([title,desc])=>(
                      <div key={title} style={{padding:"12px 14px",background:darkMode?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:8,border:darkMode?"1px solid rgba(255,255,255,0.06)":"1px solid #e2e8f0"}}>

                        <div style={{fontSize:11,...S.text3,lineHeight:1.5}}>{desc}</div>

                  </div>
                </div>
              </div>

                  <div>

                          <div>

            allSetters={{projects:setProjects,tasks:setTasks,dailyLogs:setDailyLogs,punchList:setPunchList,actionItems:setActionItems,equipment:setEquipment,rental:setRental,materials:setMaterials,submittals:setSubmittals,rfis:setRfis,delays:setDelays,costCodes:setCostCodes,transactions:setTransactions,inventory:setInventory,jsas:setJsas,safetyInsp:setSafetyInsp,safetyObs:setSafetyObs,safetyForms:setSafetyForms,qualityInsp:setQualityInsp,qualityObs:setQualityObs,qualityForms:setQualityForms,projDocs:setProjDocs,projDir:setProjDir,projSpecs:setProjSpecs,projForms:setProjForms,drawings:setDrawings,changeOrders:setChangeOrders,settings:setSettings}}

                  const autoEntry={
                    id:uid2(),
                    date:dateKey,
                    projectId:d.projectId||"",
                    superintendent:d.superintendent||"",
                    foreman:d.foreman||"",
                    company:d.companyName||"",
                    shift:"Day",
                    notes:"Auto-created from Daily Log",
                    tradeLines:d.tradeBreakdown
                      ?d.tradeBreakdown.split(",").map(t=>{
                          const m=t.trim().match(/^(\d+)\s+(.+)$/);
                          return m
                            ?{id:uid2(),trade:m[2].trim(),workers:Number(m[1]),hours:Number(d.hoursWorked||8)}
                            :{id:uid2(),trade:t.trim()||"General",workers:Number(d.manpower||0),hours:Number(d.hoursWorked||8)};
                        })
                      :[{id:uid2(),trade:"General Labor",workers:Number(d.manpower||0),hours:Number(d.hoursWorked||8)}]
                  };

              const todayStr2=new Date().toISOString().split("T")[0];
              const projKey2=String(d.projectId||"");
              setDailyLogs(logs=>logs.map(log=>{
                if(log.date===todayStr2&&String(log.projectId)===projKey2){
                  const delayNote=d.description||(d.cause||"Delay logged");
                  const existing=log.delays&&log.delays!=="None"?log.delays:"";
                  const updated=existing?existing+"; "+delayNote:delayNote;
                  return{...log,delays:updated};
                }
                return log;
              }));

                  ));
                  showToast("RFI linked to submittal");

              }
            }}           onCancel={close}/>}
            {modal==="jsa"         &&<JSAForm        iS={iS} lS={lS} S={S} projects={projects} initial={editTgt} onSave={d=>saveRec(setJsas,d)}           onCancel={close}/>}
            {["safetyinsp","safetyobs","safetyforms","qualityinsp","qualityobs","qualityforms","projdocs","projdir","projspecs","projforms","drawings","changeorders","purchaseorders"].includes(modal)&&<SForm iS={iS} S={S} projects={projects} initial={editTgt} tab={modal} onSave={d=>{const m={safetyinsp:setSafetyInsp,safetyobs:setSafetyObs,safetyforms:setSafetyForms,qualityinsp:setQualityInsp,qualityobs:setQualityObs,qualityforms:setQualityForms,projdocs:setProjDocs,projdir:setProjDir,projspecs:setProjSpecs,projforms:setProjForms,drawings:setDrawings,changeorders:setChangeOrders,purchaseorders:setPurchaseOrders};
              // Auto-post approved change orders to financials
              if(modal==="changeorders"&&(d.status==="Approved")&&(!editTgt||editTgt.status!=="Approved")){
                const uid5=()=>Math.random().toString(36).slice(2,9);
                setTransactions(t=>[{id:uid5(),projectId:d.projectId||"",date:d.date||new Date().toISOString().split("T")[0],type:"Income",category:"Change Order",description:"CO Approved: "+(d.title||d.number||"Change Order"),amount:Number(d.amount||d.value||0).toFixed(2),vendor:"",notes:"Auto-posted from CO: "+(d.number||"")},...t]);
                showToast("Change Order posted to Financials");
              }
              saveRec(m[modal],d);}} onCancel={close}/>}
            {modal==="costcode"    &&<CostCodeForm   iS={iS} lS={lS} S={S} projects={projects} initial={editTgt} onSave={d=>saveRec(setCostCodes,d)}      onCancel={close}/>}
            {modal==="transaction" &&<TransactionForm iS={iS} lS={lS} S={S} projects={projects} costCodes={costCodes} initial={editTgt} onSave={d=>saveRec(setTransactions,d)} onCancel={close}/>}
          </div>
        </div>
      )}

      {toast&&<div style={{position:"fixed",bottom:18,right:18,background:toast.type==="error"?"#7f1d1d":"#134e2e",border:`1px solid ${toast.type==="error"?"#ef4444":"#10b981"}`,color:"#e2e8f0",padding:"10px 15px",borderRadius:10,fontSize:13,fontWeight:500,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>{toast.type==="error"?"❌":"✅"} {toast.msg}</div>}
    </div>
  );
}

// ══ FORM COMPONENTS ═══════════════════════════════════════════════════════════
function FF({label,full,children}){return<div style={{gridColumn:full?"1/-1":"auto"}}><label style={{fontSize:10,color:"#4a5580",fontWeight:700,marginBottom:3,display:"block",letterSpacing:.6}}>{label}</label>{children}</div>;}
function mkForms(iS){
  const FIn=({v,u,type="text",ph=""})=><input type={type} value={v||""} onChange={u} placeholder={ph} style={iS}/>;
  const FSel=({v,u,opts})=><select value={v||""} onChange={u} style={iS}>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>;
  const FTA=({v,u,rows=2})=><textarea value={v||""} onChange={u} rows={rows} style={{...iS,resize:"vertical"}}/>;
  const PSel=({projects,v,u})=><select value={v||""} onChange={u} style={iS}><option value="">— Select Project —</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>;
  return{FIn,FSel,FTA,PSel};
}

function FormShell({title,S,onSave,onCancel,label,children}){
  return<div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{title}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{children}</div>
    <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
      <button onClick={onCancel} style={S.btnS}>Cancel</button>
      <button onClick={onSave} style={S.btnP}>Save {label}</button>
    </div>
  </div>;
}

function DailyLogForm({iS,lS,S,projects,initial,onSave,onCancel}){
  const dark=document.body.classList.contains("dark");
  const uid=()=>Math.random().toString(36).slice(2,9);
  const d={
    projectId:projects[0]?.id||"",date:new Date().toISOString().split("T")[0],
    weather:"Clear",tempHigh:"",tempLow:"",humidity:"",windSpeed:"",
    superintendent:"",foreman:"",companyName:"",
    manpower:"",hoursWorked:"",totalHoursDay:"",
    tradeBreakdown:"",
    location:"",workPerformed:"",
    materialDeliveries:"",
    visitors:"",delays:"None",
    safetyIncident:"No",safetyIncidentDesc:"",
    safety:"",notes:"",
    rentalEquipUsed:"",rentalHoursUsed:"",rentalInspectionTime:"",rentalComments:"",
    superintendentSig:"",signedAt:"",meetings:"",
    photos:[]
  };
  const[f,sf]=useState({...d,...initial,photos:initial?.photos||[]});
  const u=k=>e=>sf(p=>({...p,[k]:e.target.value}));
  const{FIn,FSel,FTA,PSel}=mkForms(iS);
  const photoRef=React.useRef();
  const[signing,setSigning]=useState(false);
  const[sigName,setSigName]=useState("");
  const[fetchingWeather,setFetchingWeather]=useState(false);

  React.useEffect(()=>{
    const mp=Number(f.manpower)||0, hw=Number(f.hoursWorked)||0;
    if(mp>0&&hw>0) sf(p=>({...p,totalHoursDay:String(mp*hw)}));
  },[f.manpower,f.hoursWorked]);

  function handlePhotos(e){
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>sf(p=>({...p,photos:[...(p.photos||[]),{name:file.name,data:ev.target.result,size:file.size}]}));
      reader.readAsDataURL(file);
    });
    e.target.value="";
  }
  function removePhoto(idx){sf(p=>({...p,photos:p.photos.filter((_,i)=>i!==idx)}));}

  function fetchWeather(){
    setFetchingWeather(true);
    if(!navigator.geolocation){showWeatherFallback();return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const lat=pos.coords.latitude.toFixed(2);
        const lon=pos.coords.longitude.toFixed(2);
        fetch("https://wttr.in/?format=%t+%h+%w&lang=en")
          .then(r=>r.text())
          .then(txt=>{
            setFetchingWeather(false);
            sf(p=>({...p,notes:(p.notes||"")+(p.notes?"\n":"")+"Weather fetched: "+txt.trim()}));
          })
          .catch(()=>showWeatherFallback());
      },
      ()=>showWeatherFallback()
    );
  }
  function showWeatherFallback(){
    setFetchingWeather(false);
    alert("Could not auto-fetch weather. Please enter manually.");
  }

  function signLog(){
    if(!sigName.trim()){alert("Please enter your name to sign.");return;}
    sf(p=>({...p,superintendentSig:sigName,signedAt:new Date().toLocaleString()}));
    setSigning(false);
    setSigName("");
  }

  const secStyle={gridColumn:"1/-1",marginTop:10,marginBottom:4,paddingBottom:5,borderBottom:"1px solid "+(dark?"#1e2538":"#e2e8f0"),fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#FF8A00"};

  return(
    <div style={{width:"100%"}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{f.id?"Edit":"New"} Daily Log</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

        <div style={secStyle}>Project Information</div>
        <FF label="PROJECT" full><PSel projects={projects} v={f.projectId} u={u("projectId")}/></FF>
        <FF label="DATE"><FIn type="date" v={f.date} u={u("date")}/></FF>
        <FF label="LOCATION / AREA" full><FIn v={f.location} u={u("location")} ph="e.g. Level 3 - Mechanical Room"/></FF>

        <div style={secStyle}>Weather Conditions</div>
        <FF label="CONDITIONS">
          <FSel v={f.weather} u={u("weather")} opts={WEATHER}/>
        </FF>
        <FF label="HIGH TEMP (F)"><FIn type="number" v={f.tempHigh} u={u("tempHigh")} ph="85"/></FF>
        <FF label="LOW TEMP (F)"><FIn type="number" v={f.tempLow} u={u("tempLow")} ph="65"/></FF>
        <FF label="HUMIDITY %"><FIn type="number" v={f.humidity} u={u("humidity")} ph="60"/></FF>
        <FF label="WIND SPEED"><FIn v={f.windSpeed} u={u("windSpeed")} ph="e.g. 10 mph"/></FF>
        <div style={{gridColumn:"1/-1"}}>
          <button type="button" onClick={fetchWeather} style={{...S.btnS,fontSize:11,padding:"5px 12px"}}>
            {fetchingWeather?"Fetching...":"Auto-Fetch Weather"}
          </button>
        </div>

        <div style={secStyle}>Personnel</div>
        <FF label="SUPERINTENDENT"><FIn v={f.superintendent} u={u("superintendent")}/></FF>
        <FF label="FOREMAN"><FIn v={f.foreman} u={u("foreman")}/></FF>
        <FF label="COMPANY NAME" full><FIn v={f.companyName} u={u("companyName")} ph="Subcontractor or company on site"/></FF>
        <FF label="MANPOWER (# of workers)"><FIn type="number" v={f.manpower} u={u("manpower")} ph="0"/></FF>
        <FF label="HOURS WORKED (per worker)"><FIn type="number" v={f.hoursWorked} u={u("hoursWorked")} ph="0"/></FF>
        <FF label="TOTAL MAN-HOURS">
          <div style={{...iS,background:dark?"#0a0e18":"#f0f4f8",color:"#FF8A00",fontWeight:700,fontFamily:"monospace",cursor:"default"}}>
            {f.totalHoursDay||"0"} hrs
          </div>
        </FF>
        <FF label="TRADE BREAKDOWN" full><FIn v={f.tradeBreakdown} u={u("tradeBreakdown")} ph="e.g. 4 Pipefitters, 2 Laborers, 1 Welder"/></FF>

        <div style={secStyle}>Work Performed</div>
        <FF label="WORK PERFORMED TODAY" full><FTA v={f.workPerformed} u={u("workPerformed")} rows={4}/></FF>
        <FF label="MATERIAL DELIVERIES TODAY" full><FIn v={f.materialDeliveries} u={u("materialDeliveries")} ph="e.g. 200ft 4in carbon steel pipe, 20 clevis hangers"/></FF>
        <FF label="VISITORS / INSPECTIONS" full><FIn v={f.visitors} u={u("visitors")}/></FF>
        <FF label="MEETINGS TODAY" full><FIn v={f.meetings} u={u("meetings")} ph="e.g. 9am Safety Kickoff"/></FF>
        <FF label="DELAYS / ISSUES" full><FIn v={f.delays} u={u("delays")}/></FF>

        <div style={secStyle}>Safety</div>
        <FF label="SAFETY INCIDENT TODAY">
          <FSel v={f.safetyIncident} u={u("safetyIncident")} opts={["No","Near Miss","First Aid","Recordable","Property Damage"]}/>
        </FF>
        {f.safetyIncident!=="No"&&(
          <FF label="INCIDENT DESCRIPTION" full><FTA v={f.safetyIncidentDesc} u={u("safetyIncidentDesc")} rows={2}/></FF>
        )}
        <FF label="SAFETY NOTES / TOOLBOX TOPIC" full><FIn v={f.safety} u={u("safety")}/></FF>
        <FF label="ADDITIONAL NOTES" full><FTA v={f.notes} u={u("notes")}/></FF>

        <div style={secStyle}>Rental Equipment</div>
        <FF label="EQUIPMENT USED TODAY" full><FIn v={f.rentalEquipUsed} u={u("rentalEquipUsed")} ph="e.g. CAT 320, Boom Lift #4"/></FF>
        <FF label="HOURS USED"><FIn type="number" v={f.rentalHoursUsed} u={u("rentalHoursUsed")} ph="0"/></FF>
        <FF label="INSPECTION TIME"><FIn v={f.rentalInspectionTime} u={u("rentalInspectionTime")} ph="e.g. 07:00 AM"/></FF>
        <FF label="EQUIPMENT COMMENTS" full><FTA v={f.rentalComments} u={u("rentalComments")} rows={2}/></FF>

        <div style={secStyle}>Site Photos</div>
        <div style={{gridColumn:"1/-1"}}>
          <input ref={photoRef} type="file" accept="image/*" multiple capture="environment" style={{display:"none"}} onChange={handlePhotos}/>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <button type="button" onClick={()=>{photoRef.current.removeAttribute("capture");photoRef.current.click();}} style={{...S.btnP,fontSize:11,padding:"6px 12px"}}>Upload Photos</button>
            <button type="button" onClick={()=>{photoRef.current.setAttribute("capture","environment");photoRef.current.click();}} style={{...S.btnS,fontSize:11,padding:"6px 12px"}}>Take Photo</button>
            <span style={{fontSize:10,color:dark?"#4a5580":"#94a3b8",alignSelf:"center"}}>{f.photos?.length||0} photo{f.photos?.length!==1?"s":""} attached</span>
          </div>
          {f.photos&&f.photos.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
              {f.photos.map((ph,i)=>(
                <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid "+(dark?"#2a3150":"#e2e8f0"),background:dark?"#0f1117":"#f8fafc"}}>
                  <img src={ph.data} alt={ph.name} style={{width:"100%",height:80,objectFit:"cover",display:"block"}}/>
                  <div style={{padding:"3px 5px",fontSize:9,color:dark?"#4a5580":"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ph.name}</div>
                  <button type="button" onClick={()=>removePhoto(i)} style={{position:"absolute",top:3,right:3,width:18,height:18,borderRadius:"50%",background:"rgba(239,68,68,0.9)",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>x</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={secStyle}>Superintendent Sign-Off</div>
        <div style={{gridColumn:"1/-1"}}>
          {f.superintendentSig?(
            <div style={{padding:"10px 14px",background:dark?"rgba(16,185,129,0.08)":"#f0fdf4",border:"1px solid rgba(16,185,129,0.3)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#10b981"}}>Signed by: {f.superintendentSig}</div>
                <div style={{fontSize:10,color:dark?"#4a5580":"#94a3b8",marginTop:2}}>{f.signedAt}</div>
              </div>
              <button type="button" onClick={()=>sf(p=>({...p,superintendentSig:"",signedAt:""}))} style={{...S.btnS,fontSize:10,padding:"4px 9px",color:"#ef4444"}}>Remove</button>
            </div>
          ):signing?(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input value={sigName} onChange={e=>setSigName(e.target.value)} placeholder="Type your full name to sign" style={{...iS,flex:1}}/>
              <button type="button" onClick={signLog} style={{...S.btnP,fontSize:11,padding:"6px 12px"}}>Sign</button>
              <button type="button" onClick={()=>{setSigning(false);setSigName("");}} style={{...S.btnS,fontSize:11,padding:"6px 12px"}}>Cancel</button>
            </div>
          ):(
            <button type="button" onClick={()=>setSigning(true)} style={{...S.btnS,fontSize:11,padding:"6px 14px"}}>Sign Log as Superintendent</button>
          )}
        </div>

      </div>
      <div style={{display:"flex",gap:8,marginTop:18,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={S.btnS}>Cancel</button>
        <button onClick={()=>onSave({...f,projectId:Number(f.projectId),totalHoursDay:String((Number(f.manpower)||0)*(Number(f.hoursWorked)||0)),id:f.id||uid()})} style={S.btnP}>Save Log</button>
      </div>
    </div>
  );
}
