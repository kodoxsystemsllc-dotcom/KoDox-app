function DrawingsTab({S,darkMode,projects,drawings,setDrawings,selProj,openAdd,openEdit,pN,filt,exp,showToast}){
  const[viewer,setViewer]=useState(null);   // drawing record being viewed
  const[markup,setMarkup]=useState(null);   // {type,x,y,text,color,id}
  const[tool,setTool]=useState("pin");      // pin | text | pen | cloud
  const[pinColor,setPinColor]=useState("#ef4444");
  const[annotations,setAnnotations]=useState({});  // {drawingId:[...pins]}
  const[drawing,setDrawing]=useState(false); // pen mode active
  const[penPoints,setPenPoints]=useState([]);
  const[penStrokes,setPenStrokes]=useState({}); // {drawingId:[[points]]}
  const[addPinModal,setAddPinModal]=useState(null); // {x,y,drawingId}
  const[pinForm,setPinForm]=useState({type:"RFI",number:"",note:""});
  const uid=()=>Math.random().toString(36).slice(2,9);
  const rows=filt(drawings).sort((a,b)=>(a.drawingNumber||"").localeCompare(b.drawingNumber||""));
  const dark=darkMode;

  const PIN_TYPES={
    "RFI":     {color:"#3b82f6",icon:"❓"},
    "Punch":   {color:"#ef4444",icon:"🔴"},
    "Note":    {color:"#f59e0b",icon:"📝"},
    "Issue":   {color:"#8b5cf6",icon:"⚠️"},
    "Approved":{color:"#10b981",icon:"✅"},
  };

  function openViewer(row){
    setViewer(row);
    setTool("pin");
    setPenPoints([]);
  }

  function closeViewer(){setViewer(null);}

  function getAnnotations(id){return annotations[id]||[];}
  function getStrokes(id){return penStrokes[id]||[];}

  function handleViewerClick(e){
    if(tool!=="pin"&&tool!=="text"&&tool!=="cloud")return;
    const rect=e.currentTarget.getBoundingClientRect();
    const x=((e.clientX-rect.left)/rect.width*100).toFixed(2);
    const y=((e.clientY-rect.top)/rect.height*100).toFixed(2);
    setAddPinModal({x,y,drawingId:viewer.id});
    setPinForm({type:"RFI",number:"",note:""});
  }

  function savePin(){
    if(!addPinModal)return;
    const pin={
      id:uid(),
      x:addPinModal.x,
      y:addPinModal.y,
      type:pinForm.type,
      number:pinForm.number,
      note:pinForm.note,
      color:PIN_TYPES[pinForm.type]?.color||"#ef4444",
      icon:PIN_TYPES[pinForm.type]?.icon||"📍",
      createdAt:new Date().toISOString().split("T")[0],
    };
    setAnnotations(prev=>({
      ...prev,
      [addPinModal.drawingId]:[...(prev[addPinModal.drawingId]||[]),pin],
    }));
    setAddPinModal(null);
    showToast("Markup saved");
  }

  function removePin(drawingId,pinId){
    setAnnotations(prev=>({
      ...prev,
      [drawingId]:(prev[drawingId]||[]).filter(p=>p.id!==pinId),
    }));
  }

  function handleFileUpload(e,row){
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){showToast("File must be under 10MB","error");return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      setDrawings(l=>l.map(d=>d.id===row.id?{...d,fileData:ev.target.result,fileName:file.name,fileType:file.type}:d));
      showToast("Drawing uploaded");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }

  const TOOLS=[
    {id:"pin",  icon:"📍", label:"Pin"},
    {id:"text", icon:"💬", label:"Note"},
    {id:"cloud",icon:"☁️", label:"Cloud"},
  ];

  const STATUS_COLORS={
    "Issued for Construction":"#10b981",
    "For Review":"#f59e0b",
    "Preliminary":"#3b82f6",
    "Superseded":"#6b7280",
    "Void":"#ef4444",
    "Approved":"#10b981",
  };

  return(
    <div>
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,...S.text}}>📜 Drawings</div>
          <div style={{fontSize:12,...S.text3,marginTop:2}}>{rows.length} drawing{rows.length!==1?"s":""} · Click a row to view and mark up</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>exp(rows,["drawingNumber","title","discipline","revision","date","status","issuedBy","fileName","notes"],"drawings_export")} style={S.btnS}>⬇ Export CSV</button>
          <button onClick={()=>openAdd("drawings")} style={{...S.btnP,background:"#0ea5e9"}}>+ Add Drawing</button>
        </div>
      </div>

      {/* DRAWING LOG TABLE */}
      {!rows.length
        ?<div style={{...S.card,padding:40,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>📜</div>
            <div style={{fontSize:15,fontWeight:600,...S.text,marginBottom:8}}>No Drawings Yet</div>
            <div style={{fontSize:13,...S.text3,marginBottom:20}}>Add drawings to your log and upload PDF or image files to enable markup.</div>
            <button onClick={()=>openAdd("drawings")} style={{...S.btnP,background:"#0ea5e9"}}>+ Add First Drawing</button>
          </div>
        :<div style={{...S.card,overflow:"hidden",marginBottom:16}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={S.tHead}>
                  {["DWG #","TITLE","DISCIPLINE","REV","DATE","STATUS","FILE","MARKUPS","ACTIONS"].map(h=>(
                    <th key={h} style={{padding:"9px 12px",textAlign:"left",...S.text3,fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>{
                  const pins=getAnnotations(row.id);
                  const sc2=STATUS_COLORS[row.status]||"#64748b";
                  return(
                    <tr key={row.id} style={{...S.tRow,cursor:"pointer"}}
                      onMouseEnter={e=>e.currentTarget.style.background=dark?"rgba(255,138,0,0.05)":"rgba(14,165,233,0.04)"}
                      onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px",fontWeight:700,color:"#0ea5e9",fontFamily:"monospace",fontSize:12}}>{row.drawingNumber||"—"}</td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px",...S.text,fontWeight:500,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.title||"—"}</td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px",...S.text2}}>{row.discipline||"—"}</td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px",fontFamily:"monospace",fontWeight:700,...S.text}}>{row.revision||"—"}</td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px",fontFamily:"monospace",fontSize:11,...S.text2}}>{row.date||"—"}</td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px"}}>
                        {row.status?<span style={{background:sc2+"18",color:sc2,border:`1px solid ${sc2}40`,padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{row.status}</span>:"—"}
                      </td>
                      <td style={{padding:"9px 12px"}}>
                        {row.fileData
                          ?<button onClick={()=>openViewer(row)} style={{...S.btnS,padding:"3px 9px",fontSize:10,color:"#10b981",border:"1px solid rgba(16,185,129,0.4)"}}>📄 View</button>
                          :<label style={{...S.btnS,padding:"3px 9px",fontSize:10,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
                              ⬆ Upload
                              <input type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>handleFileUpload(e,row)}/>
                            </label>
                        }
                      </td>
                      <td onClick={()=>openViewer(row)} style={{padding:"9px 12px"}}>
                        {pins.length>0
                          ?<span style={{background:"rgba(255,138,0,0.1)",color:"#FF8A00",border:"1px solid rgba(255,138,0,0.3)",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700}}>{pins.length} markup{pins.length!==1?"s":""}</span>
                          :<span style={{...S.text3,fontSize:11}}>—</span>
                        }
                      </td>
                      <td style={{padding:"9px 12px"}}>
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={e=>{e.stopPropagation();openEdit("drawings",row);}} style={{...S.btnS,padding:"4px 9px",fontSize:10}}>Edit</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      }

      {/* MARKUP SUMMARY CARDS */}
      {Object.keys(annotations).length>0&&(
        <div style={{...S.card,padding:16,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,...S.text3,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Active Markups</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(annotations).map(([drawingId,pins])=>{
              if(!pins.length)return null;
              const dwg=drawings.find(d=>d.id===drawingId);
              return(
                <div key={drawingId} onClick={()=>{const d=drawings.find(x=>x.id===drawingId);if(d)openViewer(d);}}
                  style={{...S.card,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,border:"1px solid rgba(255,138,0,0.2)"}}>
                  <span style={{fontWeight:700,color:"#0ea5e9",fontFamily:"monospace",fontSize:11}}>{dwg?.drawingNumber||"?"}</span>
                  <span style={{fontSize:11,...S.text2}}>{dwg?.title||"Unknown"}</span>
                  <span style={{background:"rgba(255,138,0,0.1)",color:"#FF8A00",border:"1px solid rgba(255,138,0,0.3)",padding:"1px 7px",borderRadius:99,fontSize:10,fontWeight:700}}>{pins.length}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── VIEWER MODAL ── */}
      {viewer&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",flexDirection:"column"}}>

          {/* VIEWER TOOLBAR */}
          <div style={{background:"#0f172a",padding:"10px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0,flexWrap:"wrap",borderBottom:"1px solid rgba(255,138,0,0.2)"}}>
            <button onClick={closeViewer} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#e2e8f0",padding:"6px 14px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600}}>✕ Close</button>
            <div style={{fontWeight:700,color:"#fff",fontSize:13,flex:1}}>
              <span style={{color:"#0ea5e9",fontFamily:"monospace"}}>{viewer.drawingNumber}</span>
              <span style={{color:"rgba(255,255,255,0.5)",margin:"0 8px"}}>·</span>
              {viewer.title}
              {viewer.revision&&<span style={{marginLeft:8,background:"rgba(255,138,0,0.15)",color:"#FF8A00",padding:"1px 7px",borderRadius:4,fontSize:10,fontWeight:700}}>{viewer.revision}</span>}
            </div>

            {/* MARKUP TOOLS */}
            {viewer.fileData&&(
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginRight:4}}>MARKUP:</span>
                {TOOLS.map(t=>(
                  <button key={t.id} onClick={()=>setTool(t.id)}
                    style={{background:tool===t.id?"rgba(255,138,0,0.25)":"rgba(255,255,255,0.06)",border:tool===t.id?"1px solid rgba(255,138,0,0.6)":"1px solid rgba(255,255,255,0.1)",color:tool===t.id?"#FF8A00":"#94a3b8",padding:"5px 11px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:tool===t.id?700:400,display:"flex",alignItems:"center",gap:4}}>
                    {t.icon} {t.label}
                  </button>
                ))}
                {getAnnotations(viewer.id).length>0&&(
                  <button onClick={()=>{if(window.confirm("Clear all markups on this drawing?"))setAnnotations(prev=>({...prev,[viewer.id]:[]}));}}
                    style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",padding:"5px 11px",borderRadius:6,cursor:"pointer",fontSize:11}}>
                    🗑 Clear
                  </button>
                )}
              </div>
            )}

            {/* Upload if no file */}
            {!viewer.fileData&&(
              <label style={{background:"linear-gradient(135deg,#0ea5e9,#0284c7)",border:"none",color:"#fff",padding:"7px 16px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:6}}>
                ⬆ Upload Drawing File (PDF or Image)
                <input type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>{handleFileUpload(e,viewer);setViewer(v=>({...v,...drawings.find(d=>d.id===v.id)}));}}/>
              </label>
            )}
          </div>

          {/* VIEWER BODY */}
          <div style={{flex:1,overflow:"auto",display:"flex",gap:0}}>

            {/* DRAWING CANVAS */}
            <div style={{flex:1,position:"relative",overflow:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:16}}>
              {viewer.fileData?(
                <div style={{position:"relative",display:"inline-block",cursor:tool==="pin"||tool==="text"||tool==="cloud"?"crosshair":"default"}}
                  onClick={handleViewerClick}>
                  {viewer.fileType==="application/pdf"
                    ?<iframe src={viewer.fileData} style={{width:"min(900px,90vw)",height:"80vh",border:"none",borderRadius:8,display:"block"}} title={viewer.title}/>
                    :<img src={viewer.fileData} alt={viewer.title} style={{maxWidth:"min(900px,90vw)",maxHeight:"80vh",display:"block",borderRadius:8,userSelect:"none"}}/>
                  }
                  {/* PINS OVERLAY — only shows on images */}
                  {viewer.fileType!=="application/pdf"&&getAnnotations(viewer.id).map(pin=>(
                    <div key={pin.id} title={`${pin.type} ${pin.number}: ${pin.note}`}
                      style={{position:"absolute",left:pin.x+"%",top:pin.y+"%",transform:"translate(-50%,-100%)",cursor:"pointer",zIndex:10}}
                      onClick={e=>{e.stopPropagation();}}>
                      <div style={{background:pin.color,color:"#fff",borderRadius:"50% 50% 50% 0",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.8)"}}>
                        {pin.icon}
                      </div>
                      {pin.number&&<div style={{background:pin.color,color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,marginTop:2,whiteSpace:"nowrap",textAlign:"center"}}>{pin.type} {pin.number}</div>}
                    </div>
                  ))}
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16,color:"rgba(255,255,255,0.4)"}}>
                  <div style={{fontSize:60}}>📜</div>
                  <div style={{fontSize:16,fontWeight:600,color:"rgba(255,255,255,0.7)"}}>No file uploaded yet</div>
                  <div style={{fontSize:13}}>Upload a PDF or image to view and mark up this drawing</div>
                </div>
              )}
            </div>

            {/* MARKUP PANEL */}
            <div style={{width:260,background:"#0d1117",borderLeft:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",flexShrink:0}}>
              <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"rgba(255,138,0,0.8)",letterSpacing:1,textTransform:"uppercase"}}>Markups</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{getAnnotations(viewer.id).length} annotation{getAnnotations(viewer.id).length!==1?"s":""}</div>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
                {!getAnnotations(viewer.id).length
                  ?<div style={{padding:"20px 14px",fontSize:11,color:"rgba(255,255,255,0.25)",textAlign:"center",lineHeight:1.6}}>
                      {viewer.fileData?"Click on the drawing to place a pin markup.":"Upload a drawing file to add markups."}
                    </div>
                  :getAnnotations(viewer.id).map(pin=>(
                    <div key={pin.id} style={{padding:"9px 14px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                        <div style={{width:16,height:16,borderRadius:"50%",background:pin.color,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9}}>{pin.icon}</div>
                        <span style={{fontSize:11,fontWeight:700,color:pin.color}}>{pin.type}{pin.number?" #"+pin.number:""}</span>
                        <button onClick={()=>removePin(viewer.id,pin.id)} style={{marginLeft:"auto",background:"none",border:"none",color:"rgba(255,255,255,0.25)",cursor:"pointer",fontSize:12,padding:0}}>✕</button>
                      </div>
                      {pin.note&&<div style={{fontSize:10,color:"rgba(255,255,255,0.45)",marginLeft:23,lineHeight:1.5}}>{pin.note}</div>}
                      <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginLeft:23,marginTop:3}}>{pin.createdAt}</div>
                    </div>
                  ))
                }
              </div>

              {/* PIN TYPE LEGEND */}
              <div style={{padding:"12px 14px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginBottom:8,letterSpacing:.8,textTransform:"uppercase"}}>Pin Types</div>
                {Object.entries(PIN_TYPES).map(([type,cfg])=>(
                  <div key={type} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:cfg.color,flexShrink:0}}/>
                    <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{cfg.icon} {type}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ADD PIN MODAL */}
      {addPinModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{...S.card,padding:20,width:"100%",maxWidth:380}}>
            <div style={{fontSize:14,fontWeight:700,...S.text,marginBottom:16}}>Add Markup Pin</div>
            <div style={{marginBottom:12}}>
              <label style={S.lS}>Pin Type</label>
              <select value={pinForm.type} onChange={e=>setPinForm(p=>({...p,type:e.target.value}))} style={S.iS}>
                {Object.keys(PIN_TYPES).map(t=><option key={t} value={t}>{PIN_TYPES[t].icon} {t}</option>)}
              </select>
            </div>
            <div style={{marginBottom:12}}>
              <label style={S.lS}>Number / Reference</label>
              <input value={pinForm.number} onChange={e=>setPinForm(p=>({...p,number:e.target.value}))} placeholder="e.g. RFI-003 or Punch #12" style={S.iS}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={S.lS}>Note</label>
              <textarea value={pinForm.note} onChange={e=>setPinForm(p=>({...p,note:e.target.value}))} rows={3} placeholder="Describe the issue or note..." style={{...S.iS,resize:"vertical"}}/>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setAddPinModal(null)} style={S.btnS}>Cancel</button>
              <button onClick={savePin} style={S.btnP}>📍 Place Pin</button>
            </div>
          </div>
        </div>
      )}

      {showAIBOM&&<AIBOMModal S={S} darkMode={darkMode} projects={projects} selProj={selProj} setBOM={setBOM} onClose={()=>setShowAIBOM(false)}/>}
    </div>
  );
}

function PPEInventory({S,darkMode,projects,ppeInventory,setPPEInventory,selProj}){
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const uid=()=>Math.random().toString(36).slice(2,9);
  const blank={
    id:"",projectId:"",itemName:"",category:"",
    make:"",model:"",size:"",color:"",
    quantity:"",quantityMin:"",
    condition:"Good",status:"In Stock",
    assignedTo:"",location:"",
    purchaseDate:"",expiryDate:"",
    certificationRequired:"No",certificationNumber:"",
    lastInspection:"",nextInspection:"",
    notes:""
  };
  const filt2=arr=>arr.filter(x=>!selProj||x.projectId===selProj);
  const rows=filt2(ppeInventory).sort((a,b)=>(a.itemName||"").localeCompare(b.itemName||""));

  const CATEGORIES=[
    "Head Protection","Eye Protection","Face Protection",
    "Hearing Protection","Respiratory Protection","Hand Protection",
    "Foot Protection","Fall Protection","High Visibility",
    "Body Protection","Welding PPE","Chemical Protection","Other"
  ];
  const CONDITIONS=["New","Good","Fair","Needs Replacement","Expired"];
  const STATUSES=["In Stock","In Use","Low Stock","Out of Stock","Expired","Retired"];
  const STATUS_COLOR={
    "In Stock":"#10b981","In Use":"#3b82f6","Low Stock":"#f59e0b",
    "Out of Stock":"#ef4444","Expired":"#dc2626","Retired":"#6b7280"
  };

  function tiAdd(){setForm({...blank,id:""});setModal(true);}
  function tiEdit(r){setForm({...r});setModal(true);}
  function tiDel(id){if(window.confirm("Delete this PPE item?"))setPPEInventory(l=>l.filter(x=>x.id!==id));}
  function tiSave(){
    if(!form.itemName){alert("Item name is required.");return;}
    const rec={...form,id:form.id||uid(),projectId:form.projectId||selProj||""};
    setPPEInventory(l=>form.id?l.map(x=>x.id===rec.id?rec:x):[rec,...l]);
    setModal(false);
  }

  const total    = rows.length;
  const inStock  = rows.filter(r=>r.status==="In Stock").length;
  const lowStock = rows.filter(r=>r.status==="Low Stock").length;
  const expired  = rows.filter(r=>r.status==="Expired"||r.condition==="Expired").length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,...S.text}}>PPE Inventory</div>
          <div style={{fontSize:12,...S.text3,marginTop:2}}>Track all personal protective equipment on site</div>
        </div>
        <button onClick={tiAdd} style={S.btnP}>+ Add PPE Item</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #FF8A00"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Total Items</div>
          <div style={{fontSize:22,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{total}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #10b981"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>In Stock</div>
          <div style={{fontSize:22,fontWeight:800,color:"#10b981",fontFamily:"monospace"}}>{inStock}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #f59e0b"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Low Stock</div>
          <div style={{fontSize:22,fontWeight:800,color:"#f59e0b",fontFamily:"monospace"}}>{lowStock}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #ef4444"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Expired</div>
          <div style={{fontSize:22,fontWeight:800,color:"#ef4444",fontFamily:"monospace"}}>{expired}</div>
        </div>
      </div>

      {!rows.length
        ?<div style={{...S.card,padding:40,textAlign:"center"}}>
            <div style={{fontSize:13,...S.text3,marginBottom:20}}>No PPE items yet. Click Add PPE Item to get started.</div>
            <button onClick={tiAdd} style={S.btnP}>+ Add First PPE Item</button>
          </div>
        :<div style={{...S.card,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={S.tHead}>
                  {["Item","Category","Make / Model","Size","Qty","Min Qty","Condition","Status","Assigned To","Expiry",""].map(h=>(
                    <th key={h} style={{padding:"9px 12px",textAlign:"left",...S.text3,fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>{
                  const sc2=STATUS_COLOR[r.status]||"#6b7280";
                  const isLow=r.quantityMin&&Number(r.quantity||0)<=Number(r.quantityMin||0);
                  const isExp=r.expiryDate&&new Date(r.expiryDate)<new Date();
                  return(
                    <tr key={r.id} style={{...S.tRow,background:isExp?"rgba(239,68,68,0.05)":isLow?"rgba(245,158,11,0.05)":""}}
                      onMouseEnter={e=>e.currentTarget.style.background=darkMode?"rgba(255,138,0,0.05)":"rgba(255,138,0,0.03)"}
                      onMouseLeave={e=>e.currentTarget.style.background=isExp?"rgba(239,68,68,0.05)":isLow?"rgba(245,158,11,0.05)":""}> 
                      <td style={{padding:"9px 12px",fontWeight:600,...S.text}}>{r.itemName}</td>
                      <td style={{padding:"9px 12px",fontSize:12,...S.text2}}>{r.category||"--"}</td>

  const dt=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  const totalWorkers=entries.reduce((s,e)=>(e.tradeLines||[]).reduce((ss,tl)=>ss+Number(tl.workers||0),ss),0);
  const totalHours=entries.reduce((s,e)=>(e.tradeLines||[]).reduce((ss,tl)=>ss+Number(tl.workers||0)*Number(tl.hours||8),ss),0);

  const tradeMap={};

  const rowsHTML=entries.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
    const ew=(e.tradeLines||[]).reduce((s,tl)=>s+Number(tl.workers||0),0);
    const eh=(e.tradeLines||[]).reduce((s,tl)=>s+Number(tl.workers||0)*Number(tl.hours||8),0);
    const trades=(e.tradeLines||[]).filter(tl=>Number(tl.workers||0)>0).map(tl=>`${tl.workers} ${tl.trade}`).join(", ");
    return `<tr>
      <td style="padding:7px 10px;font-size:11px;font-family:monospace;border:1px solid #e2e8f0;">${e.date}</td>

    <div><div style="font-size:24px;font-weight:800;color:#3b82f6;">${totalHours.toFixed(0)}</div><div style="font-size:10px;color:#64748b;text-transform:uppercase;">Man-Hours</div></div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
  <div>
    <div style="background:#0f172a;color:#FF8A00;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:6px 6px 0 0;">Trade Breakdown</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:#f8fafc;">
        <th style="padding:7px 12px;font-size:10px;color:#64748b;text-align:left;border:1px solid #e2e8f0;">Trade</th>
        <th style="padding:7px 12px;font-size:10px;color:#64748b;text-align:center;border:1px solid #e2e8f0;">Workers</th>
        <th style="padding:7px 12px;font-size:10px;color:#64748b;text-align:center;border:1px solid #e2e8f0;">Man-Hours</th>
      </tr></thead>
      <tbody>${tradeRowsHTML}</tbody>
    </table>
  </div>
  <div style="padding:14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;">
    <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">Summary</div>

    <div style="font-size:13px;margin-bottom:6px;"><strong>Total Workers:</strong> <span style="color:#FF8A00;font-weight:700;">${totalWorkers}</span></div>
    <div style="font-size:13px;margin-bottom:6px;"><strong>Total Man-Hours:</strong> <span style="color:#3b82f6;font-weight:700;">${totalHours.toFixed(0)}</span></div>

  </div>
</div>

<div style="background:#0f172a;color:#FF8A00;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:6px 6px 0 0;">Crew Sheet Detail</div>
<table style="width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11px;">
  <thead><tr style="background:#1e293b;">
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:left;border:1px solid #374151;">Date</th>
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:left;border:1px solid #374151;">Project</th>
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:left;border:1px solid #374151;">Company</th>
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:left;border:1px solid #374151;">Foreman</th>

    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:left;border:1px solid #374151;">Trades</th>
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:center;border:1px solid #374151;">Workers</th>
    <th style="padding:7px 10px;font-size:10px;color:#94a3b8;text-align:center;border:1px solid #374151;">Man-Hrs</th>
  </tr></thead>
  <tbody>${rowsHTML}</tbody>
</table>

<div style="margin-top:16px;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;">

  <span>Generated ${dt} | CONFIDENTIAL</span>
</div>
</body></html>`;
  openReport(html);
}

function BOMTab({S,darkMode,projects,bom,setBOM,selProj,costCodes}){
  const dark=darkMode;
  const uid=()=>Math.random().toString(36).slice(2,9);
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[filterCat,setFilterCat]=useState("All");
  const[filterSystem,setFilterSystem]=useState("All");
  const[showImport,setShowImport]=useState(false);
  const[showAIBOM,setShowAIBOM]=useState(false);
  const[importText,setImportText]=useState("");

  const CATEGORIES=[
    "Pipe","Fittings","Flanges","Valves","Specialties",
    "Hangers & Supports","Insulation","Equipment",
    "Instrumentation","Electrical","Civil / Structural","Other"
  ];

  const SYSTEMS=[
    "Chilled Water Supply","Chilled Water Return",
    "Heating Hot Water Supply","Heating Hot Water Return",
    "Condenser Water Supply","Condenser Water Return",
    "Domestic Cold Water","Domestic Hot Water","Domestic Hot Water Return",
    "Natural Gas","Steam","Condensate Return",
    "Fire Protection","Storm Drainage","Sanitary Drainage",
    "Compressed Air","Fuel Oil","Refrigerant","Process","Other"
  ];

  const PIPE_SIZES=["1/2\"","3/4\"","1\"","1-1/4\"","1-1/2\"","2\"","2-1/2\"","3\"","4\"","5\"","6\"","8\"","10\"","12\"","14\"","16\"","18\"","20\"","24\"","N/A"];
  const MATERIALS=["Carbon Steel","Stainless Steel 304","Stainless Steel 316","Copper","Cast Iron","Ductile Iron","CPVC","PVC","HDPE","Galvanized Steel","Black Steel","Chrome Steel","Alloy","Other"];
  const UNITS=["LF","EA","FT","IN","SQ FT","LB","GAL","TON","SET","LOT"];
  const STATUS_OPTS=["Not Started","In Procurement","On Order","Partial Delivery","Delivered","Installed","N/A"];

  const blank={
    id:"",projectId:projects[0]?.id||"",
    category:"Pipe",system:"",
    description:"",spec:"",
    size:"",material:"",
    quantity:"",unit:"LF",
    unitCost:"",totalCost:"",
    vendor:"",partNumber:"",
    submittalRef:"",drawingRef:"",
    laborUnits:"",laborHours:"",
    status:"Not Started",
    notes:""
  };

  const filt2=(bom||[]).filter(b=>
    (!selProj||b.projectId===selProj)&&
    (filterCat==="All"||b.category===filterCat)&&
    (filterSystem==="All"||b.system===filterSystem)
  );

  // Summary calcs
  const totalItems=filt2.length;
  const totalCost=filt2.reduce((s,b)=>s+Number(b.totalCost||0),0);
  const totalLaborHrs=filt2.reduce((s,b)=>s+Number(b.laborHours||0),0);
  const delivered=filt2.filter(b=>b.status==="Delivered"||b.status==="Installed").length;

  // Category breakdown
  const catMap={};
  filt2.forEach(b=>{
    const c=b.category||"Other";
    if(!catMap[c])catMap[c]={count:0,cost:0};
    catMap[c].count++;
    catMap[c].cost+=Number(b.totalCost||0);
  });

  function bomAdd(){setForm({...blank,id:""});setModal(true);}
  function bomEdit(b){setForm({...b});setModal(true);}
  function bomDel(id){if(window.confirm("Delete this BOM item?"))setBOM(l=>l.filter(x=>x.id!==id));}
  function bomSave(){
    if(!form.description){alert("Description is required.");return;}
    const qty=Number(form.quantity||0);
    const uc=Number(form.unitCost||0);
    const tc=qty*uc>0?qty*uc:Number(form.totalCost||0);
    const rec={...form,id:form.id||uid(),
      projectId:form.projectId||selProj||"",
      totalCost:tc.toFixed(2),
      laborHours:form.laborUnits&&form.quantity?(Number(form.laborUnits||0)*Number(form.quantity||0)).toFixed(1):form.laborHours||""
    };
    setBOM(l=>{
      const updated=form.id?l.map(x=>x.id===rec.id?rec:x):[rec,...l];
      // Auto-create material delivery when status set to Delivered
      if(rec.status==="Delivered"&&(!form.id||form.status!=="Delivered")){
        const uid3=()=>Math.random().toString(36).slice(2,9);
        const delivery={
          id:uid3(),
          projectId:rec.projectId||"",
          date:new Date().toISOString().split("T")[0],
          material:rec.description||"",
          quantity:rec.quantity||"",
          unit:rec.unit||"EA",
          vendor:rec.vendor||"",
          condition:"Good",
          status:"Accepted",
          notes:"Auto-created from BOM: "+rec.description
        };
        setMaterials(m=>[delivery,...m]);
      }
      return updated;
    });
    setModal(false);
  }

  // Load template systems
  const TEMPLATES={
    "Chilled Water System":[
      {category:"Pipe",system:"Chilled Water Supply",description:"4\" Carbon Steel Pipe Sch 40",size:"4\"",material:"Carbon Steel",unit:"LF",status:"Not Started"},
      {category:"Pipe",system:"Chilled Water Return",description:"4\" Carbon Steel Pipe Sch 40",size:"4\"",material:"Carbon Steel",unit:"LF",status:"Not Started"},
      {category:"Fittings",system:"Chilled Water Supply",description:"4\" 90 Degree Elbow BW Sch 40",size:"4\"",material:"Carbon Steel",unit:"EA",status:"Not Started"},
      {category:"Valves",system:"Chilled Water Supply",description:"4\" Butterfly Valve Lug Type 200psi",size:"4\"",material:"Carbon Steel",unit:"EA",status:"Not Started"},
      {category:"Hangers & Supports",system:"Chilled Water Supply",description:"4\" Clevis Hanger Fig 260",size:"4\"",material:"Carbon Steel",unit:"EA",status:"Not Started"},
      {category:"Insulation",system:"Chilled Water Supply",description:"4\" Pipe Insulation 1.5\" Fiberglass",size:"4\"",material:"Fiberglass",unit:"LF",status:"Not Started"},
    ],
    "Domestic Water":[
      {category:"Pipe",system:"Domestic Cold Water",description:"2\" Type L Copper Pipe",size:"2\"",material:"Copper",unit:"LF",status:"Not Started"},
      {category:"Pipe",system:"Domestic Hot Water",description:"2\" Type L Copper Pipe",size:"2\"",material:"Copper",unit:"LF",status:"Not Started"},
      {category:"Fittings",system:"Domestic Cold Water",description:"2\" Copper 90 Elbow",size:"2\"",material:"Copper",unit:"EA",status:"Not Started"},
      {category:"Valves",system:"Domestic Cold Water",description:"2\" Ball Valve Full Port Bronze",size:"2\"",material:"Bronze",unit:"EA",status:"Not Started"},
      {category:"Specialties",system:"Domestic Hot Water",description:"Water Heater Commercial 100 Gal",size:"N/A",material:"Steel",unit:"EA",status:"Not Started"},
    ],
    "Natural Gas":[
      {category:"Pipe",system:"Natural Gas",description:"2\" Black Steel Pipe Sch 40",size:"2\"",material:"Black Steel",unit:"LF",status:"Not Started"},
      {category:"Fittings",system:"Natural Gas",description:"2\" 90 Degree Elbow Black Screwed",size:"2\"",material:"Black Steel",unit:"EA",status:"Not Started"},
      {category:"Valves",system:"Natural Gas",description:"2\" Gas Ball Valve Full Port",size:"2\"",material:"Steel",unit:"EA",status:"Not Started"},
    ],
  };

  function bomLoadTemplate(name){
    const items=TEMPLATES[name];
    const proj=selProj||projects[0]?.id||"";
    const newItems=items.map(item=>({...blank,...item,id:uid(),projectId:proj,quantity:"",unitCost:"",totalCost:""}));
    setBOM(l=>[...l,...newItems]);
    setShowImport(false);
  }

  function doImportText(){
    if(!importText.trim()){alert("Paste CSV or tab-delimited data first.");return;}
    const lines=importText.trim().split(/\r?\n/);
    const headers=lines[0].split(/\t|,/).map(h=>h.trim().toLowerCase().replace(/[^a-z]/g,""));
    const imported=lines.slice(1).map(line=>{
      const vals=line.split(/\t|,/);
      const obj={...blank,id:uid(),projectId:selProj||projects[0]?.id||""};
      headers.forEach((h,i)=>{
        if(h==="description")obj.description=vals[i]?.trim()||"";
        if(h==="category")obj.category=vals[i]?.trim()||"Pipe";
        if(h==="size")obj.size=vals[i]?.trim()||"";
        if(h==="material")obj.material=vals[i]?.trim()||"";
        if(h==="quantity"||h==="qty")obj.quantity=vals[i]?.trim()||"";
        if(h==="unit")obj.unit=vals[i]?.trim()||"EA";
        if(h==="unitcost"||h==="cost")obj.unitCost=vals[i]?.trim()||"";
        if(h==="system")obj.system=vals[i]?.trim()||"";
        if(h==="vendor")obj.vendor=vals[i]?.trim()||"";
        if(h==="notes")obj.notes=vals[i]?.trim()||"";
      });
      return obj;
    }).filter(o=>o.description);
    setBOM(l=>[...l,...imported]);
    setImportText("");
    setShowImport(false);
    alert(imported.length+" items imported");
  }

  function bomExport(){
    const rows=[["Category","System","Description","Spec","Size","Material","Qty","Unit","Unit Cost","Total Cost","Labor Units","Labor Hours","Vendor","Part #","Submittal Ref","Drawing Ref","Status","Notes"]];
    filt2.forEach(b=>rows.push([b.category||"",b.system||"",b.description||"",b.spec||"",b.size||"",b.material||"",b.quantity||"",b.unit||"",b.unitCost||"",b.totalCost||"",b.laborUnits||"",b.laborHours||"",b.vendor||"",b.partNumber||"",b.submittalRef||"",b.drawingRef||"",b.status||"",b.notes||""]));
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const bl=new Blob([csv],{type:"text/csv"});
    const u=URL.createObjectURL(bl);
    const a=document.createElement("a");a.href=u;a.download="bom_export.csv";a.click();
    URL.revokeObjectURL(u);
  }

  const STATUS_COLOR={"Not Started":"#64748b","In Procurement":"#f59e0b","On Order":"#3b82f6","Partial Delivery":"#8b5cf6","Delivered":"#10b981","Installed":"#10b981","N/A":"#64748b"};

  return(
    <div>
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,...S.text}}>Bill of Materials</div>
          <div style={{fontSize:12,...S.text3,marginTop:2}}>Full material takeoff linked to systems, cost codes and labor</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={bomExport} style={S.btnS}>Export CSV</button>
          <button onClick={()=>setShowImport(v=>!v)} style={{...S.btnS,color:"#3b82f6",border:"1px solid rgba(59,130,246,0.4)"}}>Import / Templates</button>
          <button onClick={()=>setShowAIBOM(true)} style={{...S.btnS,color:"#FF8A00",border:"1px solid rgba(255,138,0,0.4)",background:"rgba(255,138,0,0.06)"}}>AI Extract</button>
          <button onClick={bomAdd} style={S.btnP}>+ Add Item</button>
        </div>
      </div>

      {/* IMPORT / TEMPLATE PANEL */}
      {showImport&&(
        <div style={{...S.card,padding:20,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,...S.text,marginBottom:14}}>Load Template or Import Data</div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,...S.text3,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Quick Templates</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {Object.keys(TEMPLATES).map(name=>(
                <button key={name} onClick={()=>bomLoadTemplate(name)} style={{...S.btnS,color:"#FF8A00",border:"1px solid rgba(255,138,0,0.4)",padding:"6px 14px",fontSize:12}}>
                  {name}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:700,...S.text3,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Paste CSV or Tab-Delimited Data</div>
            <div style={{fontSize:11,...S.text3,marginBottom:8}}>Columns: description, category, size, material, quantity, unit, unitCost, system, vendor, notes</div>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={6} placeholder={"description,category,size,material,quantity,unit,unitCost\n4\" CS Pipe Sch40,Pipe,4\",Carbon Steel,450,LF,8.50\n4\" 90 Elbow BW,Fittings,4\",Carbon Steel,12,EA,45.00"} style={{...S.iS,resize:"vertical",fontFamily:"monospace",fontSize:11,width:"100%",marginBottom:8}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setShowImport(false);setImportText("");}} style={S.btnS}>Cancel</button>
              <button onClick={doImportText} style={S.btnP}>Import Data</button>
            </div>
          </div>
        </div>
      )}

      {/* SUMMARY CARDS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #FF8A00"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Total Items</div>
          <div style={{fontSize:22,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{totalItems}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #10b981"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Material Cost</div>
          <div style={{fontSize:18,fontWeight:800,color:"#10b981",fontFamily:"monospace"}}>${totalCost.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #3b82f6"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Labor Hours</div>
          <div style={{fontSize:22,fontWeight:800,color:"#3b82f6",fontFamily:"monospace"}}>{totalLaborHrs.toFixed(0)}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #8b5cf6"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Delivered / Installed</div>
          <div style={{fontSize:22,fontWeight:800,color:"#8b5cf6",fontFamily:"monospace"}}>{delivered}/{totalItems}</div>

      <div style={{...S.card,padding:12,marginBottom:14,display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{fontSize:10,fontWeight:700,...S.text3,letterSpacing:.8,textTransform:"uppercase"}}>Filter:</div>

          {CATEGORIES.map(c=><option key={c}>{c}</option>)}

        <select value={filterSystem} onChange={e=>setFilterSystem(e.target.value)} style={{...S.iS,padding:"5px 10px",fontSize:12,minWidth:180}}>

      </div>

      {/* CATEGORY SUMMARY */}
      {Object.keys(catMap).length>0&&(
        <div style={{...S.card,padding:14,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,...S.text,marginBottom:10}}>By Category</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(catMap).sort((a,b)=>b[1].cost-a[1].cost).map(([cat,v])=>(
              <button key={cat} onClick={()=>setFilterCat(cat==="All"?"All":cat)}
                style={{padding:"6px 12px",background:filterCat===cat?"rgba(255,138,0,0.15)":"transparent",border:"1px solid rgba(255,138,0,0.25)",borderRadius:6,cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#FF8A00"}}>{cat}</div>
                <div style={{fontSize:10,...S.text3}}>{v.count} items{v.cost>0?" | $"+v.cost.toLocaleString(undefined,{maximumFractionDigits:0}):""}</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* BOM TABLE */}
      {!filt2.length?(
        <div style={{...S.card,padding:40,textAlign:"center"}}>

          </div>
        </div>
      ):(
        <div style={{...S.card,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>

              <tfoot>
