function FirebaseSync({allState,allSetters,darkMode,S}){
  const[fbStatus,setFbStatus]=useState(window.KoDoxFirebase&&window.KoDoxFirebase.connected?"connected":"disconnected");
  const[fbUser,setFbUser]=useState(null);
  const[fbEmail,setFbEmail]=useState("");
  const[fbPass,setFbPass]=useState("");
  const[fbConfig,setFbConfig]=useState(localStorage.getItem("kodox_firebase_config")||"");
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[authMode,setAuthMode]=useState("signin");
  const[fbError,setFbError]=useState("");
  const dark=darkMode;

  function fbInitAuth(){
    if(window.KoDoxFirebase&&window.KoDoxFirebase.auth){
      window.KoDoxFirebase.onAuthChange(function(user){
        setFbUser(user);
        if(user)setFbStatus("signed-in");
        else setFbStatus("connected");
      });
    }
  }
  function fbSaveConfig(){
    setFbStatus("connected");
    setFbError("");
    fbInitAuth();
  }
    function fbSignIn(){
    setFbError("Signing in...");
    window.KoDoxFirebase.signIn(fbEmail,fbPass)
      .then(function(r){
        localStorage.setItem("kodox_email",fbEmail);
        setFbUser(r.user);setFbStatus("signed-in");setFbError("");
      })
      .catch(function(e){setFbError(e.message);});
  }
  function fbSignUp(){
    setFbError("Creating account...");
    window.KoDoxFirebase.signUp(fbEmail,fbPass)
      .then(function(r){
        localStorage.setItem("kodox_email",fbEmail);
        setFbUser(r.user);setFbStatus("signed-in");setFbError("");
      })
      .catch(function(e){setFbError(e.message);});
  }
  function fbSignOut(){window.KoDoxFirebase.signOut().then(function(){setFbUser(null);setFbStatus("connected");});}
  function fbPush(){
    if(!fbUser)return;setSyncing(true);
    window.KoDoxFirebase.save(fbUser.uid,allState)
      .then(function(){setSyncing(false);setLastSync(new Date().toLocaleTimeString());})
      .catch(function(e){setSyncing(false);setFbError(e.message);});
  }
  function fbPull(){
    if(!fbUser)return;setSyncing(true);
    window.KoDoxFirebase.load(fbUser.uid)
      .then(function(data){
        setSyncing(false);
        if(data&&allSetters){Object.keys(allSetters).forEach(function(k){if(data[k]!==undefined)allSetters[k](data[k]);});setLastSync(new Date().toLocaleTimeString());}
      })
      .catch(function(e){setSyncing(false);setFbError(e.message);});
  }
  const sc2=fbStatus==="signed-in"?"#10b981":fbStatus==="connected"?"#f59e0b":"#6b7280";
  const sl=fbStatus==="signed-in"?"Synced - "+(fbUser?fbUser.email:""):fbStatus==="connected"?"Connected - Not Signed In":"Not Connected";
  return(
    <div>
      <div style={{fontSize:18,fontWeight:700,...S.text,marginBottom:6}}>Firebase Cloud Sync</div>
      <div style={{fontSize:12,...S.text3,marginBottom:20}}>Sync your data across devices in real time.</div>
      <div style={{...S.card,padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{width:12,height:12,borderRadius:"50%",background:sc2,flexShrink:0}}/>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:sc2}}>{sl}</div>
          {lastSync&&<div style={{fontSize:10,...S.text3,marginTop:2}}>Last sync: {lastSync}</div>}
        </div>
        {fbStatus==="signed-in"&&(
          <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={fbPush} style={{...S.btnP,padding:"6px 14px",fontSize:12}}>{syncing?"Syncing...":"Push Data"}</button>
            <button onClick={fbPull} style={{...S.btnS,padding:"6px 14px",fontSize:12,color:"#3b82f6"}}>{syncing?"Loading...":"Pull Data"}</button>
            <button onClick={fbSignOut} style={{...S.btnS,padding:"6px 14px",fontSize:12}}>Sign Out</button>
          </div>
        )}
      </div>
      {fbError&&<div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,fontSize:12,color:"#ef4444",marginBottom:14}}>{fbError}</div>}
      <div style={{...S.card,padding:20,marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,...S.text,marginBottom:4}}>Step 1 - Firebase Config</div>
        <div style={{fontSize:11,...S.text3,marginBottom:12}}>Paste your Firebase config object below then tap Connect.</div>
        <textarea value={fbConfig} onChange={e=>setFbConfig(e.target.value)} rows={8} placeholder={"paste config here"} style={{...S.iS,fontFamily:"monospace",fontSize:11,resize:"vertical",width:"100%",marginBottom:10}}/>
        <button onClick={fbSaveConfig} style={S.btnP}>Connect to Firebase</button>
      </div>
      {fbStatus!=="disconnected"&&(
        <div style={{...S.card,padding:20,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,...S.text,marginBottom:12}}>Step 2 - Sign In</div>
          {fbStatus==="signed-in"?(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:12,...S.text}}>Signed in as <strong>{fbUser?fbUser.email:""}</strong></div>
              <button onClick={fbSignOut} style={{...S.btnS,padding:"5px 12px",fontSize:11}}>Sign Out</button>
            </div>
          ):(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <button onClick={()=>setAuthMode("signin")} style={{...S.btnS,flex:1,color:authMode==="signin"?"#FF8A00":"",border:authMode==="signin"?"1px solid rgba(255,138,0,0.5)":""}}>Sign In</button>
                <button onClick={()=>setAuthMode("signup")} style={{...S.btnS,flex:1,color:authMode==="signup"?"#FF8A00":"",border:authMode==="signup"?"1px solid rgba(255,138,0,0.5)":""}}>Create Account</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div><label style={S.lS}>Email</label><input type="email" value={fbEmail} onChange={e=>setFbEmail(e.target.value)} placeholder="you@email.com" style={S.iS}/></div>
                <div><label style={S.lS}>Password</label><input type="password" value={fbPass} onChange={e=>setFbPass(e.target.value)} placeholder="Password" style={S.iS}/></div>
              </div>
              <button onClick={authMode==="signin"?fbSignIn:fbSignUp} style={S.btnP}>{authMode==="signin"?"Sign In":"Create Account"}</button>
            </div>
          )}
        </div>
      )}
      {fbStatus==="signed-in"&&(
        <div style={{...S.card,padding:20}}>
          <div style={{fontSize:12,fontWeight:700,...S.text,marginBottom:10}}>Step 3 - Sync Data</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{padding:"12px 16px",background:dark?"rgba(16,185,129,0.08)":"#f0fdf4",border:"1px solid rgba(16,185,129,0.3)",borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"#10b981",marginBottom:6}}>Push to Cloud</div>
              <div style={{fontSize:10,...S.text3,marginBottom:10}}>Save all local data to Firebase</div>
              <button onClick={fbPush} style={{...S.btnP,width:"100%",fontSize:11}}>{syncing?"Syncing...":"Push Data"}</button>
            </div>
            <div style={{padding:"12px 16px",background:dark?"rgba(59,130,246,0.08)":"#eff6ff",border:"1px solid rgba(59,130,246,0.3)",borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",marginBottom:6}}>Pull from Cloud</div>
              <div style={{fontSize:10,...S.text3,marginBottom:10}}>Load latest data from another device</div>
              <button onClick={fbPull} style={{...S.btnS,width:"100%",fontSize:11,color:"#3b82f6",border:"1px solid rgba(59,130,246,0.4)"}}>{syncing?"Loading...":"Pull Data"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AIBOMModal({S,darkMode,projects,selProj,setBOM,onClose}){
  const[apiKey]=useState(()=>localStorage.getItem("kodox_ai_key")||"");
  const[specText,setSpecText]=useState("");
  const[loading,setLoading]=useState(false);
  const[preview,setPreview]=useState([]);
  const[error,setError]=useState("");
  const[step,setStep]=useState(1);
  const uid=()=>Math.random().toString(36).slice(2,9);
  const dark=darkMode;

  const SYSTEM_PROMPT=`You are a mechanical/piping construction estimator. 
Extract materials from the provided specification or takeoff text and return ONLY a JSON array.
Each item must have these exact fields:
- description: full material description
- category: one of [Pipe, Fittings, Flanges, Valves, Specialties, Hangers & Supports, Insulation, Equipment, Instrumentation, Other]
- size: pipe or item size (e.g. "4\"", "2-1/2\"", "N/A")
- material: material type (e.g. "Carbon Steel", "Copper", "Stainless Steel 304", "Cast Iron")
- quantity: numeric quantity only
- unit: one of [LF, EA, FT, SQ FT, LB, SET, LOT]
- unitCost: leave blank as ""
- system: best guess at system (e.g. "Chilled Water Supply", "Domestic Cold Water", "Natural Gas", "Steam", "Fire Protection", etc.)
- notes: any spec section, standard, or schedule reference

Return ONLY valid JSON array, no explanation, no markdown, no backticks.
Example: [{"description":"4\" Sch 40 CS Pipe","category":"Pipe","size":"4\"","material":"Carbon Steel","quantity":"200","unit":"LF","unitCost":"","system":"Chilled Water Supply","notes":"ASTM A53"}]`;

  function runAI(){
    if(!apiKey){setError("No API key found. Add your Anthropic API key in Settings.");return;}
    if(!specText.trim()){setError("Paste some spec text or a material list first.");return;}
    setLoading(true);setError("");setPreview([]);

    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        system:SYSTEM_PROMPT,
        messages:[{role:"user",content:"Extract all materials from this text:\n\n"+specText}]
      })
    })
    .then(r=>r.json())
    .then(data=>{
      setLoading(false);
      if(data.error){setError("API error: "+data.error.message);return;}
      const text=data.content[0].text.trim();
      try{
        const items=JSON.parse(text);
        if(!Array.isArray(items)||items.length===0){setError("No materials found. Try pasting more detailed spec text.");return;}
        setPreview(items);
        setStep(2);
      }catch(e){setError("Could not parse response. Try again with clearer spec text.");}
    })
    .catch(e=>{setLoading(false);setError("Network error: "+e.message);});
  }

  function addToBOM(){
    const proj=selProj||projects[0]?.id||"";
    const newItems=preview.map(item=>({
      id:uid(),
      projectId:proj,
      category:item.category||"Other",
      system:item.system||"",
      description:item.description||"",
      spec:item.notes||"",
      size:item.size||"",
      material:item.material||"",
      quantity:item.quantity||"",
      unit:item.unit||"EA",
      unitCost:item.unitCost||"",
      totalCost:"",
      vendor:"",
      partNumber:"",
      submittalRef:"",
      drawingRef:"",
      laborUnits:"",
      laborHours:"",
      status:"Not Started",
      notes:item.notes||""
    }));
    setBOM(l=>[...l,...newItems]);
    onClose();
  }

  const CAT_COLOR={
    "Pipe":"#3b82f6","Fittings":"#8b5cf6","Flanges":"#6366f1",
    "Valves":"#ef4444","Specialties":"#f59e0b","Hangers & Supports":"#10b981",
    "Insulation":"#14b8a6","Equipment":"#FF8A00","Instrumentation":"#ec4899","Other":"#64748b"
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
      <div style={{...S.card,padding:24,width:"100%",maxWidth:700,maxHeight:"92vh",overflowY:"auto"}}>

        {/* HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,...S.text}}>AI BOM Assistant</div>
            <div style={{fontSize:11,...S.text3,marginTop:2}}>Paste spec text - Claude extracts your material list automatically</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{padding:"3px 10px",background:"rgba(255,138,0,0.12)",border:"1px solid rgba(255,138,0,0.3)",borderRadius:99,fontSize:10,fontWeight:700,color:"#FF8A00"}}>
              Step {step} of 2
            </div>
            <button onClick={onClose} style={{...S.btnS,padding:"4px 10px",fontSize:11}}>Close</button>
          </div>
        </div>

        {!apiKey&&(
          <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,fontSize:12,color:"#ef4444",marginBottom:16}}>
            No API key found. Go to <strong>Admin - Settings</strong> and add your Anthropic API key first.
          </div>
        )}

        {error&&(
          <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,fontSize:12,color:"#ef4444",marginBottom:16}}>{error}</div>
        )}

        {/* STEP 1: INPUT */}
        {step===1&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,...S.text3,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Paste Spec Section, Scope of Work, or Material List</div>
            <div style={{fontSize:11,...S.text3,marginBottom:10,lineHeight:1.7}}>
              Works with: spec sections, submittal schedules, scope of work text, CSV takeoffs, or any text listing materials and quantities.
            </div>
            <textarea
              value={specText}
              onChange={e=>setSpecText(e.target.value)}
              rows={12}
              placeholder={"Example:\n\nSection 22 11 16 - Domestic Water Piping\n\nFurnish and install the following:\n- 200 LF of 2\" Type L copper pipe\n- 45 each 2\" copper 90-degree elbows\n- 12 each 2\" full port ball valves\n- 8 each 2\" copper tee fittings\n- Insulate all domestic cold water piping with 1\" fiberglass insulation\n\nOr paste a CSV:\n4\" Sch 40 CS Pipe, 450, LF\n4\" 90 Elbow BW, 24, EA"}
              style={{...S.iS,resize:"vertical",fontFamily:"monospace",fontSize:11,width:"100%",marginBottom:14,minHeight:200}}
            />
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",alignItems:"center"}}>
              <div style={{fontSize:11,...S.text3}}>{specText.length} chars</div>
              <button onClick={runAI} disabled={loading||!specText.trim()||!apiKey}
                style={{...S.btnP,padding:"8px 20px",fontSize:13,opacity:loading||!specText.trim()||!apiKey?0.5:1}}>
                {loading?"Analyzing...":"Extract Materials with AI"}
              </button>
            </div>
            {loading&&(
              <div style={{marginTop:14,padding:"12px 16px",background:"rgba(255,138,0,0.06)",border:"1px solid rgba(255,138,0,0.2)",borderRadius:8,fontSize:12,...S.text3,textAlign:"center"}}>
                Claude is reading your spec text and extracting materials...
              </div>
            )}
          </div>
        )}

        {/* STEP 2: PREVIEW */}
        {step===2&&preview.length>0&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,...S.text}}>{preview.length} items extracted</div>
              <button onClick={()=>{setStep(1);setPreview([]);}} style={{...S.btnS,padding:"4px 10px",fontSize:11}}>Back</button>
            </div>

            {/* PREVIEW TABLE */}
            <div style={{...S.card,overflow:"hidden",marginBottom:16}}>
              <div style={{overflowX:"auto",maxHeight:340,overflowY:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={S.tHead}>
                      {["CAT","DESCRIPTION","SIZE","MATERIAL","QTY","UNIT","SYSTEM"].map(h=>(
                        <th key={h} style={{padding:"7px 10px",textAlign:"left",...S.text3,fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap",position:"sticky",top:0,background:dark?"#0d1117":"#f8fafc"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {preview.map((item,i)=>{
                      const cc=CAT_COLOR[item.category]||"#64748b";
                      return(
                        <tr key={i} style={{...S.tRow}}>
                          <td style={{padding:"7px 10px"}}>
                            <span style={{background:cc+"22",color:cc,border:"1px solid "+cc+"44",padding:"2px 7px",borderRadius:99,fontSize:9,fontWeight:700,whiteSpace:"nowrap"}}>{item.category}</span>
                          </td>
                          <td style={{padding:"7px 10px",...S.text,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={item.description}>{item.description}</td>
                          <td style={{padding:"7px 10px",fontFamily:"monospace",fontWeight:700,...S.text,whiteSpace:"nowrap"}}>{item.size||"--"}</td>
                          <td style={{padding:"7px 10px",...S.text2,whiteSpace:"nowrap"}}>{item.material||"--"}</td>
                          <td style={{padding:"7px 10px",fontWeight:700,color:"#FF8A00",fontFamily:"monospace"}}>{item.quantity||"--"}</td>
                          <td style={{padding:"7px 10px",...S.text2}}>{item.unit||"--"}</td>
                          <td style={{padding:"7px 10px",fontSize:10,...S.text3,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.system||"--"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{padding:"10px 14px",background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:8,fontSize:11,...S.text3,marginBottom:16,lineHeight:1.7}}>
              Review the items above. You can edit quantities, costs and details after adding to your BOM. All items will be added to your current project.
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setStep(1);setPreview([]);setSpecText("");}} style={S.btnS}>Start Over</button>
              <button onClick={addToBOM} style={{...S.btnP,background:"linear-gradient(135deg,#10b981,#059669)",fontSize:13,padding:"8px 20px"}}>
                Add {preview.length} Items to BOM
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function PlanOfDay({S,darkMode,tasks,dailyLogs,equipment,rental,materials,safetyInsp,qualityInsp,jsas,rfis,submittals,manpowerEntries,punchList,actionItems,selProj,pN,setTab,onClose,todayStr,settings}){
  const td=todayStr||new Date().toISOString().split("T")[0];
  const[speaking,setSpeaking]=useState(false);
  const[speechDone,setSpeechDone]=useState(false);
  const[exporting,setExporting]=useState(false);
  const todayEquip=(equipment||[]).filter(e=>e.deliveryDate===td||e.date===td);
  const todayMats=(materials||[]).filter(m=>m.date===td||m.deliveryDate===td);
  const todayRent=(rental||[]).filter(r=>r.date===td||r.deliveryDate===td);
  const todaySI=(safetyInsp||[]).filter(i=>i.date===td||i.dueDate===td);
  const todayQI=(qualityInsp||[]).filter(i=>i.date===td||i.dueDate===td);
  const todayRFIs=(rfis||[]).filter(r=>r.dueDate===td&&r.status!=="Answered"&&r.status!=="Closed");
  const todaySubs=(submittals||[]).filter(s=>s.requiredDate===td&&s.status!=="Approved");
  const todayLA=(tasks||[]).filter(t=>(!selProj||t.projectId===selProj)&&t.startDate===td&&t.status!=="Complete");
  const todayLog=(dailyLogs||[]).find(l=>l.date===td)||{};
  const openPunch=(punchList||[]).filter(p=>(!selProj||p.projectId===selProj)&&p.status!=="Complete"&&p.priority==="High");
  const openActions=(actionItems||[]).filter(a=>(!selProj||a.projectId===selProj)&&a.dueDate<=td&&a.status!=="Complete");
  const yd=(()=>{const d=new Date(td+"T12:00:00");d.setDate(d.getDate()-1);return d.toISOString().split("T")[0];})();
  const mp=(manpowerEntries||[]).find(e=>(!selProj||e.projectId===selProj)&&e.date===td)||(manpowerEntries||[]).find(e=>(!selProj||e.projectId===selProj)&&e.date===yd)||null;
  const lines=(mp&&mp.tradeLines||[]).filter(t=>Number(t.workers||0)>0);
  const totW=lines.reduce((s,t)=>s+Number(t.workers||0),0);
  const totH=lines.reduce((s,t)=>s+Number(t.workers||0)*Number(t.hours||8),0);
  const rates=JSON.parse(localStorage.getItem("kodox_labor_rates")||"{}");
  const estCost=lines.reduce((s,t)=>{
    const tr=(t.trade||"").toLowerCase();
    const r=tr.includes("pipe")?rates.pipefitter:tr.includes("weld")?rates.welder:tr.includes("fore")?rates.foreman:tr.includes("help")||tr.includes("labor")?rates.helper:rates.default||65;
    return s+Number(t.workers||0)*Number(t.hours||8)*(r||65);
  },0);
  const dl=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const greetHour=new Date().getHours();
  const greet=greetHour<12?"Good morning":greetHour<17?"Good afternoon":"Good evening";

  function buildScript(){
    const p=[];
    p.push(greet+". Here is your plan of the day for "+dl+".");
    if(totW>0) p.push("You have "+totW+" workers on site today for a total of "+totH+" man hours.");
    else p.push("No crew sheet found for today.");
    if(estCost>0) p.push("Estimated labor cost today is $"+Math.round(estCost).toLocaleString()+".");
    if(todayLA.length>0) p.push("The 6 week look ahead shows "+todayLA.length+" activit"+(todayLA.length===1?"y":"ies")+" starting today.");
    const eq=todayEquip.length+todayRent.length;
    if(eq>0) p.push("You have "+eq+" equipment deliver"+(eq===1?"y":"ies")+" scheduled.");
    if(todayMats.length>0) p.push("There are "+todayMats.length+" material deliver"+(todayMats.length===1?"y":"ies")+" expected.");
    const ins=todaySI.length+todayQI.length;
    if(ins>0) p.push("You have "+ins+" inspection"+(ins===1?"":"s")+" scheduled today.");
    if(todayRFIs.length>0) p.push("There are "+todayRFIs.length+" RFI"+(todayRFIs.length===1?"":"s")+" due today.");
    if(todaySubs.length>0) p.push(todaySubs.length+" submittal"+(todaySubs.length===1?"":"s")+" are due today.");
    if(openPunch.length>0) p.push("There are "+openPunch.length+" high priority punch list items open.");
    if(openActions.length>0) p.push(openActions.length+" action item"+(openActions.length===1?"":"s")+" are overdue.");
    if(todayLog.visitors) p.push("Scheduled visitors: "+todayLog.visitors+".");
    if(todayLog.meetings) p.push("Meetings today: "+todayLog.meetings+".");
    p.push("That is your plan of the day. Have a safe and productive day.");
    return p.join(" ");
  }

  function speak(){
    if(!window.speechSynthesis){alert("Text to speech not supported on this browser.");return;}
    window.speechSynthesis.cancel();
    const utter=new SpeechSynthesisUtterance(buildScript());
    utter.rate=0.92;utter.pitch=1.0;utter.volume=1.0;
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(v=>v.name.includes("Samantha")||v.name.includes("Google US")||v.name.includes("Microsoft David")||v.name.includes("Alex"));
    if(pref) utter.voice=pref;
    utter.onstart=()=>{setSpeaking(true);setSpeechDone(false);};
    utter.onend=()=>{setSpeaking(false);setSpeechDone(true);};
    utter.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(utter);
  }

  function stopSpeak(){window.speechSynthesis&&window.speechSynthesis.cancel();setSpeaking(false);}

  function buildPrintHTML(){
    const secHTML=(title,items,color)=>items.length===0?"":"<div class=\"section\"><div class=\"sec-hdr\" style=\"background:"+color+"\">"+title.toUpperCase()+"</div>"+items.map(it=>"<div class=\"item\">"+it+"</div>").join("")+"</div>";
    const tradeRows=lines.map(t=>"<div class=\"trade-row\"><span>"+t.trade+"</span><span style=\"color:#FF8A00;font-weight:700\">"+t.workers+" workers x "+t.hours+"hrs</span></div>").join("");
    return "<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>Plan of the Day - "+td+"</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;font-size:11px;color:#1a1a1a;padding:20px;}.header{background:#0f1a2e;color:white;padding:16px 20px;margin-bottom:16px;border-radius:4px;}.header .lbl{font-size:8px;font-weight:700;color:#FF8A00;letter-spacing:3px;text-transform:uppercase;}.header .ttl{font-size:18px;font-weight:800;margin-top:4px;}.header .sub{font-size:10px;color:#aab;margin-top:2px;}.summary{background:#f5f7fa;border-left:4px solid #FF8A00;padding:12px 14px;margin-bottom:14px;border-radius:0 4px 4px 0;font-size:11px;line-height:1.7;color:#2a2a2a;}.sum-lbl{font-size:8px;font-weight:700;color:#FF8A00;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}.stat{background:#f0f4ff;border-radius:4px;padding:8px 10px;text-align:center;}.sl{font-size:8px;color:#888;letter-spacing:1px;text-transform:uppercase;}.sv{font-size:20px;font-weight:900;color:#FF8A00;}.section{margin-bottom:12px;page-break-inside:avoid;}.sec-hdr{color:white;font-size:9px;font-weight:700;padding:4px 8px;border-radius:3px 3px 0 0;letter-spacing:1px;}.item{font-size:10px;padding:4px 8px;border-bottom:1px solid #eee;color:#333;}.trade-row{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #eee;font-size:10px;}.footer{margin-top:20px;padding-top:10px;border-top:1px solid #ddd;font-size:9px;color:#999;display:flex;justify-content:space-between;}@media print{body{padding:10px;}@page{margin:12mm;}}</style></head><body>"
      +"<div class=\"header\"><div class=\"lbl\">KoDox Systems | Plan of the Day</div><div class=\"ttl\">"+dl+"</div><div class=\"sub\">Generated: "+new Date().toLocaleString()+"</div></div>"
      +"<div class=\"summary\"><div class=\"sum-lbl\">Morning Summary</div>"+buildScript()+"</div>"
      +(totW>0?"<div class=\"grid\"><div class=\"stat\"><div class=\"sl\">Workers</div><div class=\"sv\">"+totW+"</div></div><div class=\"stat\"><div class=\"sl\">Man-Hours</div><div class=\"sv\">"+totH+"</div></div>"+(estCost>0?"<div class=\"stat\"><div class=\"sl\">Est Cost</div><div class=\"sv\" style=\"font-size:14px\">$"+Math.round(estCost).toLocaleString()+"</div></div>":"")+"</div><div class=\"section\"><div class=\"sec-hdr\" style=\"background:#1e3a5f\">CREW BREAKDOWN</div>"+tradeRows+"</div>":"")
      +secHTML("6-Week Look-Ahead Starting Today",todayLA.map(t=>t.description||t.trade||"Activity"),"#1e4a8c")
      +secHTML("Equipment Deliveries",[...todayEquip,...todayRent].map(e=>(e.equipment||e.description||"Equipment")+(e.vendor?" - "+e.vendor:"")),"#5b21b6")
      +secHTML("Material Deliveries",todayMats.map(m=>(m.material||m.description||"Material")+(m.vendor?" - "+m.vendor:"")),"#065f46")
      +secHTML("Inspections",[...todaySI.map(i=>"Safety: "+(i.type||"Inspection")+(i.inspector?" - "+i.inspector:"")),...todayQI.map(i=>"Quality: "+(i.type||"Inspection")+(i.inspector?" - "+i.inspector:""))],"#991b1b")
      +secHTML("RFIs Due Today",todayRFIs.map(r=>"RFI "+(r.rfiNumber||r.number||"")+": "+(r.subject||"")),"#991b1b")
      +secHTML("Submittals Due",todaySubs.map(s=>s.description||"Submittal"),"#6b21a8")
      +secHTML("High Priority Punch List",openPunch.map(p=>p.description||"Punch item"),"#92400e")
      +(todayLog.visitors?"<div class=\"section\"><div class=\"sec-hdr\" style=\"background:#0e7490\">SCHEDULED VISITORS</div><div class=\"item\">"+todayLog.visitors+"</div></div>":"")
      +(todayLog.meetings?"<div class=\"section\"><div class=\"sec-hdr\" style=\"background:#92400e\">MEETINGS TODAY</div><div class=\"item\">"+todayLog.meetings+"</div></div>":"")
      +"<div class=\"footer\"><span>KoDox Systems | Superintendent Command Center</span><span>CONFIDENTIAL - Internal Use Only</span></div>"
      +"</body></html>";
  }

  function doPrint(){
    const w=window.open("","_blank");
    if(!w){alert("Please allow popups to print.");return;}
    w.document.write(buildPrintHTML());
    w.document.close();
    w.focus();
    setTimeout(()=>{w.print();},500);
  }

  function doPDF(){
    setExporting(true);
    try{
      const jsPDF=window.jspdf&&window.jspdf.jsPDF;
      if(!jsPDF){alert("PDF library loading. Please wait a moment and try again.");setExporting(false);return;}
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
      const pw=doc.internal.pageSize.getWidth();
      const ph=doc.internal.pageSize.getHeight();
      let y=18;
      const margin=18;
      const cw=pw-margin*2;
      const lh=6;
      const newPage=()=>{doc.addPage();y=18;};
      const chk=()=>{if(y>ph-20) newPage();};

      // Header
      doc.setFillColor(15,26,46);doc.rect(0,0,pw,28,"F");
      doc.setTextColor(255,138,0);doc.setFontSize(8);doc.setFont("helvetica","bold");
      doc.text("KODOX SYSTEMS  |  PLAN OF THE DAY",margin,10);
      doc.setTextColor(230,230,230);doc.setFontSize(14);
      doc.text(dl,margin,20);
      doc.setFontSize(8);doc.setTextColor(150,150,170);
      doc.text("Generated: "+new Date().toLocaleString(),pw-margin,20,{align:"right"});
      y=36;

      const secHdr=(title,rgb)=>{chk();doc.setFillColor(...rgb);doc.rect(margin,y,cw,7,"F");doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.text(title.toUpperCase(),margin+3,y+5);y+=10;};
      const txt=(t,indent)=>{chk();doc.setTextColor(40,40,40);doc.setFontSize(9);doc.setFont("helvetica","normal");const ls=doc.splitTextToSize((indent?"  - ":"")+t,cw-(indent?4:0));ls.forEach(l=>{chk();doc.text(l,margin+(indent?4:0),y);y+=lh;});};
      const kv=(k,v,rgb)=>{chk();doc.setFont("helvetica","bold");doc.setTextColor(80,80,80);doc.setFontSize(9);const kw=doc.getTextWidth(k+": ");doc.text(k+": ",margin,y);doc.setFont("helvetica","normal");if(rgb)doc.setTextColor(...rgb);else doc.setTextColor(40,40,40);doc.text(String(v),margin+kw,y);y+=lh;};

      // Summary box
      doc.setFillColor(245,247,250);doc.setDrawColor(255,138,0);doc.setLineWidth(0.5);doc.roundedRect(margin,y,cw,30,2,2,"FD");
      doc.setTextColor(255,138,0);doc.setFontSize(8);doc.setFont("helvetica","bold");doc.text("MORNING SUMMARY",margin+4,y+6);
      doc.setTextColor(40,40,40);doc.setFontSize(9);doc.setFont("helvetica","normal");
      const sl=doc.splitTextToSize(buildScript(),cw-8);
      sl.slice(0,3).forEach((l,i)=>{doc.text(l,margin+4,y+12+(i*6));});
      y+=34;

      if(totW>0){
        secHdr("Manpower - "+(mp&&mp.date===td?"Today":"Projected"),[30,60,100]);
        kv("Total Workers",totW,[200,80,0]);kv("Total Man-Hours",totH,[200,80,0]);
        if(estCost>0) kv("Est. Labor Cost","$"+Math.round(estCost).toLocaleString(),[200,80,0]);
        lines.forEach(t=>txt(t.trade+": "+t.workers+" workers x "+t.hours+"hrs",true));y+=2;
      }
      if(todayLA.length>0){secHdr("6-Week Look-Ahead Starting Today",[30,90,160]);todayLA.forEach(t=>txt((t.description||t.trade||"Activity"),true));y+=2;}
      const eq=[...todayEquip,...todayRent];
      if(eq.length>0){secHdr("Equipment Deliveries",[80,50,150]);eq.forEach(e=>txt((e.equipment||e.description||"Equipment")+(e.vendor?" - "+e.vendor:""),true));y+=2;}
      if(todayMats.length>0){secHdr("Material Deliveries",[20,130,100]);todayMats.forEach(m=>txt((m.material||m.description||"Material"),true));y+=2;}
      const ins=[...todaySI.map(i=>"Safety: "+(i.type||"Inspection")),...todayQI.map(i=>"Quality: "+(i.type||"Inspection"))];
      if(ins.length>0){secHdr("Inspections Scheduled",[180,40,40]);ins.forEach(i=>txt(i,true));y+=2;}
      if(todayRFIs.length>0){secHdr("RFIs Due Today",[180,40,40]);todayRFIs.forEach(r=>txt("RFI "+(r.rfiNumber||r.number||"")+": "+(r.subject||""),true));y+=2;}
      if(todaySubs.length>0){secHdr("Submittals Due",[100,40,160]);todaySubs.forEach(s=>txt(s.description||"Submittal",true));y+=2;}
      if(openPunch.length>0){secHdr("High Priority Punch List",[180,120,20]);openPunch.slice(0,10).forEach(p=>txt(p.description||"Punch item",true));y+=2;}
      if(todayLog.visitors){secHdr("Scheduled Visitors",[0,130,180]);txt(todayLog.visitors,false);y+=2;}
      if(todayLog.meetings){secHdr("Meetings Today",[200,80,0]);txt(todayLog.meetings,false);y+=2;}

      const tp=doc.internal.getNumberOfPages();
      for(let i=1;i<=tp;i++){
        doc.setPage(i);
        doc.setFillColor(15,26,46);doc.rect(0,ph-12,pw,12,"F");
        doc.setTextColor(100,100,120);doc.setFontSize(8);
        doc.text("KoDox Systems  |  Superintendent Command Center  |  CONFIDENTIAL",margin,ph-4);
        doc.text("Page "+i+" of "+tp,pw-margin,ph-4,{align:"right"});
      }
      doc.save("POD_"+td+".pdf");
    }catch(e){alert("PDF error: "+e.message);}
    setExporting(false);
  }

  const row=(label,items,color,tab)=>items.length>0&&(
    <div style={{...S.card,padding:"10px 12px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:tab?"pointer":"default",marginBottom:6}} onClick={tab?()=>{setTab(tab);onClose();}:undefined}>
        <span style={{fontSize:12,fontWeight:700,...S.text}}>{label}</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{background:color+"22",color:color,border:"1px solid "+color+"44",borderRadius:99,padding:"1px 8px",fontSize:10,fontWeight:700}}>{items.length}</span>
          {tab&&<span style={{fontSize:9,...S.text3}}>tap</span>}
        </div>
      </div>
      {items.slice(0,3).map((it,i)=><div key={i} style={{fontSize:11,...S.text3,padding:"3px 0",borderTop:"1px solid rgba(255,255,255,0.05)"}}>{it}</div>)}
      {items.length>3&&<div style={{fontSize:10,color:color,marginTop:3}}>+{items.length-3} more</div>}
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:10}}>
      <div style={{...S.card,width:"100%",maxWidth:600,maxHeight:"92vh",display:"flex",flexDirection:"column",padding:0}}>
        <div style={{background:"linear-gradient(135deg,#0f1a2e,#1a2a40)",padding:"14px 16px",borderBottom:"1px solid rgba(255,138,0,0.3)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,color:"#FF8A00",letterSpacing:3,textTransform:"uppercase"}}>Plan of the Day</div>
            <div style={{fontSize:15,fontWeight:800,...S.text,marginTop:2}}>{dl}</div>
          </div>
          <button onClick={onClose} style={{...S.btnS,padding:"5px 12px",fontSize:11}}>Close</button>
        </div>
        <div style={{overflowY:"auto",padding:"12px 12px 20px",flex:1}}>
          <div style={{...S.card,padding:"14px 16px",marginBottom:12,background:darkMode?"linear-gradient(135deg,#0d1520,#111d2e)":"linear-gradient(135deg,#f0f4ff,#e8f0ff)",border:"1px solid rgba(255,138,0,0.25)"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#FF8A00",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Morning Briefing</div>
            <div style={{fontSize:13,...S.text,lineHeight:1.7,marginBottom:14}}>
              {greet}. <strong style={{color:"#FF8A00"}}>{dl}</strong>.{" "}
              {totW>0?<span>You have <strong style={{color:"#FF8A00"}}>{totW} workers</strong> on site ({totH} man-hrs). </span>:<span>No crew sheet yet. </span>}
              {(todayEquip.length+todayRent.length)>0&&<span><strong style={{color:"#8b5cf6"}}>{todayEquip.length+todayRent.length} equipment</strong> deliver{todayEquip.length+todayRent.length===1?"y":"ies"} expected. </span>}
              {todayMats.length>0&&<span><strong style={{color:"#10b981"}}>{todayMats.length} material</strong> deliver{todayMats.length===1?"y":"ies"} expected. </span>}
              {(todaySI.length+todayQI.length)>0&&<span><strong style={{color:"#ef4444"}}>{todaySI.length+todayQI.length} inspection{todaySI.length+todayQI.length>1?"s":""}</strong> scheduled. </span>}
              {todayRFIs.length>0&&<span><strong style={{color:"#ef4444"}}>{todayRFIs.length} RFI{todayRFIs.length>1?"s":""}</strong> due today. </span>}
              {openPunch.length>0&&<span><strong style={{color:"#f59e0b"}}>{openPunch.length} high-priority punch</strong> item{openPunch.length>1?"s":""} open. </span>}
              {todayLog.meetings&&<span>Meetings: <strong style={{color:"#0ea5e9"}}>{todayLog.meetings}</strong>. </span>}
              {estCost>0&&<span>Est. labor cost: <strong style={{color:"#FF8A00"}}>${Math.round(estCost).toLocaleString()}</strong>.</span>}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {!speaking?(
                <button onClick={speak} style={{...S.btnP,padding:"9px 14px",fontSize:12,flex:1,minWidth:120}}>
                  {speechDone?"Play Again":"Listen"}
                </button>
              ):(
                <button onClick={stopSpeak} style={{...S.btnP,padding:"9px 14px",fontSize:12,flex:1,minWidth:120,background:"#7f1d1d"}}>Stop</button>
              )}
              <button onClick={doPrint} style={{...S.btnS,padding:"9px 14px",fontSize:12,flex:1,minWidth:80}}>Print</button>
              <button onClick={doPDF} disabled={exporting} style={{...S.btnS,padding:"9px 14px",fontSize:12,flex:1,minWidth:100}}>{exporting?"Saving...":"Save PDF"}</button>
            </div>
            {speaking&&<div style={{fontSize:11,color:"#FF8A00",marginTop:8,textAlign:"center"}}>Reading briefing...</div>}
          </div>

          {mp?(
            <div style={{...S.card,padding:"10px 12px",marginBottom:8,cursor:"pointer"}} onClick={()=>{setTab("manpower");onClose();}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:700,...S.text}}>Manpower {mp.date===td?"Today":"(Projected)"}</span>
                <span style={{fontSize:9,...S.text3}}>tap to view</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"+(estCost>0?" 1fr":""),gap:8,marginBottom:8}}>
                <div style={{background:"rgba(255,138,0,0.1)",borderRadius:6,padding:"6px 8px",textAlign:"center"}}>
                  <div style={{fontSize:9,...S.text3,letterSpacing:1,textTransform:"uppercase"}}>Workers</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#FF8A00"}}>{totW}</div>
                </div>
                <div style={{background:"rgba(255,138,0,0.1)",borderRadius:6,padding:"6px 8px",textAlign:"center"}}>
                  <div style={{fontSize:9,...S.text3,letterSpacing:1,textTransform:"uppercase"}}>Man-Hours</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#FF8A00"}}>{totH}</div>
                </div>
                {estCost>0&&<div style={{background:"rgba(255,138,0,0.1)",borderRadius:6,padding:"6px 8px",textAlign:"center"}}>
                  <div style={{fontSize:9,...S.text3,letterSpacing:1,textTransform:"uppercase"}}>Est. Cost</div>
                  <div style={{fontSize:16,fontWeight:900,color:"#FF8A00"}}>${Math.round(estCost).toLocaleString()}</div>
                </div>}
              </div>
              {lines.map((t,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderTop:"1px solid rgba(255,255,255,0.05)",...S.text}}><span>{t.trade}</span><span style={{color:"#FF8A00",fontWeight:700}}>{t.workers} x {t.hours}hrs</span></div>)}
            </div>
          ):<div style={{...S.card,padding:"10px 12px",marginBottom:8,fontSize:11,...S.text3}}>No crew sheet yet. Add in Manpower Report.</div>}

          {row("6-Week Look-Ahead Starting Today",todayLA.map(t=>t.description||t.trade||"Activity"),"#3b82f6","lookahead")}
          {row("Equipment Deliveries Today",[...todayEquip,...todayRent].map(e=>e.equipment||e.description||"Equipment"),"#8b5cf6","equipment")}
          {row("Material Deliveries Today",todayMats.map(m=>m.material||m.description||"Material"),"#10b981","materials")}
          {row("Inspections Scheduled",[...todaySI.map(i=>"Safety: "+(i.type||"Inspection")),...todayQI.map(i=>"Quality: "+(i.type||"Inspection"))],"#ef4444","safetyinsp")}
          {row("RFIs Due Today",todayRFIs.map(r=>"RFI "+(r.rfiNumber||r.number||"")+": "+(r.subject||"")),"#ef4444","rfis")}
          {row("Submittals Due Today",todaySubs.map(s=>s.description||"Submittal"),"#8b5cf6","submittals")}
          {row("High Priority Punch List",openPunch.map(p=>p.description||"Punch item"),"#f59e0b","punchlist")}
          {row("Overdue Action Items",openActions.map(a=>a.description||"Action item"),"#ef4444","actionitems")}
          {todayLog.visitors&&<div style={{...S.card,padding:"10px 12px",marginBottom:8}}><div style={{fontSize:12,fontWeight:700,...S.text,marginBottom:4}}>Scheduled Visitors</div><div style={{fontSize:11,...S.text3}}>{todayLog.visitors}</div></div>}
          {todayLog.meetings&&<div style={{...S.card,padding:"10px 12px",marginBottom:8}}><div style={{fontSize:12,fontWeight:700,...S.text,marginBottom:4}}>Meetings Today</div><div style={{fontSize:11,...S.text3}}>{todayLog.meetings}</div></div>}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>{setTab("dashboard");onClose();}} style={{...S.btnP,flex:1}}>Dashboard</button>
            <button onClick={()=>{setTab("dailylogs");onClose();}} style={{...S.btnS,flex:1}}>Daily Log</button>
          </div>
        </div>
      </div>
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
