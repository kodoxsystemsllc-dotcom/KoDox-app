          </div>
        </div>
      </div>

      {/* ── RESET ── */}
      <div style={{...S.card,padding:24,marginBottom:16,border:"1px solid rgba(239,68,68,0.3)"}}>
        {sectionHdr("⚠️ Reset Application")}
        <div style={{fontSize:12,...S.text3,marginBottom:16,lineHeight:1.7}}>
          Permanently deletes <strong style={{color:"#ef4444"}}>ALL data</strong> — every project, task, daily log, budget entry, RFI, submittal, drawing, and setting. <strong style={{...S.text}}>This cannot be undone.</strong> Export a backup first.
        </div>
        <button onClick={()=>{
          if(window.confirm("DELETE ALL DATA?\n\nThis will permanently erase everything.\n\nThis CANNOT be undone.")){
            if(window.confirm("Final confirmation — click OK to delete everything and restart.")){
              try{localStorage.clear();}catch(e){}
              try{indexedDB.deleteDatabase("KoDoxIDB");}catch(e){}
              window.location.reload();
            }
          }
        }} style={{background:"linear-gradient(135deg,#ef4444,#b91c1c)",border:"none",color:"#fff",padding:"10px 20px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 2px 12px rgba(239,68,68,0.3)"}}>
          🗑 Reset App — Delete All Data
        </button>
      </div>

      {/* ── APP INFO ── */}
      <div style={{...S.card,padding:24}}>
        {sectionHdr("ℹ️ App Information")}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:12}}>
          {[
            ["Application","KoDox Command Center"],
            ["Version","v4.0 — Field Operations"],
            ["Build","2026 Edition"],
            ["Platform","Progressive Web App"],
            ["Storage","Local + IndexedDB"],
            ["Support","kodoxsystems.com"],
          ].map(([k,v])=>(
            <div key={k} style={{padding:"10px 12px",background:dark?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:7,border:dark?"1px solid rgba(255,255,255,0.06)":"1px solid #e2e8f0"}}>
              <div style={{fontSize:10,...S.text3,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{k}</div>
              <div style={{fontWeight:600,...S.text}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}

function ManpowerTab({dailyLogs,projects,S,darkMode,pN,companyName,manpowerEntries,setManpowerEntries,selProj}){
  const dark=darkMode;
  const uid=()=>Math.random().toString(36).slice(2,9);
  const[df,sdf]=useState(fmt(new Date(today.getTime()-30*86400000)));
  const[dt,sdt]=useState(fmt(today));
  const[gb,sgb]=useState("trade");
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[savedTemplates,setSavedTemplates]=useState([]);
  const[showTemplates,setShowTemplates]=useState(false);
  const[templateName,setTemplateName]=useState("");

  const TRADES=[
    "Pipefitter","Welder","Helper / Laborer","Fire Watch","Spotter",
    "Controls Tech","Operator","Plumber","HVAC Tech","Electrician",
    "Ironworker","Carpenter","Superintendent","Foreman","Inspector",
    "Safety Officer","QC Inspector","Other"
  ];

  const blankCrew={
    id:"",date:new Date().toISOString().split("T")[0],
    projectId:projects[0]?.id||"",
    superintendent:"",foreman:"",company:"",shift:"Day",
    tradeLines:[
      {id:uid(),trade:"Pipefitter",workers:0,hours:8},
    ],
    notes:""
  };

  const filt2=(manpowerEntries||[]).filter(e=>
    (!selProj||e.projectId===selProj)&&e.date>=df&&e.date<=dt
  );

  // Log entries from daily logs too
  const logEntries=dailyLogs.filter(l=>
    (!selProj||l.projectId===selProj)&&l.date>=df&&l.date<=dt&&(l.manpower||l.crewCount)
  );

  // Calculate totals from crew entries
  const totalWorkers=filt2.reduce((s,e)=>s+(e.tradeLines||[]).reduce((ss,tl)=>ss+Number(tl.workers||0),0),0)
    +logEntries.reduce((s,l)=>s+Number(l.manpower||l.crewCount||0),0);
  const totalHours=filt2.reduce((s,e)=>s+(e.tradeLines||[]).reduce((ss,tl)=>ss+Number(tl.workers||0)*Number(tl.hours||8),0),0)
    +logEntries.reduce((s,l)=>s+Number(l.totalHoursDay||0),0);

  // Peak day
  const dayMap={};
  filt2.forEach(e=>{
    const w=(e.tradeLines||[]).reduce((s,tl)=>s+Number(tl.workers||0),0);
    if(!dayMap[e.date])dayMap[e.date]=0;
    dayMap[e.date]+=w;
  });
  logEntries.forEach(l=>{
    if(!dayMap[l.date])dayMap[l.date]=0;
    dayMap[l.date]+=Number(l.manpower||l.crewCount||0);
  });
  const peakDay=Object.entries(dayMap).sort((a,b)=>b[1]-a[1])[0];
  const avgPerDay=Object.keys(dayMap).length>0?(totalWorkers/Object.keys(dayMap).length).toFixed(1):0;

  // Trade breakdown across all entries
  const tradeMap={};
  filt2.forEach(e=>{
    (e.tradeLines||[]).forEach(tl=>{
      const t=tl.trade||"Other";
      if(!tradeMap[t])tradeMap[t]={workers:0,hours:0};
      tradeMap[t].workers+=Number(tl.workers||0);
      tradeMap[t].hours+=Number(tl.workers||0)*Number(tl.hours||8);
    });
  });

  function mpAdd(){
    const yesterday=filt2.sort((a,b)=>b.date.localeCompare(a.date))[0];
    setForm({...blankCrew,id:"",date:new Date().toISOString().split("T")[0],
      tradeLines:yesterday?yesterday.tradeLines.map(tl=>({...tl,id:uid(),workers:tl.workers})):[{id:uid(),trade:"Pipefitter",workers:0,hours:8}]
    });
    setModal(true);
  }

  function mpEdit(e){setForm({...e,tradeLines:e.tradeLines.map(tl=>({...tl}))});setModal(true);}
  function mpDel(id){if(window.confirm("Delete this crew entry?"))setManpowerEntries(l=>l.filter(x=>x.id!==id));}

  function addTradeLine(){
    setForm(p=>({...p,tradeLines:[...p.tradeLines,{id:uid(),trade:"Pipefitter",workers:0,hours:8}]}));
  }
  function removeTradeLine(id){
    setForm(p=>({...p,tradeLines:p.tradeLines.filter(tl=>tl.id!==id)}));
  }
  function updateTrade(id,key,val){
    setForm(p=>({...p,tradeLines:p.tradeLines.map(tl=>tl.id===id?{...tl,[key]:val}:tl)}));
  }
  function adjustWorkers(id,delta){
    setForm(p=>({...p,tradeLines:p.tradeLines.map(tl=>tl.id===id?{...tl,workers:Math.max(0,Number(tl.workers||0)+delta)}:tl)}));
  }

  function saveTemplate(){
    if(!templateName.trim()){alert("Enter a template name.");return;}
    const tmpl={id:uid(),name:templateName,tradeLines:form.tradeLines.map(tl=>({...tl}))};
    setSavedTemplates(t=>[...t,tmpl]);
    setTemplateName("");
    setShowTemplates(false);
  }
  function loadTemplate(tmpl){
    setForm(p=>({...p,tradeLines:tmpl.tradeLines.map(tl=>({...tl,id:uid()}))}));
    setShowTemplates(false);
  }

  function mpSave(){
    const hasWorkers=form.tradeLines.some(tl=>Number(tl.workers||0)>0);
    if(!form.date){alert("Date is required.");return;}
    if(!hasWorkers){alert("At least one trade must have workers > 0.");return;}
    const rec={...form,id:form.id||uid(),projectId:form.projectId||selProj||""};
    setManpowerEntries(l=>form.id?l.map(x=>x.id===rec.id?rec:x):[rec,...l]);
    // Auto-post labor to financials
    if(typeof setTransactions==="function"&&rec.tradeLines){
      const totalHrs=rec.tradeLines.reduce(function(s,tl){return s+Number(tl.workers||0)*Number(tl.hours||8);},0);
      if(totalHrs>0){
        const uid4=()=>Math.random().toString(36).slice(2,9);
        const sr=JSON.parse(localStorage.getItem("kodox_labor_rates")||"{}");
        const totalCost=rec.tradeLines.reduce(function(sum,tl){
          const hrs=Number(tl.workers||0)*Number(tl.hours||8);
          const t=(tl.trade||"").toLowerCase();
          const rate=t.includes("weld")?Number(sr.welder||95):t.includes("help")||t.includes("labor")?Number(sr.helper||55):t.includes("foreman")?Number(sr.foreman||90):t.includes("fitter")||t.includes("pipe")?Number(sr.pipefitter||85):Number(sr.default||65);
          return sum+hrs*rate;
        },0);
        setTransactions(function(t){return [{id:uid4(),projectId:rec.projectId||"",date:rec.date,type:"Expense",category:"Labor",description:"Crew labor - "+rec.date+(rec.company?" ("+rec.company+")":""),amount:totalCost.toFixed(2),vendor:rec.company||"",notes:rec.tradeLines.filter(function(tl){return Number(tl.workers||0)>0;}).map(function(tl){return tl.workers+"x "+tl.trade;}).join(", ")+" = "+totalHrs+" hrs"},...t];});
      }
    }
    setModal(false);
  }

  // Live totals in modal
  const modalTotal=form.tradeLines?(form.tradeLines.reduce((s,tl)=>s+Number(tl.workers||0),0)):0;
  const modalHours=form.tradeLines?(form.tradeLines.reduce((s,tl)=>s+Number(tl.workers||0)*Number(tl.hours||8),0)):0;

  const iS2={background:dark?"#0f1117":"#fff",border:"1px solid "+(dark?"#2a3150":"#e2e8f0"),borderRadius:8,padding:"8px 11px",fontSize:13,color:dark?"#e2e8f0":"#1c2333"};

  function doExport(){
    const rows=[["Date","Shift","Superintendent","Foreman","Company","Trade","Workers","Hrs/Worker","Man-Hours"]];
    filt2.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
      (e.tradeLines||[]).filter(tl=>Number(tl.workers||0)>0).forEach(tl=>{
        rows.push([e.date,e.shift||"Day",e.superintendent||"",e.foreman||"",e.company||"",tl.trade,tl.workers,tl.hours||8,(Number(tl.workers||0)*Number(tl.hours||8))]);
      });
    });
    const csv=rows.map(r=>r.map(c=>'"'+c+'"').join(",")).join("\n");
    const b=new Blob([csv],{type:"text/csv"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=u;a.download="manpower_crew_report.csv";a.click();
    URL.revokeObjectURL(u);
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,...S.text}}>Manpower Report</div>
          <div style={{fontSize:12,...S.text3,marginTop:2}}>Daily crew sheets with full trade breakdown</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doExport} style={S.btnS}>Export CSV</button>
          <button onClick={mpAdd} style={S.btnP}>+ New Crew Sheet</button>
        </div>
      </div>

      {/* FILTERS */}
      <div style={{...S.card,padding:14,marginBottom:14}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div><label style={{fontSize:10,...S.text3,fontWeight:700,display:"block",marginBottom:3}}>FROM</label><input type="date" value={df} onChange={e=>sdf(e.target.value)} style={iS2}/></div>
          <div><label style={{fontSize:10,...S.text3,fontWeight:700,display:"block",marginBottom:3}}>TO</label><input type="date" value={dt} onChange={e=>sdt(e.target.value)} style={iS2}/></div>
        </div>
      </div>

      {/* SUMMARY CARDS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #FF8A00"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Total Workers</div>
          <div style={{fontSize:22,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{totalWorkers}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #3b82f6"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Total Man-Hours</div>
          <div style={{fontSize:22,fontWeight:800,color:"#3b82f6",fontFamily:"monospace"}}>{totalHours.toFixed(0)}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #10b981"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Avg Workers/Day</div>
          <div style={{fontSize:22,fontWeight:800,color:"#10b981",fontFamily:"monospace"}}>{avgPerDay}</div>
        </div>
        <div style={{...S.card,padding:"14px 16px",borderTop:"3px solid #8b5cf6"}}>
          <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Peak Day</div>
          <div style={{fontSize:16,fontWeight:800,color:"#8b5cf6",fontFamily:"monospace"}}>{peakDay?peakDay[1]+" workers":"--"}</div>
          {peakDay&&<div style={{fontSize:9,...S.text3,marginTop:2}}>{peakDay[0]}</div>}
        </div>
      </div>

      {/* TRADE BREAKDOWN */}
      {Object.keys(tradeMap).length>0&&(
        <div style={{...S.card,padding:16,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,...S.text,marginBottom:12}}>Trade Breakdown</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(tradeMap).sort((a,b)=>b[1].workers-a[1].workers).map(([trade,v])=>(
              <div key={trade} style={{padding:"8px 14px",background:dark?"rgba(255,138,0,0.08)":"rgba(255,138,0,0.06)",border:"1px solid rgba(255,138,0,0.2)",borderRadius:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#FF8A00"}}>{trade}</div>
                <div style={{fontSize:16,fontWeight:800,...S.text,fontFamily:"monospace"}}>{v.workers}</div>
                <div style={{fontSize:9,...S.text3}}>{v.hours.toFixed(0)} hrs</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CREW SHEETS LIST */}
      {!filt2.length?(
        <div style={{...S.card,padding:40,textAlign:"center"}}>
          <div style={{fontSize:13,...S.text3,marginBottom:20}}>No crew sheets in this date range. Click "+ New Crew Sheet" to log today's crew.</div>
          <button onClick={mpAdd} style={S.btnP}>+ New Crew Sheet</button>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {filt2.sort((a,b)=>b.date.localeCompare(a.date)).map(entry=>{
            const entryTotal=(entry.tradeLines||[]).reduce((s,tl)=>s+Number(tl.workers||0),0);
            const entryHours=(entry.tradeLines||[]).reduce((s,tl)=>s+Number(tl.workers||0)*Number(tl.hours||8),0);
            return(
              <div key={entry.id} style={{...S.card,overflow:"hidden"}}>
                {/* CREW HEADER */}
                <div style={{padding:"12px 16px",background:dark?"#0f1117":"#f8fafc",borderBottom:"1px solid "+(dark?"#1e2538":"#e2e8f0"),display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{fontFamily:"monospace",fontWeight:700,color:"#FF8A00",fontSize:13}}>{entry.date}</div>
                    {entry.shift&&<span style={{fontSize:10,background:"rgba(255,138,0,0.1)",color:"#FF8A00",padding:"2px 7px",borderRadius:4,fontWeight:700}}>{entry.shift}</span>}
                    <div style={{fontSize:12,...S.text}}>{pN(entry.projectId)||"No Project"}</div>
                    {entry.company&&<div style={{fontSize:12,...S.text2}}>{entry.company}</div>}
                    {entry.superintendent&&<div style={{fontSize:11,...S.text3}}>Supt: {entry.superintendent}</div>}
                    {entry.foreman&&<div style={{fontSize:11,...S.text3}}>Foreman: {entry.foreman}</div>}
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{entryTotal} workers</div>
                      <div style={{fontSize:10,...S.text3}}>{entryHours.toFixed(0)} man-hrs</div>
                    </div>
                    <button onClick={()=>mpEdit(entry)} style={{...S.btnS,padding:"4px 10px",fontSize:11}}>Edit</button>
                    <button onClick={()=>mpDel(entry.id)} style={{...S.btnS,padding:"4px 10px",fontSize:11,color:"#ef4444",border:"1px solid rgba(239,68,68,0.3)"}}>Del</button>
                  </div>
                </div>
                {/* TRADE LINES */}
                <div style={{padding:"10px 16px"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {(entry.tradeLines||[]).filter(tl=>Number(tl.workers||0)>0).map((tl,i)=>(
                      <div key={tl.id||i} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:dark?"rgba(255,255,255,0.03)":"#f1f5f9",borderRadius:6,border:"1px solid "+(dark?"rgba(255,255,255,0.06)":"#e2e8f0")}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#FF8A00",minWidth:16,textAlign:"center",fontFamily:"monospace"}}>{tl.workers}</span>
                        <span style={{fontSize:11,...S.text}}>{tl.trade}</span>
                        <span style={{fontSize:10,...S.text3}}>x {tl.hours||8}h</span>
                      </div>
                    ))}
                  </div>
                  {entry.notes&&<div style={{marginTop:8,fontSize:11,...S.text3}}>Note: {entry.notes}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* CREW SHEET MODAL */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
          <div style={{...S.card,padding:24,width:"100%",maxWidth:680,maxHeight:"92vh",overflowY:"auto"}}>

            {/* MODAL HEADER */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontSize:16,fontWeight:700,...S.text}}>{form.id?"Edit":"New"} Crew Sheet</div>
              <div style={{fontSize:18,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{modalTotal} workers / {modalHours.toFixed(0)} hrs</div>
            </div>

            {/* DATE / PROJECT / SHIFT */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
              <div><label style={S.lS}>Date</label><input type="date" value={form.date||""} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={S.iS}/></div>
              <div>
                <label style={S.lS}>Project</label>
                <select value={form.projectId||""} onChange={e=>setForm(p=>({...p,projectId:e.target.value}))} style={S.iS}>
                  <option value="">-- Select --</option>
                  {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
              <div>
                <label style={S.lS}>Shift</label>
                <select value={form.shift||"Day"} onChange={e=>setForm(p=>({...p,shift:e.target.value}))} style={S.iS}>
                  <option>Day</option><option>Night</option><option>Overtime</option>
                </select>
              </div>
            </div>

            {/* SUPERINTENDENT / FOREMAN / COMPANY */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
              <div><label style={S.lS}>Superintendent</label><input value={form.superintendent||""} onChange={e=>setForm(p=>({...p,superintendent:e.target.value}))} placeholder="Name" style={S.iS}/></div>
              <div><label style={S.lS}>Foreman</label><input value={form.foreman||""} onChange={e=>setForm(p=>({...p,foreman:e.target.value}))} placeholder="Name" style={S.iS}/></div>
              <div><label style={S.lS}>Company</label><input value={form.company||""} onChange={e=>setForm(p=>({...p,company:e.target.value}))} placeholder="Company name" style={S.iS}/></div>
            </div>

            {/* TEMPLATES BAR */}
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:10,...S.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>Templates:</span>
              {savedTemplates.map(tmpl=>(
                <button key={tmpl.id} onClick={()=>loadTemplate(tmpl)}
                  style={{...S.btnS,padding:"3px 10px",fontSize:11,color:"#FF8A00",border:"1px solid rgba(255,138,0,0.4)"}}>
                  {tmpl.name}
                </button>
              ))}
              {showTemplates?(
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input value={templateName} onChange={e=>setTemplateName(e.target.value)} placeholder="Template name" style={{...S.iS,padding:"4px 8px",fontSize:11,width:140}}/>
                  <button onClick={saveTemplate} style={{...S.btnP,padding:"4px 10px",fontSize:11}}>Save</button>
                  <button onClick={()=>setShowTemplates(false)} style={{...S.btnS,padding:"4px 8px",fontSize:11}}>x</button>
                </div>
              ):(
                <button onClick={()=>setShowTemplates(true)} style={{...S.btnS,padding:"3px 10px",fontSize:11}}>+ Save as Template</button>
              )}
            </div>

            {/* TRADE LINES */}
            <div style={{marginBottom:8,fontSize:10,fontWeight:700,color:"#FF8A00",letterSpacing:1,textTransform:"uppercase"}}>Crew by Trade</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {(form.tradeLines||[]).map((tl,i)=>(
                <div key={tl.id} style={{display:"grid",gridTemplateColumns:"1fr 120px 80px 36px",gap:8,alignItems:"center",padding:"10px 12px",background:dark?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:8,border:"1px solid "+(dark?"rgba(255,255,255,0.06)":"#e2e8f0")}}>
                  {/* TRADE SELECT */}
                  <select value={tl.trade||"Pipefitter"} onChange={e=>updateTrade(tl.id,"trade",e.target.value)} style={{...S.iS,padding:"6px 10px",fontSize:12}}>
                    {TRADES.map(t=><option key={t}>{t}</option>)}
                  </select>

                  {/* WORKER COUNT WITH +/- */}
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button onClick={()=>adjustWorkers(tl.id,-1)} style={{width:28,height:28,borderRadius:6,background:"rgba(255,138,0,0.15)",border:"1px solid rgba(255,138,0,0.3)",color:"#FF8A00",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>-</button>
                    <input type="number" value={tl.workers||0} onChange={e=>updateTrade(tl.id,"workers",Math.max(0,Number(e.target.value)))}
                      style={{...S.iS,width:44,padding:"5px 6px",fontSize:14,fontWeight:700,textAlign:"center",color:"#FF8A00",fontFamily:"monospace"}}/>
                    <button onClick={()=>adjustWorkers(tl.id,1)} style={{width:28,height:28,borderRadius:6,background:"rgba(255,138,0,0.15)",border:"1px solid rgba(255,138,0,0.3)",color:"#FF8A00",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                  </div>

                  {/* HOURS */}
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" value={tl.hours||8} onChange={e=>updateTrade(tl.id,"hours",e.target.value)}
                      style={{...S.iS,width:"100%",padding:"6px 8px",fontSize:12,textAlign:"center"}}/>
                    <span style={{fontSize:10,...S.text3,whiteSpace:"nowrap"}}>hrs</span>
                  </div>

                  {/* MAN-HRS + DELETE */}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#3b82f6",fontFamily:"monospace"}}>{(Number(tl.workers||0)*Number(tl.hours||8)).toFixed(0)}</span>
                    <button onClick={()=>removeTradeLine(tl.id)} style={{width:24,height:24,borderRadius:4,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
                  </div>
                </div>
              ))}
            </div>

            <button onClick={addTradeLine} style={{...S.btnS,width:"100%",marginBottom:16,fontSize:12,padding:"8px 0"}}>+ Add Trade</button>

            {/* LIVE TOTAL BAR */}
            <div style={{padding:"12px 16px",background:dark?"rgba(255,138,0,0.08)":"rgba(255,138,0,0.06)",border:"1px solid rgba(255,138,0,0.25)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:12,...S.text3}}>Total Crew</div>
              <div style={{display:"flex",gap:20}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:"#FF8A00",fontFamily:"monospace"}}>{modalTotal}</div>
                  <div style={{fontSize:9,...S.text3}}>Workers</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:"#3b82f6",fontFamily:"monospace"}}>{modalHours.toFixed(0)}</div>
                  <div style={{fontSize:9,...S.text3}}>Man-Hours</div>
                </div>
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <label style={S.lS}>Notes</label>
              <input value={form.notes||""} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any notes for this crew sheet..." style={S.iS}/>
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setModal(false)} style={S.btnS}>Cancel</button>
              <button onClick={mpSave} style={S.btnP}>Save Crew Sheet</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function ProjectOverview({projects,tasks,dailyLogs,rfis,submittals,punchList,costCodes,changeOrders,rental,actionItems,S,darkMode,pN,selProj,setTab,today,todayStr}){
  const dark=darkMode;
  const filt2=arr=>selProj?arr.filter(x=>x.projectId===selProj||x.projectId===Number(selProj)):arr;

  // ── Data prep ────────────────────────────────────────────────
  // Budget per project
  const projBudget=projects.map(proj=>{
    const codes=costCodes.filter(c=>c.projectId===proj.id);
    const budgeted=codes.reduce((s,c)=>s+Number(c.budgeted||0),0);
    const spent=codes.reduce((s,c)=>s+Number(c.spent||0),0);
    const committed=codes.reduce((s,c)=>s+Number(c.committed||0),0);
    const pct=budgeted>0?Math.min(110,Math.round(spent/budgeted*100)):0;
    return{id:proj.id,name:proj.name,budgeted,spent,committed,pct,over:spent>budgeted&&budgeted>0};
  });

  // Schedule health per project
  const projSchedule=projects.map(proj=>{
    const pt=tasks.filter(t=>t.projectId===proj.id);
    const complete=pt.filter(t=>t.status==="Complete").length;
    const delayed=pt.filter(t=>t.status==="Delayed").length;
    const atRisk=pt.filter(t=>t.status==="At Risk").length;
    const onTrack=pt.filter(t=>t.status==="On Track"||t.status==="Not Started").length;
    return{name:proj.name,total:pt.length,complete,delayed,atRisk,onTrack,pct:pt.length>0?Math.round(complete/pt.length*100):0};
  });

  // Manpower last 30 days
  const last30=[];
  for(let i=29;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const dayLogs=filt2(dailyLogs).filter(l=>l.date===ds);
    const workers=dayLogs.reduce((s,l)=>s+Number(l.manpower||l.crewCount||0),0);
    last30.push({date:ds,label:d.toLocaleDateString("en-US",{month:"numeric",day:"numeric"}),workers});
  }
  const maxWorkers=Math.max(...last30.map(d=>d.workers),1);

  // RFI status
  const rfiList=filt2(rfis);
  const rfiOpen=rfiList.filter(r=>r.status==="Open").length;
  const rfiReview=rfiList.filter(r=>r.status==="In Review").length;
  const rfiAnswered=rfiList.filter(r=>r.status==="Answered"||r.status==="Closed").length;
  const rfiTotal=rfiList.length||1;

  // Submittal status
  const subList=filt2(submittals);
  const subPend=subList.filter(s=>s.status==="Submitted"||s.status==="In Review").length;
  const subAppr=subList.filter(s=>s.status==="Approved").length;
  const subOpen=subList.length-subPend-subAppr;
  const subTotal=subList.length||1;

  // Punch by trade
  const punchList2=filt2(punchList).filter(p=>p.status==="Open");
  const punchByTrade={};
  punchList2.forEach(p=>{const t=p.trade||"Other";punchByTrade[t]=(punchByTrade[t]||0)+1;});
  const punchSorted=Object.entries(punchByTrade).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxPunch=Math.max(...punchSorted.map(([,v])=>v),1);

  // Change orders
  const coList=filt2(changeOrders);
  const coPending=coList.filter(c=>c.status==="Pending"||c.status==="Under Review").length;
  const coApproved=coList.filter(c=>c.status==="Approved"||c.status==="Executed").length;
  const coTotal=coList.reduce((s,c)=>s+Number(c.amount||0),0);

  // Weekly manpower summary (last 4 weeks)
  const weeklyMP=[];
  for(let w=3;w>=0;w--){
    const wStart=new Date(today);wStart.setDate(wStart.getDate()-w*7-6);
    const wEnd=new Date(today);wEnd.setDate(wEnd.getDate()-w*7);
    const fmt2=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const ws=fmt2(wStart),we=fmt2(wEnd);
    const wLogs=filt2(dailyLogs).filter(l=>l.date>=ws&&l.date<=we);
    const wHours=wLogs.reduce((s,l)=>s+Number(l.totalHoursDay||0),0);
    weeklyMP.push({label:"W"+(4-w),hours:wHours});
  }
  const maxWeekHours=Math.max(...weeklyMP.map(w=>w.hours),1);

  // Colors
  const CHART_COLORS=["#1E5A8C","#10b981","#f59e0b","#8b5cf6","#06b6d4","#ec4899","#ef4444","#FF8A00"];
  const cardStyle={...S.card,padding:"16px 18px"};
  const titleStyle={fontSize:11,fontWeight:700,color:dark?"#FF8A00":"#FF8A00",letterSpacing:1,textTransform:"uppercase",marginBottom:12};

  // ── SVG helpers ───────────────────────────────────────────────
  function DonutChart({segments,size=120,stroke=18,label,sub}){
    const r=(size-stroke)/2;const circ=2*Math.PI*r;
    const cx=size/2,cy=size/2;
    let offset=0;
    const total=segments.reduce((s,sg)=>s+sg.value,0)||1;
    return(
      <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={dark?"#1a2035":"#f1f5f9"} strokeWidth={stroke}/>
          {segments.map((sg,i)=>{
            const dash=circ*(sg.value/total);
            const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={sg.color} strokeWidth={stroke} strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={-offset} strokeLinecap="butt"/>;
            offset+=dash;return el;
          })}
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
          <div style={{fontSize:label&&label.length>6?13:16,fontWeight:800,color:dark?"#e2e8f0":"#1c2333",lineHeight:1}}>{label}</div>
          {sub&&<div style={{fontSize:9,color:dark?"#4a5580":"#94a3b8",marginTop:2}}>{sub}</div>}
        </div>
      </div>
    );
  }

  function Legend({items}){
    return(
      <div style={{display:"flex",flexDirection:"column",gap:5,justifyContent:"center"}}>
        {items.map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:2,background:item.color,flexShrink:0}}/>
            <span style={{fontSize:11,...S.text2}}>{item.label}</span>
            <span style={{fontSize:11,fontFamily:"monospace",fontWeight:600,...S.text,marginLeft:"auto"}}>{item.value}</span>
          </div>
        ))}
      </div>
    );
  }

  return(
    <div>
      {/* Page title */}
      <div style={{marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,...S.text}}>Project Overview</div>
          <div style={{fontSize:11,...S.text3,marginTop:2}}>Visual summary across all active projects · {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
        <div style={{fontSize:11,...S.text3}}>{projects.length} project{projects.length!==1?"s":""} · {filt2(tasks).length} activities · {filt2(dailyLogs).length} logs</div>
      </div>

      {/* ── ROW 1: Top KPI cards ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[
          {label:"Total Budget",    value:"$"+projBudget.reduce((s,p)=>s+p.budgeted,0).toLocaleString(),   sub:projBudget.filter(p=>p.over).length+" projects over budget", color:"#1E5A8C"},
          {label:"Total Spent",     value:"$"+projBudget.reduce((s,p)=>s+p.spent,0).toLocaleString(),      sub:projBudget.length>0?Math.round(projBudget.reduce((s,p)=>s+p.spent,0)/Math.max(projBudget.reduce((s,p)=>s+p.budgeted,0),1)*100)+"% of budget":"—", color:"#8b5cf6"},
          {label:"Open Punch Items",value:filt2(punchList).filter(p=>p.status==="Open").length,            sub:"across all projects",color:"#ec4899"},
          {label:"Pending COs",     value:coPending,                                                        sub:"$"+coTotal.toLocaleString()+" total CO value",color:"#06b6d4"},
        ].map(k=>(
          <div key={k.label} style={{...cardStyle,borderTop:`3px solid ${k.color}`}}>
            <div style={{fontSize:9,...S.text3,fontWeight:700,letterSpacing:.8,marginBottom:5,textTransform:"uppercase"}}>{k.label}</div>
            <div style={{fontSize:20,fontWeight:700,fontFamily:"monospace",color:k.color,marginBottom:3}}>{k.value}</div>
            <div style={{fontSize:10,...S.text3}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* ── ROW 2: Budget chart + Schedule health ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

        {/* Budget vs Spent per project */}
        <div style={cardStyle}>
          <div style={titleStyle}>Budget vs. Spent by Project</div>
          {projBudget.length===0?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No cost code data yet</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {projBudget.map((p,i)=>{
                const spW=Math.min(100,p.pct);
                const comW=Math.min(100,p.budgeted>0?Math.round(p.committed/p.budgeted*100):0);
                return(
                  <div key={p.id}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,alignItems:"baseline"}}>
                      <span style={{fontSize:11,fontWeight:600,...S.text,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                      <span style={{fontSize:10,fontFamily:"monospace",color:p.over?"#ef4444":"#10b981"}}>${p.spent.toLocaleString()} / ${p.budgeted.toLocaleString()}</span>
                    </div>
                    {/* Budget bar */}
                    <div style={{position:"relative",height:12,background:dark?"#1a2035":"#f1f5f9",borderRadius:6,overflow:"hidden"}}>
                      {/* Committed band */}
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:comW+"%",background:CHART_COLORS[i%CHART_COLORS.length]+"33",borderRadius:6}}/>
                      {/* Spent bar */}
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:spW+"%",background:p.over?"#ef4444":CHART_COLORS[i%CHART_COLORS.length],borderRadius:6,transition:"width .3s"}}>
                        {spW>15&&<span style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",fontSize:8,color:"#fff",fontWeight:700}}>{p.pct}%</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={{display:"flex",gap:12,marginTop:4,fontSize:10,...S.text3}}>
                <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#1E5A8C",marginRight:4}}/>Spent</span>
                <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#1E5A8C33",marginRight:4}}/>Committed</span>
                <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#ef4444",marginRight:4}}/>Over Budget</span>
              </div>
            </div>
          )}
        </div>

        {/* Schedule Health per project */}
        <div style={cardStyle}>
          <div style={titleStyle}>Schedule Health by Project</div>
          {projSchedule.every(p=>p.total===0)?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No schedule activities yet</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {projSchedule.filter(p=>p.total>0).map((p,i)=>(
                <div key={p.name}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,alignItems:"baseline"}}>
                    <span style={{fontSize:11,fontWeight:600,...S.text,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                    <span style={{fontSize:10,...S.text3}}>{p.complete}/{p.total} complete · {p.pct}%</span>
                  </div>
                  {/* Stacked bar: complete | onTrack | atRisk | delayed */}
                  <div style={{display:"flex",height:12,borderRadius:6,overflow:"hidden",background:dark?"#1a2035":"#f1f5f9"}}>
                    {p.complete>0&&<div style={{width:(p.complete/p.total*100)+"%",background:"#10b981",transition:"width .3s"}} title={"Complete: "+p.complete}/>}
                    {p.onTrack>0&&<div style={{width:(p.onTrack/p.total*100)+"%",background:"#1E5A8C",transition:"width .3s"}} title={"On Track: "+p.onTrack}/>}
                    {p.atRisk>0&&<div style={{width:(p.atRisk/p.total*100)+"%",background:"#f59e0b",transition:"width .3s"}} title={"At Risk: "+p.atRisk}/>}
                    {p.delayed>0&&<div style={{width:(p.delayed/p.total*100)+"%",background:"#ef4444",transition:"width .3s"}} title={"Delayed: "+p.delayed}/>}
                  </div>
                </div>
              ))}
              <div style={{display:"flex",gap:10,marginTop:4,fontSize:10,...S.text3,flexWrap:"wrap"}}>
                {[["#10b981","Complete"],["#1E5A8C","On Track"],["#f59e0b","At Risk"],["#ef4444","Delayed"]].map(([c,l])=>(
                  <span key={l}><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:c,marginRight:4}}/>{l}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── ROW 3: Manpower trend + RFI donut + Submittal donut ── */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,marginBottom:12}}>

        {/* Manpower trend — last 30 days */}
        <div style={cardStyle}>
          <div style={titleStyle}>Manpower Trend — Last 30 Days</div>
          {maxWorkers===1?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No daily log manpower data yet</div>):(
            <div>
              <svg width="100%" height={100} viewBox={"0 0 "+last30.length*14+" 100"} preserveAspectRatio="none" style={{display:"block"}}>
                {/* Grid lines */}
                {[0,25,50,75,100].map(y=>(
                  <line key={y} x1={0} y1={100-y} x2={last30.length*14} y2={100-y} stroke={dark?"#1a2035":"#f1f5f9"} strokeWidth="1"/>
                ))}
                {/* Area fill */}
                <polyline
                  points={last30.map((d,i)=>((i*14+7)+","+(100-Math.round(d.workers/maxWorkers*95)))).join(" ")}
                  fill="none" stroke="#1E5A8C" strokeWidth="2" strokeLinejoin="round"/>
                {/* Area under */}
                <polygon
                  points={"0,100 "+last30.map((d,i)=>((i*14+7)+","+(100-Math.round(d.workers/maxWorkers*95)))).join(" ")+" "+(last30.length*14-7)+",100"}
                  fill="#1E5A8C" opacity="0.1"/>
                {/* Dots for days with workers */}
                {last30.filter(d=>d.workers>0).map((d,i)=>{
                  const idx=last30.indexOf(d);
                  return<circle key={i} cx={idx*14+7} cy={100-Math.round(d.workers/maxWorkers*95)} r={3} fill="#1E5A8C"/>;
                })}
              </svg>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,...S.text3}}>
                <span>{last30[0].label}</span>
                <span>Peak: {maxWorkers} workers</span>
                <span>{last30[last30.length-1].label}</span>
              </div>
            </div>
          )}
        </div>

        {/* RFI Status Donut */}
        <div style={cardStyle}>
          <div style={titleStyle}>RFI Status</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <DonutChart
              size={90} stroke={14}
              label={rfiList.length}
              sub="total"
              segments={[
                {value:rfiOpen,    color:"#f59e0b"},
                {value:rfiReview,  color:"#3b82f6"},
                {value:rfiAnswered,color:"#10b981"},
              ]}
            />
            <Legend items={[
              {label:"Open",     value:rfiOpen,     color:"#f59e0b"},
              {label:"In Review",value:rfiReview,   color:"#3b82f6"},
              {label:"Answered", value:rfiAnswered,  color:"#10b981"},
            ]}/>
          </div>
          <button onClick={()=>setTab("rfis")} style={{marginTop:10,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0}}>View RFIs →</button>
        </div>

        {/* Submittal Status Donut */}
        <div style={cardStyle}>
          <div style={titleStyle}>Submittal Status</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <DonutChart
              size={90} stroke={14}
              label={subList.length}
              sub="total"
              segments={[
                {value:subOpen, color:"#94a3b8"},
                {value:subPend, color:"#8b5cf6"},
                {value:subAppr, color:"#10b981"},
              ]}
            />
            <Legend items={[
              {label:"Not Submitted",value:subOpen, color:"#94a3b8"},
              {label:"In Review",    value:subPend, color:"#8b5cf6"},
              {label:"Approved",     value:subAppr, color:"#10b981"},
            ]}/>
          </div>
          <button onClick={()=>setTab("submittals")} style={{marginTop:10,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0}}>View Submittals →</button>
        </div>
      </div>

      {/* ── ROW 4: Punch by trade + Weekly manpower + CO summary ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>

        {/* Open Punch Items by Trade */}
        <div style={cardStyle}>
          <div style={titleStyle}>Open Punch Items by Trade</div>
          {punchSorted.length===0?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No open punch items</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {punchSorted.map(([trade,count],i)=>(
                <div key={trade}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:11,...S.text2}}>{trade}</span>
                    <span style={{fontSize:11,fontFamily:"monospace",fontWeight:600,color:CHART_COLORS[i%CHART_COLORS.length]}}>{count}</span>
                  </div>
                  <div style={{height:7,background:dark?"#1a2035":"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:(count/maxPunch*100)+"%",background:CHART_COLORS[i%CHART_COLORS.length],borderRadius:4}}/>
                  </div>
                </div>
              ))}
              <button onClick={()=>setTab("punchlist")} style={{marginTop:4,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>View Punch List →</button>
            </div>
          )}
        </div>

        {/* Weekly Man-Hours bar chart */}
        <div style={cardStyle}>
          <div style={titleStyle}>Weekly Man-Hours</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8,height:80,marginBottom:6}}>
            {weeklyMP.map((w,i)=>{
              const h=maxWeekHours>0?Math.round(w.hours/maxWeekHours*72):0;
              return(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <span style={{fontSize:9,fontFamily:"monospace",color:dark?"#4a5580":"#94a3b8",marginBottom:2}}>{w.hours>0?w.hours:""}</span>
                  <div style={{width:"100%",height:h||2,background:i===3?"#FF8A00":"#1E5A8C",borderRadius:"3px 3px 0 0",minHeight:2,transition:"height .3s"}}/>
                  <span style={{fontSize:10,...S.text3}}>{w.label}</span>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:10,...S.text3,textAlign:"center"}}>
            Total last 4 weeks: <span style={{fontWeight:700,color:"#FF8A00"}}>{weeklyMP.reduce((s,w)=>s+w.hours,0)} hrs</span>
          </div>
          <button onClick={()=>setTab("manpower")} style={{marginTop:6,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0}}>Full Manpower Report →</button>
        </div>

        {/* Change Order Summary */}
        <div style={cardStyle}>
          <div style={titleStyle}>Change Order Summary</div>
          {coList.length===0?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No change orders yet</div>):(
            <div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
                {[
                  {label:"Pending / Under Review",value:coPending,   color:"#f59e0b"},
                  {label:"Approved / Executed",   value:coApproved,  color:"#10b981"},
                  {label:"Rejected / Closed",     value:coList.filter(c=>c.status==="Rejected"||c.status==="Closed").length, color:"#94a3b8"},
                ].map(item=>(
                  <div key={item.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:dark?"rgba(255,255,255,0.03)":"#f8fafc",borderRadius:6,borderLeft:`3px solid ${item.color}`}}>
                    <span style={{fontSize:11,...S.text2}}>{item.label}</span>
                    <span style={{fontSize:13,fontWeight:700,fontFamily:"monospace",color:item.color}}>{item.value}</span>
                  </div>
                ))}
              </div>
              <div style={{padding:"8px 10px",background:dark?"rgba(6,182,212,0.08)":"#f0fdff",borderRadius:6,border:"1px solid rgba(6,182,212,0.3)"}}>
                <div style={{fontSize:9,...S.text3,marginBottom:2}}>TOTAL CO VALUE</div>
                <div style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:"#06b6d4"}}>${coTotal.toLocaleString()}</div>
              </div>
              <button onClick={()=>setTab("changeorders")} style={{marginTop:8,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0}}>View Change Orders →</button>
            </div>
          )}
        </div>
      </div>

      {/* ── ROW 5: Recent Activity feed ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

        {/* Recent Daily Logs */}
        <div style={cardStyle}>
          <div style={titleStyle}>Recent Daily Logs</div>
          {filt2(dailyLogs).length===0?(<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No daily logs yet</div>):(
            <div>
              {filt2(dailyLogs).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(log=>(
                <div key={log.id} style={{padding:"8px 0",borderBottom:"1px solid "+(dark?"#151a28":"#f1f5f9"),display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,...S.text}}>{log.date} · {pN(log.projectId)}</div>
                    <div style={{fontSize:10,...S.text3}}>{log.superintendent||"—"} · {log.companyName||"—"}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {log.totalHoursDay&&<div style={{fontSize:12,fontWeight:700,color:"#FF8A00",fontFamily:"monospace"}}>{log.totalHoursDay} hrs</div>}
                    <div style={{fontSize:10,...S.text3}}>{log.manpower||"0"} workers</div>
                  </div>
                </div>
              ))}
              <button onClick={()=>setTab("dailylogs")} style={{marginTop:8,fontSize:10,color:"#3b82f6",background:"none",border:"none",cursor:"pointer",padding:0}}>All Daily Logs →</button>
            </div>
          )}
        </div>

        {/* Recent Activity */}
        <div style={cardStyle}>
          <div style={titleStyle}>Recent Activity</div>
          {(()=>{
            const events=[];
            filt2(rfis).filter(r=>r.submittedDate).sort((a,b)=>b.submittedDate.localeCompare(a.submittedDate)).slice(0,2).forEach(r=>events.push({date:r.submittedDate,icon:"❓",color:"#f59e0b",text:"RFI #"+r.rfiNumber+" — "+r.subject,sub:pN(r.projectId)}));
            filt2(submittals).filter(s=>s.submittedDate).sort((a,b)=>b.submittedDate.localeCompare(a.submittedDate)).slice(0,2).forEach(s=>events.push({date:s.submittedDate,icon:"📄",color:"#8b5cf6",text:"Submittal: "+s.description,sub:pN(s.projectId)}));
            filt2(punchList).filter(p=>p.status==="Complete").slice(0,2).forEach(p=>events.push({date:p.dueDate||todayStr,icon:"✅",color:"#10b981",text:"Punch closed: "+p.description,sub:pN(p.projectId)}));
            filt2(changeOrders).filter(c=>c.date).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,2).forEach(c=>events.push({date:c.date,icon:"🔄",color:"#06b6d4",text:"CO "+c.coNumber+" — "+c.title,sub:"$"+Number(c.amount||0).toLocaleString()}));
            filt2(actionItems).filter(a=>a.status==="Closed").slice(0,2).forEach(a=>events.push({date:a.dueDate||todayStr,icon:"⚡",color:"#ec4899",text:"Action closed: "+a.description,sub:pN(a.projectId)}));
            const sorted=events.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
            if(!sorted.length)return<div style={{fontSize:12,...S.text3,textAlign:"center",padding:20}}>No recent activity</div>;
            return sorted.map((ev,i)=>(
              <div key={i} style={{padding:"7px 0",borderBottom:"1px solid "+(dark?"#151a28":"#f1f5f9"),display:"flex",gap:8,alignItems:"flex-start"}}>
                <span style={{fontSize:14,flexShrink:0}}>{ev.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:500,...S.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.text}</div>
                  <div style={{fontSize:10,...S.text3}}>{ev.sub} · {ev.date}</div>
                </div>
              </div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
  function renderAI(){
    return React.createElement(AIAssistant,{open:aiOpen,onClose:()=>setAiOpen(false),projects,tasks,dailyLogs,rfis,submittals,punchList,costCodes,changeOrders:changeOrders||[],inventory,actionItems,delays,safetyInsp,jsas,rental,S,darkMode,pN,companyName});
  }
  // Show loading
  if(authLoading) return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#060914"}},
    React.createElement("div",{style:{fontSize:14,color:"#FF8A00"}})
  );

function AIAssistant({open,onClose,projects,tasks,dailyLogs,rfis,submittals,
  punchList,costCodes,changeOrders,inventory,actionItems,delays,
  safetyInsp,jsas,rental,S,darkMode,pN,companyName}){
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("kodox_ai_key")||"");
  const[keyInput,setKeyInput]=useState("");
  const[showKey,setShowKey]=useState(false);
  const[msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I'm your KoDox AI assistant powered by Claude.\n\nI have full access to your live project data. Try asking:\n• Which projects are over budget?\n• Summarize this week's daily logs\n• What RFIs are overdue?\n• Draft a delay notice for the owner\n• How many man-hours this month?\n• List open punch items by trade"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const endRef=React.useRef(null);
  const inputRef=React.useRef(null);
  const dark=darkMode;

  React.useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);
  React.useEffect(()=>{if(open&&inputRef.current)setTimeout(()=>inputRef.current?.focus(),100);},[open]);

  function saveKey(){
    if(keyInput.trim()){
      localStorage.setItem("kodox_ai_key",keyInput.trim());
      setApiKey(keyInput.trim());
      setKeyInput("");setShowKey(false);
    }
  }
  function clearKey(){
    localStorage.removeItem("kodox_ai_key");
    setApiKey("");
    setMsgs([{role:"assistant",content:"API key removed. Add a new key to continue."}]);
  }

  function buildContext(){
    const pN2=id=>projects.find(p=>p.id===id)?.name||"Unknown";
    const todayStr=new Date().toISOString().split("T")[0];
    const budgets=projects.map(proj=>{
      const codes=costCodes.filter(c=>c.projectId===proj.id);
      const bud=codes.reduce((s,c)=>s+Number(c.budgeted||0),0);
      const sp=codes.reduce((s,c)=>s+Number(c.spent||0),0);
      return{project:proj.name,budget:"$"+bud.toLocaleString(),spent:"$"+sp.toLocaleString(),over:sp>bud&&bud>0,pct:bud>0?Math.round(sp/bud*100)+"% used":"N/A"};
    });
    const recentLogs=dailyLogs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7).map(l=>({
      date:l.date,project:pN2(l.projectId),superintendent:l.superintendent||"—",
      foreman:l.foreman||"—",company:l.companyName||"—",
      manpower:Number(l.manpower||l.crewCount||0),manHours:Number(l.totalHoursDay||0),
      workPerformed:(l.workPerformed||"").slice(0,150),
      delays:l.delays&&l.delays!=="None"?l.delays:null
    }));
    const openRfis=rfis.filter(r=>r.status!=="Answered"&&r.status!=="Closed").map(r=>({
      number:r.rfiNumber,project:pN2(r.projectId),subject:r.subject,
      dueDate:r.dueDate,status:r.status,overdue:r.dueDate&&r.dueDate<todayStr
    }));
    const overdSubs=submittals.filter(s=>s.requiredDate&&s.requiredDate<todayStr&&s.status!=="Approved").map(s=>({
      project:pN2(s.projectId),description:s.description,specSection:s.specSection,
      requiredDate:s.requiredDate,reviewer:s.reviewer
    }));
    const openPunch=punchList.filter(p=>p.status==="Open").slice(0,20).map(p=>({
      project:pN2(p.projectId),area:p.area,trade:p.trade,
      description:p.description,assignee:p.assignee,priority:p.priority
    }));
    const pendCOs=(changeOrders||[]).filter(c=>c.status==="Pending"||c.status==="Under Review").map(c=>({
      number:c.coNumber,project:pN2(c.projectId),title:c.title,
      amount:"$"+Number(c.amount||0).toLocaleString(),status:c.status
    }));
    const lowInv=inventory.filter(i=>Number(i.qtyOnHand||0)<=Number(i.reorderPoint||0)).map(i=>({
      item:i.itemName,qty:i.qtyOnHand,unit:i.unit,project:pN2(i.projectId),
      outOfStock:Number(i.qtyOnHand||0)===0
    }));
    const activeDelays=delays.filter(d=>d.status==="Active").map(d=>({
      project:pN2(d.projectId),cause:d.cause,daysLost:d.daysLost
    }));
    const thisMonth=todayStr.slice(0,7);
    const mLogs=dailyLogs.filter(l=>l.date.startsWith(thisMonth));
    const mHours=mLogs.reduce((s,l)=>s+Number(l.totalHoursDay||0),0);
    const schedule={total:tasks.length,complete:tasks.filter(t=>t.status==="Complete").length,delayed:tasks.filter(t=>t.status==="Delayed").length,onTrack:tasks.filter(t=>t.status==="On Track").length};

// ── MCAA Labor Estimator ─────────────────────────────────────────
function estimateMCAA(description, durationDays){
  const d = (description||"").toLowerCase();
  let hours = 0;
  let basis = "";

  // ── Detect pipe work ─────────────────────────────────────────
  const pipeMatch = d.match(/(\d+(?:\.\d+)?)["\s]*(?:inch|in|")?[\s-]*(steel|copper|cpvc|pvc|cast[\s-]iron|stainless|carbon)/);
  const lfMatch   = d.match(/(\d+(?:,\d{3})*(?:\.\d+)?)\s*(?:lf|l\.f\.|linear\s*f(?:eet|t|oot))/i);
  if(pipeMatch && lfMatch){
    const dia  = parseFloat(pipeMatch[1]);
    const mat  = pipeMatch[2].replace(/[\s-]/g,"_");
    const lf   = parseFloat(lfMatch[1].replace(/,/g,""));
    const matKey = mat.includes("steel")?d.includes("weld")?"steel_welded":"steel_threaded":
                   mat.includes("copper")?"copper":mat.includes("cpvc")?"cpvc":
                   mat.includes("pvc")?"pvc":mat.includes("cast")?"cast_iron":
                   mat.includes("stainless")?"stainless":"steel_threaded";
    const table = MCAA.pipe[matKey]||MCAA.pipe["steel_threaded"];
    const sizes = Object.keys(table).map(Number).sort((a,b)=>a-b);
    const closest = sizes.reduce((p,c)=>Math.abs(c-dia)<Math.abs(p-dia)?c:p);
    hours = lf * (table[closest]||0.20);
    basis = `${lf}LF × ${dia}" ${matKey.replace(/_/g," ")} @ ${table[closest]} hrs/LF`;
  }

  // ── Detect fixtures ───────────────────────────────────────────
  if(!hours){
    const fixMap = [
      [/water\s*closet|wc\b|toilet/,"water_closet"],
      [/urinal/,"urinal"],
      [/lavator|lav\b/,"lavatory"],
      [/kitchen\s*sink/,"sink_kitchen"],
      [/service\s*sink|mop\s*sink/,"sink_service"],
      [/shower/,"shower"],
      [/bathtub|tub\b/,"bathtub"],
      [/floor\s*drain/,"floor_drain"],
      [/drinking\s*fountain|bubbler/,"drinking_fountain"],
      [/water\s*heater.*electric/,"water_heater_elec"],
      [/water\s*heater.*gas/,"water_heater_gas"],
      [/commercial.*water\s*heater|water\s*heater.*commercial/,"water_heater_commercial"],
      [/boiler.*small|small.*boiler/,"boiler_small"],
      [/boiler.*medium|medium.*boiler/,"boiler_medium"],
      [/boiler.*large|large.*boiler/,"boiler_large"],
      [/pump.*small|small.*pump|condensate\s*pump/,"pump_small"],
      [/pump.*medium|circulation\s*pump/,"pump_medium"],
      [/pump.*large|large.*pump/,"pump_large"],
      [/backflow/,"backflow_preventer"],
      [/pressure.*regulat|prv\b/,"pressure_regulator"],
      [/expansion\s*tank/,"expansion_tank"],
      [/hose\s*bibb|hose\s*bib/,"hose_bibb"],
      [/cleanout/,"cleanout"],
      [/roof\s*drain/,"roof_drain"],
      [/grease\s*trap.*large|large.*grease/,"grease_trap_large"],
      [/grease\s*trap/,"grease_trap_small"],
      [/rpz|reduced\s*pressure/,"rpz"],
    ];
    const qtyMatch = d.match(/(\d+)\s*(?:ea|each|unit|pcs?)?/);
    const qty = qtyMatch?parseInt(qtyMatch[1]):1;
    for(const [rx,key] of fixMap){
      if(rx.test(d)&&MCAA.fixtures[key]){
        hours = qty * MCAA.fixtures[key];
        basis = `${qty} × ${key.replace(/_/g," ")} @ ${MCAA.fixtures[key]} hrs/ea`;
        break;
      }
    }
  }

  // ── Detect HVAC ───────────────────────────────────────────────
  if(!hours){
    const hvacMap = [
      [/air\s*handl.*small|ahu.*small|small.*ahu/,"ahu_small"],
      [/air\s*handl.*medium|ahu.*medium/,"ahu_medium"],
      [/air\s*handl.*large|ahu.*large/,"ahu_large"],
      [/roof.*unit.*small|rtu.*small|small.*rtu/,"rtu_small"],
      [/roof.*unit|rtu\b/,"rtu_medium"],
      [/fan\s*coil|fcu\b/,"fan_coil"],
      [/unit\s*heater/,"unit_heater"],
      [/vav.*reheat|reheat.*vav/,"vav_box_with_reheat"],
      [/vav\b/,"vav_box"],
      [/chiller.*small/,"chiller_small"],
      [/chiller.*medium|chiller\b/,"chiller_medium"],
      [/chiller.*large/,"chiller_large"],
      [/cooling\s*tower.*large/,"cooling_tower_large"],
      [/cooling\s*tower/,"cooling_tower_small"],
      [/fire\s*damper/,"damper_fire"],
      [/smoke\s*damper/,"damper_smoke"],
    ];
    const qtyM = d.match(/(\d+)\s*(?:ea|each|unit)?/);
    const qty = qtyM?parseInt(qtyM[1]):1;
    for(const [rx,key] of hvacMap){
      if(rx.test(d)&&MCAA.hvac[key]){
        hours = qty * MCAA.hvac[key];
        basis = `${qty} × ${key.replace(/_/g," ")} @ ${MCAA.hvac[key]} hrs/ea`;
        break;
      }
    }
  }

  // ── Fallback: estimate by trade + duration ─────────────────────
  if(!hours && durationDays>0){
    // Average crew productivity assumption by task type
    const isPlumb = /plumb|pipe|drain|sanit|domestic|fixture|water|sewer/.test(d);
    const isMech  = /hvac|duct|mech|air|heat|cool|chiller|boiler|pump/.test(d);
    const dailyHrs = isPlumb?40:isMech?48:32; // hours per crew-day
    hours = durationDays * dailyHrs * 0.5;  // assume 50% productive time
    basis = `Duration-based: ${durationDays}d × ${dailyHrs/2} hrs/d (estimated)`;
  }

  return{hours:Math.round(hours*10)/10, basis};
}

// ── Auto-calculate crew size ──────────────────────────────────────
function calcCrew(totalHours, durationDays, hoursPerDay){
  hoursPerDay = hoursPerDay||8;
  if(!totalHours||!durationDays)return{workers:0,totalHours:0};
  const workersNeeded = totalHours/(durationDays*hoursPerDay);
  return{
    workers: Math.ceil(workersNeeded),
    workersExact: Math.round(workersNeeded*10)/10,
    totalHours,
    laborDays: Math.round(totalHours/hoursPerDay*10)/10,
  };
}
