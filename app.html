<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;}
body{
  font-family:"Inter",system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
body.dark{background:#060914;color:#e8edf5;}
body.light{background:#f0f4f8;color:#0f172a;}
::selection{background:rgba(255,138,0,0.25);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,138,0,0.35);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,138,0,0.65);}
input,select,textarea{font-family:"Inter",sans-serif;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#FF8A00!important;box-shadow:0 0 0 3px rgba(255,138,0,0.12)!important;}
button{transition:all .15s ease;font-family:"Inter",sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
button:active{opacity:0.75;}
@keyframes kdpulse{0%,80%,100%{opacity:.2;transform:scale(.7);}40%{opacity:1;transform:scale(1);}}
@keyframes kdfadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media(max-width:768px){
  aside{display:none!important;position:fixed!important;z-index:300!important;top:0!important;left:0!important;height:100%!important;width:260px!important;box-shadow:4px 0 32px rgba(0,0,0,0.8)!important;}
  aside.mob-open{display:flex!important;}
  .kd-burger{display:flex!important;}
  input,select,textarea{font-size:16px!important;}
}
@media(display-mode:standalone){
  header{padding-top:max(12px,env(safe-area-inset-top))!important;}
}
</style>

<script>
// KoDox Firebase - uses REST API directly, no SDK required
var KODOX_API_KEY = "AIzaSyB5dVASmYRpDfcQd4OmV-wD5k1NsLOW7FA";
var KODOX_PROJECT = "kodox-systems-llc";
var KODOX_AUTH_URL = "https://identitytoolkit.googleapis.com/v1/accounts";
var KODOX_DB_URL = "https://firestore.googleapis.com/v1/projects/" + KODOX_PROJECT + "/databases/(default)/documents";

window.KoDoxFirebase = {
  connected: true,
  _token: null,
  _uid: null,
  _authCallbacks: [],
  loadSDK: function(cb) { cb(); },
  signIn: function(email, password) {
    var self = this;
    return fetch(KODOX_AUTH_URL + ":signInWithPassword?key=" + KODOX_API_KEY, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email:email, password:password, returnSecureToken:true})
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.error) throw new Error(d.error.message);
      self._token = d.idToken;
      self._uid = d.localId;
      var user = {email:email, uid:d.localId};
      self._authCallbacks.forEach(function(cb){ cb(user); });
      return {user:user};
    });
  },
  signUp: function(email, password) {
    var self = this;
    return fetch(KODOX_AUTH_URL + ":signUp?key=" + KODOX_API_KEY, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email:email, password:password, returnSecureToken:true})
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.error) throw new Error(d.error.message);
      self._token = d.idToken;
      self._uid = d.localId;
      var user = {email:email, uid:d.localId};
      self._authCallbacks.forEach(function(cb){ cb(user); });
      return {user:user};
    });
  },
  signOut: function() {
    var self = this;
    self._token = null; self._uid = null;
    self._authCallbacks.forEach(function(cb){ cb(null); });
    return Promise.resolve();
  },
  onAuthChange: function(callback) {
    this._authCallbacks.push(callback);
    var token = localStorage.getItem("kodox_token");
    var email = localStorage.getItem("kodox_email");
    if(token && email) {
      this._token = token;
      callback({email:email, uid:localStorage.getItem("kodox_uid")||""});
    }
  },
  save: function(uid, data) {
    if(!this._token) return Promise.resolve();
    var self = this;
    localStorage.setItem("kodox_token", self._token);
    localStorage.setItem("kodox_uid", uid);
    var fields = {};
    fields["data"] = {stringValue: JSON.stringify(data)};
    return fetch(KODOX_DB_URL + "/kodox_data/" + uid + "?updateMask.fieldPaths=data", {
      method: "PATCH",
      headers: {"Content-Type":"application/json","Authorization":"Bearer " + self._token},
      body: JSON.stringify({fields:fields})
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.error) throw new Error(d.error.message);
      return d;
    });
  },
  load: function(uid) {
    if(!this._token) return Promise.resolve(null);
    var self = this;
    return fetch(KODOX_DB_URL + "/kodox_data/" + uid, {
      headers: {"Authorization":"Bearer " + self._token}
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.error || !d.fields) return null;
      try { return JSON.parse(d.fields.data.stringValue); } catch(e){ return null; }
    });
  }
};
localStorage.setItem("kodox_firebase_config", "{}");
</script>

<script>var KODOX_VERSION="v2.0";if(localStorage.getItem("kodox_version")!==KODOX_VERSION){localStorage.removeItem("kodox_auth_token");localStorage.removeItem("kodox_auth_user");localStorage.setItem("kodox_version",KODOX_VERSION);}</script>
<script src="app.compiled.js"></script>
</body>
</html>
