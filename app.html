        {id:uid(),step:"Inspect fall protection equipment",hazards:"Equipment failure causing fall",controls:"Inspect harness, lanyard, anchor points before use. Tag out defective equipment.",risk:"High"},
        {id:uid(),step:"Set up work platform or ladder",hazards:"Unstable platform, ladder slip",controls:"Secure ladder base and top. Barricade below. 3-point contact on ladder.",risk:"High"},
        {id:uid(),step:"Perform elevated work",hazards:"Falls, dropped tools/materials",controls:"100% tie-off above 6ft. Tool lanyards required. Hard hats for workers below.",risk:"High"},
        {id:uid(),step:"Descend and secure area",hazards:"Falls during descent",controls:"Face ladder when descending. Lower tools separately. Remove barricades when complete.",risk:"Medium"},
      ]
    },
    "Pipe Threading":{
      taskDescription:"Threading and cutting pipe using power threading machine.",
      steps:[
        {id:uid(),step:"Set up threading machine",hazards:"Pinch points, cutting oil spills, trip hazards",controls:"Secure machine. Set up oil pan. Keep area clear. Inspect chuck and dies.",risk:"Medium"},
        {id:uid(),step:"Load and secure pipe",hazards:"Pipe drop, pinch points from chuck",controls:"Use pipe stands. Keep hands clear of chuck. Secure pipe properly before starting.",risk:"Medium"},
        {id:uid(),step:"Thread pipe",hazards:"Cuts from sharp threads, oil splash, noise",controls:"Cut-resistant gloves. Safety glasses. Apply oil continuously. Hearing protection if needed.",risk:"Medium"},
        {id:uid(),step:"Clean up",hazards:"Slips from oil, cuts from sharp threads",controls:"Clean oil immediately. Use thread protectors. Dispose of cuttings properly.",risk:"Low"},
      ]
    },
    "Confined Space":{
      taskDescription:"Entry into permit-required confined space.",
      steps:[
        {id:uid(),step:"Atmospheric testing",hazards:"Toxic atmosphere, oxygen deficiency, explosive gas",controls:"Test O2, CO, H2S, LEL before entry. Calibrate meter. Document results.",risk:"High"},
        {id:uid(),step:"Isolation and lockout",hazards:"Unexpected flow, energy release",controls:"LOTO all energy sources. Blank all lines. Verify zero energy state.",risk:"High"},
        {id:uid(),step:"Entry with attendant",hazards:"Engulfment, atmospheric hazards, entrapment",controls:"Permit issued. Attendant outside. Retrieval system ready. Communication established.",risk:"High"},
        {id:uid(),step:"Rescue plan",hazards:"Worker incapacitation requiring rescue",controls:"Non-entry rescue system in place. Emergency services notified. Attendant trained.",risk:"High"},
      ]
    },
    "Overhead Lifting":{
      taskDescription:"Rigging and lifting operations using crane or hoist.",
      steps:[
        {id:uid(),step:"Pre-lift planning",hazards:"Overload, improper rigging, structural failure",controls:"Calculate load weight. Verify crane capacity. Inspect all rigging. Lift plan signed.",risk:"High"},
        {id:uid(),step:"Inspect rigging",hazards:"Equipment failure during lift",controls:"Inspect slings, shackles, hooks. Verify certification dates. Tag out damaged equipment.",risk:"High"},
        {id:uid(),step:"Perform lift",hazards:"Dropped load, swing, contact with personnel",controls:"Exclusion zone barricaded. Taglines used. No personnel under load. Spotter assigned.",risk:"High"},
        {id:uid(),step:"Set load",hazards:"Unstable load, pinch points",controls:"Guide load with taglines. Keep hands clear. Verify stable placement before releasing.",risk:"Medium"},
      ]
    },
  };

  function jsaLoadTemplate(name){
    const t=TEMPLATES[name];
    sf(p=>({...p,taskDescription:t.taskDescription,steps:t.steps.map(s=>({...s,id:uid()}))}));
    setShowTemplates(false);
  }

  function addStep(){
    sf(p=>({...p,steps:[...p.steps,{id:uid(),step:"",hazards:"",controls:"",risk:"Medium"}]}));
  }
  function removeStep(id){
    sf(p=>({...p,steps:p.steps.filter(s=>s.id!==id)}));
  }
  function updateStep(id,key,val){
    sf(p=>({...p,steps:p.steps.map(s=>s.id===id?{...s,[key]:val}:s)}));
  }

  function addSignon(){
    if(!newSignonName.trim()){alert("Enter a name to sign on.");return;}
    sf(p=>({...p,crewSignons:[...p.crewSignons,{name:newSignonName.trim(),signedAt:new Date().toLocaleString()}]}));
    setNewSignonName("");
  }
  function removeSignon(i){
    sf(p=>({...p,crewSignons:p.crewSignons.filter((_,x)=>x!==i)}));
  }
  function addSignoff(){
    if(!newSigName.trim()){alert("Enter a name to sign off.");return;}
    sf(p=>({...p,crewSignoffs:[...p.crewSignoffs,{name:newSigName.trim(),signedAt:new Date().toLocaleString()}]}));
    setNewSigName("");
  }
  function removeSignoff(i){
    sf(p=>({...p,crewSignoffs:p.crewSignoffs.filter((_,x)=>x!==i)}));
  }

  const[ppeChecked,setPpeChecked]=useState(()=>{
    const existing=(initial?.ppeRequired||"").split(",").map(s=>s.trim()).filter(Boolean);
    return PPE_OPTIONS.reduce((acc,p)=>({...acc,[p]:existing.includes(p)}),{});
  });
  function togglePpe(item){
    setPpeChecked(prev=>{
      const next={...prev,[item]:!prev[item]};
      const selected=PPE_OPTIONS.filter(p=>next[p]).join(", ");
      sf(f=>({...f,ppeRequired:selected}));
      return next;
    });
  }

  const riskColor={Low:"#10b981",Medium:"#f59e0b",High:"#ef4444"}[f.riskLevel]||"#f59e0b";
  const secStyle={gridColumn:"1/-1",marginTop:12,marginBottom:4,paddingBottom:5,borderBottom:"1px solid "+(dark?"#1e2538":"#e2e8f0"),fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#FF8A00"};

  return(
    <div style={{width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:700,...S.text}}>{f.id?"Edit":"New"} Job Safety Analysis</div>
        <div style={{background:riskColor+"22",border:"1px solid "+riskColor+"66",color:riskColor,padding:"4px 12px",borderRadius:7,fontSize:11,fontWeight:700}}>{f.riskLevel} Risk</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

        <div style={secStyle}>JSA Information</div>
        <FF label="PROJECT" full><PSel projects={projects} v={f.projectId} u={u("projectId")}/></FF>
        <FF label="JSA NUMBER"><FIn v={f.jsaNumber} u={u("jsaNumber")} ph="JSA-0001"/></FF>
        <FF label="DATE"><FIn type="date" v={f.date} u={u("date")}/></FF>
        <FF label="OVERALL RISK LEVEL">
          <select value={f.riskLevel} onChange={u("riskLevel")} style={{...iS,borderColor:riskColor,fontWeight:700,color:riskColor}}>
            {JSA_RISK.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </FF>
        <FF label="STATUS"><FSel v={f.status} u={u("status")} opts={JSA_STATUS}/></FF>

        <div style={secStyle}>Task and Location</div>
        <FF label="LOCATION / AREA" full><FIn v={f.location} u={u("location")} ph="e.g. Level 3 - Grid B4 - Mechanical Room"/></FF>
        <FF label="TASK / WORK DESCRIPTION" full><FTA v={f.taskDescription} u={u("taskDescription")} rows={2}/></FF>

        <div style={secStyle}>Personnel</div>
        <FF label="SUPERVISOR / FOREMAN"><FIn v={f.supervisor} u={u("supervisor")}/></FF>
        <FF label="COMPANY"><FIn v={f.company} u={u("company")}/></FF>
        <FF label="CREW MEMBERS" full><FTA v={f.crew} u={u("crew")} rows={2}/></FF>

        {/* STEP BY STEP HAZARD ANALYSIS */}
        <div style={{...secStyle,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Step-by-Step Hazard Analysis</span>
          <button type="button" onClick={()=>setShowTemplates(v=>!v)} style={{...S.btnS,padding:"2px 10px",fontSize:10,color:"#FF8A00",border:"1px solid rgba(255,138,0,0.4)"}}>Load Template</button>
        </div>

        {showTemplates&&(
          <div style={{gridColumn:"1/-1",display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
            {Object.keys(TEMPLATES).map(name=>(
              <button key={name} onClick={()=>jsaLoadTemplate(name)} style={{...S.btnS,padding:"5px 12px",fontSize:11,color:"#FF8A00",border:"1px solid rgba(255,138,0,0.4)"}}>
                {name}
              </button>
            ))}
          </div>
        )}

        <div style={{gridColumn:"1/-1"}}>
          {/* STEP TABLE HEADER */}
          <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 80px 28px",gap:6,marginBottom:6,padding:"0 4px"}}>
            {["#","Task Step","Hazards Identified","Controls / Mitigation","Risk",""].map(h=>(
              <div key={h} style={{fontSize:9,fontWeight:700,color:"rgba(255,138,0,0.7)",letterSpacing:.8,textTransform:"uppercase"}}>{h}</div>
            ))}
          </div>

          {f.steps.map((step,i)=>{
            const rc={Low:"#10b981",Medium:"#f59e0b",High:"#ef4444"}[step.risk]||"#f59e0b";
            return(
              <div key={step.id} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr 80px 28px",gap:6,marginBottom:8,alignItems:"start",padding:"8px",background:dark?"rgba(255,255,255,0.02)":"#f8fafc",borderRadius:8,border:"1px solid "+(dark?"rgba(255,255,255,0.05)":"#e2e8f0")}}>
                <div style={{fontSize:12,fontWeight:700,color:"#FF8A00",fontFamily:"monospace",paddingTop:6,textAlign:"center"}}>{i+1}</div>
                <textarea value={step.step} onChange={e=>updateStep(step.id,"step",e.target.value)} rows={2} placeholder="Describe the task step..." style={{...iS,resize:"vertical",fontSize:11}}/>
                <textarea value={step.hazards} onChange={e=>updateStep(step.id,"hazards",e.target.value)} rows={2} placeholder="What could go wrong?" style={{...iS,resize:"vertical",fontSize:11,borderColor:"rgba(239,68,68,0.3)"}}/>
                <textarea value={step.controls} onChange={e=>updateStep(step.id,"controls",e.target.value)} rows={2} placeholder="How will we prevent it?" style={{...iS,resize:"vertical",fontSize:11,borderColor:"rgba(16,185,129,0.3)"}}/>
                <select value={step.risk||"Medium"} onChange={e=>updateStep(step.id,"risk",e.target.value)} style={{...iS,fontSize:11,fontWeight:700,color:rc,borderColor:rc+"88",padding:"5px 6px"}}>
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
                <button type="button" onClick={()=>removeStep(step.id)} style={{width:24,height:24,borderRadius:4,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:4}}>x</button>
              </div>
            );
          })}
          <button type="button" onClick={addStep} style={{...S.btnS,width:"100%",fontSize:11,padding:"7px 0"}}>+ Add Step</button>
        </div>

        {/* PPE */}
        <div style={secStyle}>PPE Required</div>
        <div style={{gridColumn:"1/-1"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
            {PPE_OPTIONS.map(item=>(
              <label key={item} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:7,border:"1px solid "+(ppeChecked[item]?"#FF8A00":dark?"#2a3150":"#e2e8f0"),background:ppeChecked[item]?(dark?"rgba(255,138,0,0.1)":"#fff8f0"):(dark?"#0f1117":"#f8fafc"),cursor:"pointer"}}>
                <input type="checkbox" checked={!!ppeChecked[item]} onChange={()=>togglePpe(item)} style={{accentColor:"#FF8A00",width:14,height:14}}/>
                <span style={{fontSize:11,fontWeight:ppeChecked[item]?700:400,color:ppeChecked[item]?"#FF8A00":(dark?"#94a3b8":"#475569")}}>{item}</span>
              </label>
            ))}
          </div>
          <div style={{marginTop:8,fontSize:10,...S.text3}}>Selected: {f.ppeRequired||"None"}</div>
        </div>

        {/* EMERGENCY */}
        <div style={secStyle}>Emergency Procedures</div>
        <FF label="EMERGENCY RESPONSE PLAN" full>
          <textarea value={f.emergency||""} onChange={u("emergency")} rows={3} style={{...iS,resize:"vertical",borderColor:"rgba(239,68,68,0.3)"}}/>
        </FF>

        {/* CREW SIGN-OFF */}
        <div style={secStyle}>Crew Sign-On</div>
        <div style={{gridColumn:"1/-1"}}>
          <div style={{fontSize:11,...S.text3,marginBottom:10}}>Each crew member signs on at the start of shift confirming they are fit for duty and aware of site hazards.</div>
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <input value={newSignonName} onChange={e=>setNewSignonName(e.target.value)} placeholder="Type full name to sign on" style={{...iS,flex:1}} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addSignon();}}}/>
            <button type="button" onClick={addSignon} style={{...S.btnP,padding:"7px 16px",fontSize:12}}>Sign On</button>
          </div>
          {f.crewSignons.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginBottom:8}}>
              {f.crewSignons.map((sig,i)=>(
                <div key={i} style={{padding:"8px 12px",background:dark?"rgba(59,130,246,0.08)":"#eff6ff",border:"1px solid rgba(59,130,246,0.3)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#3b82f6"}}>{sig.name}</div>
                    <div style={{fontSize:9,...S.text3,marginTop:2}}>Signed on: {sig.signedAt}</div>
                  </div>
                  <button type="button" onClick={()=>removeSignon(i)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",cursor:"pointer",fontSize:12,padding:0}}>x</button>
                </div>
              ))}
            </div>
          )}
          {f.crewSignons.length===0&&<div style={{fontSize:11,...S.text3,marginBottom:8}}>No sign-ons yet.</div>}
        </div>

        <div style={secStyle}>Crew Sign-Off</div>
        <div style={{gridColumn:"1/-1"}}>
          <div style={{fontSize:11,...S.text3,marginBottom:10}}>Each crew member confirms they have read, understood, and will comply with this JSA.</div>
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <input value={newSigName} onChange={e=>setNewSigName(e.target.value)} placeholder="Type full name to sign off" style={{...iS,flex:1}} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addSignoff();}}}/>
            <button type="button" onClick={addSignoff} style={{...S.btnP,padding:"7px 16px",fontSize:12}}>Sign</button>
          </div>
          {f.crewSignoffs.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              {f.crewSignoffs.map((sig,i)=>(
                <div key={i} style={{padding:"8px 12px",background:dark?"rgba(16,185,129,0.08)":"#f0fdf4",border:"1px solid rgba(16,185,129,0.3)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#10b981"}}>{sig.name}</div>
                    <div style={{fontSize:9,...S.text3,marginTop:2}}>{sig.signedAt}</div>
                  </div>
                  <button type="button" onClick={()=>removeSignoff(i)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:12,padding:0}}>x</button>
                </div>
              ))}
            </div>
          )}
          {f.crewSignoffs.length===0&&<div style={{fontSize:11,...S.text3}}>No signatures yet.</div>}
        </div>

        <div style={secStyle}>Review</div>
        <FF label="REVIEWED BY (Superintendent / Safety Officer)"><FIn v={f.reviewedBy} u={u("reviewedBy")}/></FF>
        <div/>
        <FF label="ADDITIONAL NOTES" full><FTA v={f.notes} u={u("notes")}/></FF>

      </div>

      <div style={{display:"flex",gap:8,marginTop:18,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={S.btnS}>Cancel</button>
        <button onClick={()=>onSave({...f,projectId:Number(f.projectId),id:f.id||uid()})} style={{...S.btnP,background:"linear-gradient(135deg,#FF8A00,#cc6a00)"}}>Save JSA</button>
      </div>
    </div>
  );
}

function NewSecTab({tab,data,S,darkMode,pN,filt,exp,openAdd,openEdit,showToast,setData,selProj}){
  const cfg=SCFG[tab];if(!cfg)return null;
  const rows=filt(data);
  const iRef=React.useRef();
  function doImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      try{
        const ls=ev.target.result.trim().split(/\r?\n/);
        const hs=ls[0].split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
        const rows2=ls.slice(1).map(function(line){
          const vs=[];let cur="",q=false;
          for(let i=0;i<line.length;i++){const c=line[i];if(c==='"')q=!q;else if(c===","&&!q){vs.push(cur);cur="";}else cur+=c;}
          vs.push(cur);
          const o={id:uid()};
          hs.forEach(function(h,i){o[h]=(vs[i]||"").replace(/^"|"$/g,"");});
          if(o.projectId)o.projectId=Number(o.projectId);
          return o;
        }).filter(function(o){return Object.values(o).some(function(v){return v;});});
        if(setData)setData(l=>[...l,...rows2]);
        showToast(rows2.length+" imported");
      }catch(err){showToast("Import failed","error");}
    };
    r.readAsText(f);e.target.value="";
  }
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>{cfg.icon}</span>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>{cfg.label}</div>
            <div style={{fontSize:11,...S.text3}}>{rows.length} record{rows.length!==1?"s":""}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          <label style={{...S.btnS,display:"inline-flex",alignItems:"center",gap:5,cursor:"pointer",padding:"8px 13px",borderRadius:8,fontSize:13}}>
            ⬆ Import CSV<input ref={iRef} type="file" accept=".csv" style={{display:"none"}} onChange={doImport}/>
          </label>
          <button onClick={()=>exp(rows,cfg.csv,tab+"_export")} style={S.btnS}>⬇ Export CSV</button>
          <button onClick={()=>openAdd(tab)} style={{...S.btnP,background:cfg.color}}>+ New</button>
        </div>
      </div>
      {tab==="projdir"&&rows.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10,marginBottom:14}}>
          {rows.map(row=>(
            <div key={row.id} style={{...S.card,padding:"13px 15px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,...S.text}}>{row.name||"—"}</div>
                  <div style={{fontSize:11,...S.text3}}>{row.title||""}{row.title&&row.company?" · ":""}{row.company||""}</div>
                </div>
                <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:darkMode?"rgba(96,165,250,0.12)":"#eff6ff",color:"#3b82f6",flexShrink:0}}>{row.role||"—"}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {row.mobile&&<a href={"tel:"+row.mobile} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#10b981",fontWeight:600,textDecoration:"none",padding:"5px 8px",background:darkMode?"rgba(16,185,129,0.08)":"#f0fdf4",borderRadius:6}}>Mobile: {row.mobile}</a>}
                {row.phone&&<a href={"tel:"+row.phone} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#60a5fa",textDecoration:"none",padding:"5px 8px",background:darkMode?"rgba(96,165,250,0.08)":"#eff6ff",borderRadius:6}}>Office: {row.phone}</a>}
                {row.email&&<a href={"mailto:"+row.email} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#818cf8",textDecoration:"none",padding:"5px 8px",background:darkMode?"rgba(129,140,248,0.08)":"#f5f3ff",borderRadius:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Email: {row.email}</a>}
              </div>
              <div style={{marginTop:8,display:"flex",gap:5}}>
                <button onClick={()=>openEdit(tab,row)} style={{background:darkMode?"#1e2940":"#e0e7ff",border:"none",color:"#60a5fa",padding:"3px 9px",borderRadius:5,cursor:"pointer",fontSize:10}}>Edit</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {rows.length===0?(
        <div style={{textAlign:"center",padding:"44px 20px",...S.text3,borderRadius:13,border:`1px dashed ${darkMode?"#2a3150":"#e2e8f0"}`}}>
          <div style={{fontSize:30,marginBottom:8}}>{cfg.icon}</div>
          <div style={{fontSize:14,fontWeight:600,...S.text,marginBottom:8}}>No {cfg.label} yet</div>
          <button onClick={()=>openAdd(tab)} style={{...S.btnP,background:cfg.color}}>+ Add First</button>
        </div>
      ):(
        <div style={{...S.card,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={S.tHead}>
                <th style={{padding:"9px 12px",textAlign:"left",color:darkMode?"#4a5580":"#64748b",fontWeight:700,fontSize:9}}>PROJECT</th>
                {cfg.cols.map(c=><th key={c.k} style={{padding:"9px 12px",textAlign:"left",color:darkMode?"#4a5580":"#64748b",fontWeight:700,fontSize:9,whiteSpace:"nowrap"}}>{c.l}</th>)}
                <th style={{padding:"9px 12px",color:darkMode?"#4a5580":"#64748b",fontWeight:700,fontSize:9}}>ACTIONS</th>
              </tr></thead>
              <tbody>
                {rows.map(row=>(
                  <tr key={row.id} style={S.tRow}
                    onMouseEnter={e=>e.currentTarget.style.background=darkMode?"#1a1f2e":"#f8fafc"}
                    onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{padding:"8px 12px",fontSize:11}}><span style={{color:"#60a5fa",fontWeight:600}}>{pN(row.projectId)}</span></td>
                    {cfg.cols.map(c=><td key={c.k} style={{padding:"8px 12px",...S.text2,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>{(()=>{const v=row[c.k];if(!v)return"—";if(typeof v==="string"&&(v.startsWith("http://")||v.startsWith("https://")))return <a href={v} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{color:"#3b82f6",fontSize:11,textDecoration:"none",fontWeight:600}}>Open</a>;return v;})()}</td>)}
                    <td style={{padding:"8px 12px"}}>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>openEdit(tab,row)} style={{background:darkMode?"#1e2940":"#e0e7ff",border:"none",color:"#60a5fa",padding:"4px 9px",borderRadius:5,cursor:"pointer",fontSize:10}}>Edit</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}
function SForm({iS,S,projects,initial,onSave,onCancel,tab}){
  const cfg=SCFG[tab];if(!cfg)return null;
  const dark=document.body.classList.contains("dark");
  const uid=()=>Math.random().toString(36).slice(2,9);
  const defs={projectId:projects[0]?.id||"",date:new Date().toISOString().split("T")[0]};
  (cfg.fields||[]).forEach(fd=>{if(defs[fd.k]===undefined)defs[fd.k]="";});
  const[f,sf]=useState({...defs,...initial});
  const u=k=>e=>sf(p=>({...p,[k]:e.target.value}));
  const lb={fontSize:10,color:dark?"#4a5580":"#64748b",fontWeight:700,marginBottom:3,display:"block",letterSpacing:.6};
  return(
    <div>
      <div style={{fontSize:14,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:8}}><span>{cfg.icon}</span>{f.id?"Edit":"New"} {cfg.label}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{gridColumn:"1/-1"}}><label style={lb}>PROJECT</label>
          <select value={f.projectId||""} onChange={u("projectId")} style={iS}>
            <option value="">Select Project</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        {(cfg.fields||[]).map(fd=>(
          <div key={fd.k} style={{gridColumn:fd.f?"1/-1":"auto"}}>
            <label style={lb}>{fd.l}</label>
            {fd.t==="sel"?<select value={f[fd.k]||""} onChange={u(fd.k)} style={iS}><option value="">Select</option>{(fd.opts||[]).map(o=><option key={o} value={o}>{o}</option>)}</select>
            :fd.t==="ta"?<textarea value={f[fd.k]||""} onChange={u(fd.k)} rows={fd.rows||2} placeholder={fd.ph||""} style={{...iS,resize:"vertical"}}/>
            :<input type={fd.t||"text"} value={f[fd.k]||""} onChange={u(fd.k)} placeholder={fd.ph||""} style={iS}/>}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={S.btnS}>Cancel</button>
        <button onClick={()=>onSave({...f,projectId:Number(f.projectId),id:f.id||uid()})} style={S.btnP}>Save</button>
      </div>
    </div>
  );
}

function exportAllData(store){
  const j=JSON.stringify(store,null,2);
  const b=new Blob([j],{type:"application/json"});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download="KoDox_Backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u);
}
function importAllData(file,cb){
  const r=new FileReader();
  r.onload=ev=>{try{cb(JSON.parse(ev.target.result));}catch(e){alert("Invalid backup: "+e.message);}};
  r.readAsText(file);
}
function printDailyLog(log,projects,companyName){
  const pN=id=>projects.find(p=>p.id===id)?.name||"—";
  const co=companyName||"KoDox Systems LLC";
  const photos=log.photos||[];
  const photoHTML=photos.length?photos.map(ph=>'<div style="display:inline-block;margin:4px;border-radius:5px;overflow:hidden;border:1px solid #e2e8f0;"><img src="'+ph.data+'" style="width:150px;height:110px;object-fit:cover;display:block;"/><div style="padding:2px 6px;font-size:9px;color:#6b7280;">'+ph.name+'</div></div>').join(""):"";
  const sec=(l,v,bc)=>v?'<div style="margin-bottom:10px;"><div style="font-size:9px;font-weight:700;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;">'+l+'</div><div style="font-size:12px;line-height:1.5;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;border-left:3px solid '+(bc||"#1E5A8C")+';">'+v+'</div></div>':"";
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Daily Log '+log.date+'</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;font-size:12px;color:#1c2333;}.np{display:block;}@media print{.np{display:none!important;}@page{margin:.4in;}}table{width:100%;border-collapse:collapse;}td,th{padding:6px 10px;border:1px solid #d1d8e0;font-size:11px;}th{background:#f0f4f7;font-weight:700;text-align:left;font-size:10px;text-transform:uppercase;}</style></head><body><div style="max-width:750px;margin:0 auto;padding:20px;"><div class="np" style="background:#1c2333;color:#e2e8f0;padding:9px 16px;border-radius:6px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;">Daily Log '+log.date+'</span><div style="display:flex;gap:8px;"><button onclick="window.print()" style="background:#FF8A00;border:none;color:#fff;padding:6px 14px;border-radius:5px;cursor:pointer;font-weight:700;">Print/PDF</button><button onclick="window.close()" style="background:#374151;border:none;color:#e2e8f0;padding:6px 12px;border-radius:5px;cursor:pointer;">Close</button></div></div><div style="background:#1c2333;color:#fff;padding:16px 20px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:10px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;">Daily Field Log</div><div style="font-size:20px;font-weight:700;">'+log.date+'</div><div style="font-size:12px;color:#94a3b8;margin-top:2px;">'+pN(log.projectId)+'</div></div><div style="text-align:right;"><div style="font-size:13px;font-weight:700;">'+co+'</div>'+(log.totalHoursDay?'<div style="font-size:16px;font-weight:800;color:#FF8A00;">'+log.totalHoursDay+' Man-Hrs</div>':'')+'</div></div><div style="height:3px;background:linear-gradient(90deg,#1E5A8C,#FF8A00,#1E5A8C);margin-bottom:16px;"></div><table style="margin-bottom:14px;"><tr><th>Weather</th><td>'+(log.weather||"—")+' '+(log.tempLow||"")+'—'+(log.tempHigh||"")+'F</td><th>Location</th><td>'+(log.location||"—")+'</td></tr><tr><th>Superintendent</th><td>'+(log.superintendent||"—")+'</td><th>Foreman</th><td>'+(log.foreman||"—")+'</td></tr><tr><th>Company</th><td>'+(log.companyName||"—")+'</td><th>Manpower</th><td>'+(log.manpower||"—")+' workers x '+(log.hoursWorked||"—")+' hrs = '+(log.totalHoursDay||"—")+' man-hrs</td></tr></table>'+sec("Work Performed",log.workPerformed)+sec("Rental Equipment",log.rentalEquipUsed&&log.rentalEquipUsed+(log.rentalHoursUsed?" · "+log.rentalHoursUsed+" hrs":""))+sec("Delays / Issues",log.delays&&log.delays!=="None"?log.delays:null,"#ef4444")+sec("Visitors",log.visitors)+sec("Safety Notes",log.safety)+sec("Notes",log.notes)+(photos.length?'<div style="margin-top:14px;padding-top:12px;border-top:1px solid #e2e8f0;"><div style="font-size:9px;font-weight:700;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">PHOTOS</div>'+photoHTML+'</div>':'')+'<div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div style="border-top:1px solid #1c2333;padding-top:6px;font-size:10px;color:#6b7280;">Superintendent Signature / Date</div><div style="border-top:1px solid #1c2333;padding-top:6px;font-size:10px;color:#6b7280;">Reviewed By / Date</div></div><div style="margin-top:14px;border-top:1px solid #e2e8f0;padding-top:8px;display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;"><span>'+co+'</span><span>Daily Log · '+log.date+' · CONFIDENTIAL</span></div></div></body></html>';
  const w=window.open("","_blank","width=800,height=900");w.document.write(html);w.document.close();
}
function SettingsTab({settings,setSettings,S,darkMode,allState,allSetters}){

  const u=k=>e=>ss(p=>({...p,[k]:e.target.value}));
  const dark=darkMode;
  const iS2={background:dark?"rgba(6,9,20,0.8)":"#ffffff",border:dark?"1px solid rgba(255,138,0,0.18)":"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",fontSize:13,color:dark?"#f1f5f9":"#0f172a",width:"100%",fontFamily:"Inter,sans-serif"};
  const lb={fontSize:10,color:dark?"rgba(255,138,0,0.8)":"#FF8A00",fontWeight:700,marginBottom:5,display:"block",letterSpacing:1,textTransform:"uppercase"};
  const impRef=React.useRef();
  const[pwState,setPwState]=useState({cur:"",n1:"",n2:"",msg:""});
  function settingsDoImport(e){
    const file=e.target.files[0];if(!file)return;
    if(!window.confirm("Replace ALL data with backup?"))return;
    importAllData(file,data=>{if(allSetters)Object.entries(allSetters).forEach(([k,fn])=>{if(data[k]!==undefined)fn(data[k]);});alert("Restored!");});
    e.target.value="";
  }
  function saveSettings(){
    setSettings(s);
    alert("Settings saved!");
  }
  function changePw(){
    const stored=localStorage.getItem("kodox_pw")||"kodox2026";
    if(pwState.cur!==stored){setPwState(p=>({...p,msg:"Current password incorrect."}));return;}
    if(!pwState.n1||pwState.n1.length<4){setPwState(p=>({...p,msg:"New password must be at least 4 characters."}));return;}
    if(pwState.n1!==pwState.n2){setPwState(p=>({...p,msg:"New passwords do not match."}));return;}
    localStorage.setItem("kodox_pw",pwState.n1);
    setPwState({cur:"",n1:"",n2:"",msg:"✅ Password updated successfully!"});
    setTimeout(()=>setPwState(p=>({...p,msg:""})),3000);
  }

    <div style={{fontSize:11,fontWeight:700,color:"#FF8A00",letterSpacing:1.2,textTransform:"uppercase",marginBottom:14,paddingBottom:8,borderBottom:"1px solid rgba(255,138,0,0.2)"}}>{label}</div>
  );

    <div style={{maxWidth:780,margin:"0 auto"}}>

      </div>

      {/* ── COMPANY INFORMATION ── */}
      <div style={{...S.card,padding:24,marginBottom:16}}>
        {sectionHdr("🏢 Company Information")}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{gridColumn:"1/-1"}}><label style={lb}>Company Name</label><input value={s.companyName||""} onChange={u("companyName")} placeholder="KoDox Mechanical LLC" style={iS2}/></div>
          <div><label style={lb}>Superintendent</label><input value={s.superintendent||""} onChange={u("superintendent")} placeholder="James Hargrove" style={iS2}/></div>
          <div><label style={lb}>Project Manager</label><input value={s.projectManager||""} onChange={u("projectManager")} placeholder="PM Name" style={iS2}/></div>
          <div><label style={lb}>Phone</label><input value={s.phone||""} onChange={u("phone")} placeholder="(555) 000-0000" style={iS2}/></div>
          <div><label style={lb}>Email</label><input value={s.email||""} onChange={u("email")} placeholder="super@company.com" style={iS2}/></div>
          <div style={{gridColumn:"1/-1"}}><label style={lb}>Address</label><input value={s.address||""} onChange={u("address")} placeholder="123 Main St, Houston TX 77001" style={iS2}/></div>
          <div><label style={lb}>License Number</label><input value={s.licenseNum||""} onChange={u("licenseNum")} placeholder="TX-M-000000" style={iS2}/></div>
          <div><label style={lb}>State</label><input value={s.state||""} onChange={u("state")} placeholder="TX" style={iS2}/></div>
        </div>
        <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
          <button onClick={saveSettings} style={{...S.btnP}}>💾 Save Company Info</button>
        </div>
      </div>

      {/* ── REPORT DEFAULTS ── */}

        {sectionHdr("📄 Report Defaults")}

          <div><label style={lb}>Prepared By</label><input value={s.superintendent||""} onChange={u("superintendent")} placeholder="Superintendent name" style={iS2}/></div>
          <div><label style={lb}>Report Footer Text</label><input value={s.reportFooter||""} onChange={u("reportFooter")} placeholder="e.g. Confidential — Do Not Distribute" style={iS2}/></div>

      </div>

      <div style={{...S.card,padding:20,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,...S.text,marginBottom:4}}>Craft and Management Rates</div>

        {/* Column headers */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:6}}>

          <div style={{fontSize:10,fontWeight:700,color:"#FF8A00",letterSpacing:1,textTransform:"uppercase"}}>Rate ($/hr)</div>
          <div style={{fontSize:10,fontWeight:700,color:"#3b82f6",letterSpacing:1,textTransform:"uppercase"}}>Per Diem ($/day)</div>
        </div>

        {/* FIELD TRADES */}

        {[
          {role:"Pipefitter",     rk:"laborRatePipefitter", dk:"perDiemPipefitter", rph:"85",  dph:"75"},
          {role:"Welder",         rk:"laborRateWelder",     dk:"perDiemWelder",     rph:"95",  dph:"75"},
          {role:"Helper/Laborer", rk:"laborRateHelper",     dk:"perDiemHelper",     rph:"55",  dph:"65"},
          {role:"Foreman",        rk:"laborRateForeman",    dk:"perDiemForeman",    rph:"90",  dph:"85"},
          {role:"Default",        rk:"laborRateDefault",    dk:"perDiemDefault",    rph:"65",  dph:"75"},
        ].map(f=>(
          <div key={f.role} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8,alignItems:"center"}}>
