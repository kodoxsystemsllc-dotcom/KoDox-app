<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KoDox Systems — Login</title>
<link rel="icon" type="image/png" href="icon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:linear-gradient(135deg,#060914 0%,#0d1520 100%);
  font-family:Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.card{
  background:rgba(13,21,32,0.95);
  border:1px solid rgba(255,138,0,0.25);
  border-radius:20px;
  padding:40px 28px;
  width:100%;max-width:360px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.logo{width:90px;height:90px;object-fit:contain;border-radius:14px;margin-bottom:16px;}
.brand{font-size:30px;font-weight:900;color:#e2e8f0;font-family:"Arial Black",Impact,sans-serif;letter-spacing:1px;margin-bottom:4px;}
.brand span{color:#FF8A00;}
.tagline{font-size:10px;letter-spacing:5px;color:#FF8A00;text-transform:uppercase;margin-bottom:32px;}
.label{font-size:12px;color:#6a7280;text-align:left;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
input{
  width:100%;padding:13px 15px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);
  color:#e2e8f0;font-size:16px;margin-bottom:18px;
  outline:none;transition:border 0.2s;
}
input:focus{border-color:rgba(255,138,0,0.5);}
.btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#FF8A00,#cc6a00);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  letter-spacing:0.5px;transition:opacity 0.2s;margin-top:4px;
}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.error{
  color:#ef4444;font-size:13px;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:8px;padding:10px;
  margin-bottom:14px;display:none;
}
.footer{font-size:11px;color:#374151;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="icon.png" alt="KoDox"/>
  <div class="brand">Ko<span>D</span>ox</div>
  <div class="tagline">Systems</div>
  <div class="error" id="err"></div>
  <div class="label">Email</div>
  <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
  <div class="label">Password</div>
  <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
  <div class="footer">KoDox Systems LLC &mdash; Authorized Users Only</div>
</div>

<script>
var API_KEY = "AIzaSyB5dVASmYRpDfcQd4OmV-wD5k1NsLOW7FA";

// If already logged in with valid token go straight to app
var token = sessionStorage.getItem("kodox_token");
var user  = sessionStorage.getItem("kodox_user");
if(token && user) {
  window.location.href = "app.html";
}

function doLogin() {
  var email = document.getElementById("email").value.trim();
  var pass  = document.getElementById("pass").value;
  var err   = document.getElementById("err");
  var btn   = document.getElementById("btn");

  if(!email || !pass) {
    err.textContent = "Please enter your email and password.";
    err.style.display = "block"; return;
  }

  btn.textContent = "Signing in...";
  btn.disabled = true;
  err.style.display = "none";

  fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + API_KEY, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({email:email, password:pass, returnSecureToken:true})
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if(d.idToken) {
      sessionStorage.setItem("kodox_token", d.idToken);
      sessionStorage.setItem("kodox_user", JSON.stringify({email:email, uid:d.localId}));
      window.location.href = "app.html";
    } else {
      var msg = "Invalid email or password.";
      if(d.error && d.error.message) {
        if(d.error.message.indexOf("TOO_MANY_ATTEMPTS") > -1)
          msg = "Too many attempts. Please try again later.";
      }
      err.textContent = msg;
      err.style.display = "block";
      btn.textContent = "Sign In";
      btn.disabled = false;
    }
  })
  .catch(function(e) {
    err.textContent = "Connection error. Please check your internet and try again.";
    err.style.display = "block";
    btn.textContent = "Sign In";
    btn.disabled = false;
  });
}

document.addEventListener("keydown", function(e) {
  if(e.key === "Enter") doLogin();
});
</script>
</body></html>
